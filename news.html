<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCC News - Full Article</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6 pb-20">
    <div class="max-w-md mx-auto">
        <button onclick="location.href='index.html'" class="mb-8 text-indigo-600 font-black text-xs uppercase">➜ Back to Dashboard</button>
        
        <div id="news-full-display">
            <p class="text-center text-slate-400 mt-20">Loading article...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const newsId = new URLSearchParams(window.location.search).get('id');
        if(newsId) {
            onSnapshot(doc(db, "news", newsId), (s) => {
                const d = s.data();
                const container = document.getElementById("news-full-display");
                if(d) {
                    container.innerHTML = `
                        <h1 class="text-3xl font-black text-slate-900 leading-tight mb-6">${d.title}</h1>
                        ${d.imageUrl ? `<img src="${d.imageUrl}" class="w-full h-56 object-cover rounded-[2.5rem] mb-8 shadow-xl">` : ''}
                        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                            <p class="text-slate-600 leading-relaxed whitespace-pre-wrap">${d.content}</p>
                        </div>
                    `;
                }
            });
        }
    </script>
</body>
</html>
