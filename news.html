<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Feed</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1340372907809425" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="p-6 bg-white border-b flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-2xl font-black text-indigo-700">OCC FEED</h1>
            <div class="gtranslate_wrapper mt-2"></div>
        </div>
        <button onclick="location.href='index.html'" class="text-xs font-bold text-slate-400">BACK</button>
    </header>
    
    <main class="p-5 space-y-5" id="feed"></main>

    <script>window.gtranslateSettings = {"default_language":"en","native_language_names":true,"detect_browser_language":true,"wrapper_selector":".gtranslate_wrapper","switcher_horizontal_position":"inline"}</script>
    <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(!user) window.location.href = "index.html";
            const q = query(collection(db, "news"), orderBy("createdAt", "desc"));
            onSnapshot(q, snap => {
                const feed = document.getElementById("feed");
                feed.innerHTML = "";
                snap.forEach(sDoc => {
                    const data = sDoc.data();
                    const isLiked = data.likes?.includes(user.uid);
                    
                    let postDate = "Just now";
                    if (data.createdAt) {
                        const dateObj = data.createdAt.toDate();
                        postDate = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) + " • " + dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                    }

                    feed.innerHTML += `
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex-1 pr-4">
                                    <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1">${postDate}</p>
                                    <h2 class="text-xl font-black text-slate-800 leading-tight">${data.title}</h2>
                                </div>
                                <img src="${data.imageUrl || 'news.png'}" class="w-20 h-20 rounded-2xl object-cover border border-gray-50">
                            </div>
                            <p class="text-slate-500 text-sm mb-5 leading-relaxed">${data.content}</p>
                            <button onclick="handleLike('${sDoc.id}', ${isLiked})" class="flex items-center gap-2 p-3 px-6 rounded-2xl ${isLiked ? 'bg-red-50 text-red-500' : 'bg-gray-50 text-gray-400'} font-black text-xs transition-all active:scale-95">
                                ${isLiked ? '❤️' : '🤍'} ${data.likes?.length || 0} Likes
                            </button>
                        </div>`;
                });
            });
        });
        window.handleLike = (id, isLiked) => updateDoc(doc(db, "news", id), { likes: isLiked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) });
    </script>
</body>
</html>
