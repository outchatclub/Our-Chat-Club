<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Donate Us - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .brand-indigo { color: #4338ca; }
        .brand-bg-indigo { background-color: #4338ca; }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="text-slate-900">
    <div class="max-w-md mx-auto p-6 pb-24">
        <div class="flex items-center mb-8 mt-2">
            <button onclick="location.href='index.html'" class="btn-press bg-white p-3 rounded-2xl shadow-sm border border-slate-100 text-indigo-600 mr-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-3xl font-black brand-indigo tracking-tighter leading-none flex-grow text-center pr-12">Support OCC</h1>
        </div>

        <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl text-center mb-10">
            <h2 class="text-xl font-black mb-1">Donate</h2>
            <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-6">Scan QR to pay</p>
            
            <img src="pay.png" class="mx-auto w-full max-w-[280px] h-auto rounded-3xl object-contain mb-6 shadow-sm border border-slate-50">
            
            <p class="text-xs text-slate-500 leading-relaxed mb-1">Your support helps keep our club running. Any donation is greatly appreciated!</p>
            <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">upi: aritramukherjee1010@okicici</p>
        </div>

        <button onclick="location.href='index.html'" class="btn-press w-full py-4 bg-white border border-slate-200 rounded-2xl text-[11px] font-black text-slate-400 uppercase tracking-widest">Back to Feed</button>
    </div>
</body>
</html>
