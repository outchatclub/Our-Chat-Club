<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Public News - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .brand-indigo { color: #4338ca; }
        .brand-bg-indigo { background-color: #4338ca; }
        .hidden { display: none !important; }
        .btn-press:active { transform: scale(0.96); }
        input, textarea, select { border: 1px solid #e2e8f0; border-radius: 1.25rem; padding: 14px; width: 100%; margin-bottom: 15px; outline: none; font-size: 14px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .overlay-active { opacity: 1 !important; pointer-events: auto !important; }
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="text-slate-900">
    <div id="sidebar-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-slate-900/40 z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>
    
    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white z-[70] shadow-2xl -translate-x-full flex flex-col p-8">
        <div class="mb-10 flex justify-between items-center">
            <h2 class="text-3xl font-black brand-indigo tracking-tighter">MENU</h2>
            <button onclick="toggleMenu()" class="text-slate-400 text-2xl font-bold">&times;</button>
        </div>
        <nav class="flex flex-col gap-4">
            <a href="index.html" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 transition-all"><span>🏠</span> Home</a>
            <a href="https://www.youtube.com/@ourchatclub" target="_blank" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700 hover:bg-red-50 hover:text-red-600 transition-all"><span>🎬</span> YouTube</a>
            <a href="https://www.instagram.com/ourchatclub.in?igsh=Z3U2ajg1Z3VndHA1" target="_blank" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700 hover:bg-pink-50 hover:text-pink-600 transition-all"><span>📸</span> Instagram</a>
            <a href="support.html" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700 hover:bg-sky-50 hover:text-sky-600 transition-all"><span>🆘</span> Get Help</a>
        </nav>
        <div class="mt-auto pt-8 border-t border-slate-100">
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest text-center">OCC Platform v2.0</p>
        </div>
    </div>

    <div class="max-w-md mx-auto p-6 flex justify-between items-center">
        <button onclick="toggleMenu()" class="btn-press bg-white p-3 rounded-2xl shadow-sm border border-slate-100 text-indigo-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <h1 class="text-2xl font-black brand-indigo tracking-tighter">PUBLIC NEWS</h1>
        <button id="post-news-btn" class="brand-bg-indigo text-white px-5 py-2.5 rounded-xl font-black text-xs shadow-lg btn-press">POST</button>
    </div>

    <div class="max-w-md mx-auto px-6 pb-24">
        <div class="gtranslate_wrapper mb-6"></div>
        <script>window.gtranslateSettings = {"default_language":"en","native_language_names":true,"detect_browser_language":true,"wrapper_selector":".gtranslate_wrapper","switcher_horizontal_position":"inline"}</script>
        <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>

        <div id="public-feed" class="space-y-6">
            <p class="text-center text-slate-400 text-sm mt-10">Loading global stories...</p>
        </div>
    </div>

    <div id="profile-modal" class="modal hidden">
        <div class="bg-white w-full max-w-sm p-8 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-xl font-black mb-2">Create Public Profile</h2>
            <p class="text-xs text-slate-400 mb-6 font-bold uppercase tracking-widest">Required to post news</p>
            <input type="text" id="pub-name" placeholder="Public Display Name">
            <input type="tel" id="pub-phone" placeholder="Phone Number">
            <button id="save-profile" class="w-full brand-bg-indigo text-white py-4 rounded-2xl font-black shadow-lg btn-press">Create Profile</button>
            <button onclick="closeModals()" class="w-full mt-4 text-slate-400 font-bold text-xs">CANCEL</button>
        </div>
    </div>

    <div id="post-modal" class="modal hidden">
        <div class="bg-white w-full max-w-sm p-8 rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black mb-6">Write News</h2>
            <input type="text" id="news-title" maxlength="50" placeholder="Title (Max 50 chars)">
            <select id="news-category">
                <option value="Others">Select Category</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Politics">Politics</option>
                <option value="Finance">Finance</option>
                <option value="Sports">Sports</option>
                <option value="Others">Others</option>
            </select>
            <textarea id="news-content" maxlength="2000" rows="5" placeholder="Content (Max 2000 chars)"></textarea>
            <button id="submit-news" class="w-full brand-bg-indigo text-white py-4 rounded-2xl font-black shadow-lg btn-press">Post Publicly</button>
            <button onclick="closeModals()" class="w-full mt-4 text-slate-400 font-bold text-xs">DISCARD</button>
        </div>
    </div>

    <div id="report-modal" class="modal hidden">
        <div class="bg-white w-full max-w-sm p-8 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-xl font-black mb-4">Report Content</h2>
            <select id="report-type">
                <option value="Harmful">Harmful Content</option>
                <option value="Illegal">Illegal Content</option>
            </select>
            <textarea id="report-reason" maxlength="1000" rows="3" placeholder="Describe the issue... (Max 1000 chars)"></textarea>
            <button id="submit-report" class="w-full bg-red-500 text-white py-4 rounded-2xl font-black shadow-lg btn-press">Submit Report</button>
            <button onclick="closeModals()" class="w-full mt-4 text-slate-400 font-bold text-xs">CANCEL</button>
        </div>
    </div>

    <div id="readmore-modal" class="modal hidden">
        <div class="bg-white w-full max-md p-8 rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[85vh]">
            <span id="rm-category" class="text-[10px] font-black brand-indigo uppercase tracking-widest"></span>
            <h2 id="rm-title" class="text-2xl font-black my-2"></h2>
            <div id="rm-meta" class="flex items-center gap-2 mb-6"></div>
            <p id="rm-content" class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap mb-8"></p>
            <div class="border-t pt-4">
                <h4 class="text-[10px] font-black text-slate-400 uppercase mb-2">Reports History</h4>
                <div id="rm-reports-list" class="space-y-2 text-[11px] text-red-400 font-bold"></div>
            </div>
            <button onclick="closeModals()" class="w-full mt-8 brand-bg-indigo text-white py-4 rounded-2xl font-black btn-press">CLOSE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, query, collection, orderBy, limit, serverTimestamp, updateDoc, arrayUnion, arrayRemove, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserProfile = null;
        let reportingNewsId = null;

        window.toggleMenu = () => { document.getElementById("sidebar").classList.toggle("sidebar-open"); document.getElementById("sidebar-overlay").classList.toggle("overlay-active"); };
        window.closeModals = () => { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "publicProfiles", user.uid));
                if (snap.exists()) currentUserProfile = snap.data();
                loadPublicNews();
            } else {
                alert("Access Denied. Please login first.");
                window.location.href = "index.html";
            }
        });

        document.getElementById("post-news-btn").onclick = () => {
            if (!auth.currentUser) return alert("Please login first.");
            if (!currentUserProfile) {
                document.getElementById("profile-modal").classList.remove("hidden");
            } else {
                document.getElementById("post-modal").classList.remove("hidden");
            }
        };

        document.getElementById("save-profile").onclick = async () => {
            const name = document.getElementById("pub-name").value.trim();
            const phone = document.getElementById("pub-phone").value.trim();
            if (!name || !phone) return alert("All fields required");
            
            try {
                await setDoc(doc(db, "publicProfiles", auth.currentUser.uid), { name, phone });
                currentUserProfile = { name, phone };
                closeModals();
                document.getElementById("post-modal").classList.remove("hidden");
            } catch (e) { alert("Error saving profile: " + e.message); }
        };

        document.getElementById("submit-news").onclick = async () => {
            const title = document.getElementById("news-title").value.trim();
            const content = document.getElementById("news-content").value.trim();
            const category = document.getElementById("news-category").value;

            if (!title || !content) return alert("Title and Content cannot be empty.");
            if (title.length > 50 || content.length > 2000) return alert("Character limits exceeded.");

            try {
                const hourAgo = new Date(Date.now() - 3600000);
                // Simplified query logic to prevent the "Missing Index" error
                const qRate = query(
                    collection(db, "publicNews"), 
                    where("uid", "==", auth.currentUser.uid),
                    where("createdAt", ">", hourAgo),
                    limit(1)
                );
                
                const rateSnap = await getDocs(qRate);
                if (!rateSnap.empty) {
                    return alert("You can only post once every hour. Please wait.");
                }

                const newsRef = doc(collection(db, "publicNews"));
                await setDoc(newsRef, {
                    title, content, category,
                    authorName: currentUserProfile.name,
                    authorInitial: currentUserProfile.name.charAt(0).toUpperCase(),
                    likes: [],
                    reports: [],
                    createdAt: serverTimestamp(),
                    uid: auth.currentUser.uid
                });
                
                closeModals();
                document.getElementById("news-title").value = "";
                document.getElementById("news-content").value = "";
                alert("News posted successfully!");
            } catch (e) { 
                console.error("Submission Error:", e);
                alert("Error: " + e.message); 
            }
        };

        function loadPublicNews() {
            const q = query(collection(db, "publicNews"), orderBy("createdAt", "desc"));
            onSnapshot(q, snap => {
                const feed = document.getElementById("public-feed");
                feed.innerHTML = "";
                if (snap.empty) {
                    feed.innerHTML = '<p class="text-center text-slate-400 text-sm mt-10">No stories found.</p>';
                    return;
                }
                snap.forEach(sDoc => {
                    const d = sDoc.data();
                    const isLiked = d.likes?.includes(auth.currentUser?.uid);
                    const reportCount = d.reports?.length || 0;
                    const summary = d.content.substring(0, 100) + (d.content.length > 100 ? "..." : "");
                    const deleteBtn = d.uid === auth.currentUser?.uid ? 
                        `<button onclick="deleteNews('${sDoc.id}')" class="text-red-500 font-black text-[10px] uppercase ml-4">Delete</button>` : '';

                    feed.innerHTML += `
                        <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden">
                            <div class="flex justify-between items-start mb-4">
                                <div class="w-12 h-12 brand-bg-indigo rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-inner">
                                    ${d.authorInitial || '?'}
                                </div>
                                <div class="flex items-center">
                                    <span class="bg-slate-50 text-[9px] font-black text-slate-400 px-3 py-1 rounded-full uppercase tracking-widest">${d.category}</span>
                                    ${deleteBtn}
                                </div>
                            </div>
                            <h3 class="font-black text-slate-800 text-lg mb-2">${d.title}</h3>
                            <p class="text-slate-500 text-xs leading-relaxed mb-4">${summary}</p>
                            
                            <div class="flex justify-between items-center border-t border-slate-50 pt-4">
                                <div class="flex gap-4">
                                    <button onclick="toggleLike('${sDoc.id}', ${isLiked})" class="text-xs font-black ${isLiked ? 'text-red-500' : 'text-slate-300'}">❤️ ${d.likes?.length || 0}</button>
                                    <button onclick="openReportModal('${sDoc.id}')" class="text-xs font-black text-slate-300">🚩 ${reportCount}</button>
                                </div>
                                <button onclick="openReadMore('${sDoc.id}')" class="text-indigo-600 font-black text-xs uppercase">Read More ➜</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.deleteNews = async (id) => {
            if (confirm("Are you sure you want to delete this news post?")) {
                try {
                    await deleteDoc(doc(db, "publicNews", id));
                    alert("Post deleted.");
                } catch (e) { alert("Error deleting post."); }
            }
        };

        window.toggleLike = async (id, currentlyLiked) => {
            if (!auth.currentUser) return alert("Login to like");
            const newsRef = doc(db, "publicNews", id);
            try {
                await updateDoc(newsRef, { 
                    likes: currentlyLiked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) 
                });
            } catch (e) { console.error(e); }
        };

        window.openReportModal = async (id) => {
            if (!auth.currentUser) return alert("Login to report");
            const snap = await getDoc(doc(db, "publicNews", id));
            const hasReported = snap.data().reports?.some(r => r.user === auth.currentUser.uid);
            if (hasReported) return alert("You have already reported this post.");
            reportingNewsId = id;
            document.getElementById("report-modal").classList.remove("hidden");
        };

        document.getElementById("submit-report").onclick = async () => {
            const reason = document.getElementById("report-reason").value.trim();
            const type = document.getElementById("report-type").value;
            if (!reason) return alert("Reason required");
            try {
                await updateDoc(doc(db, "publicNews", reportingNewsId), {
                    reports: arrayUnion({ type, reason, user: auth.currentUser.uid })
                });
                closeModals();
                alert("Report submitted.");
            } catch (e) { alert("Error submitting report."); }
        };

        window.openReadMore = async (id) => {
            try {
                const snap = await getDoc(doc(db, "publicNews", id));
                const d = snap.data();
                document.getElementById("rm-title").innerText = d.title;
                document.getElementById("rm-category").innerText = d.category;
                document.getElementById("rm-content").innerText = d.content;
                document.getElementById("rm-meta").innerHTML = `<div class="w-8 h-8 brand-bg-indigo rounded-lg flex items-center justify-center text-white text-xs font-black">${d.authorInitial}</div> <span class="text-[11px] font-bold text-slate-400">By ${d.authorName}</span>`;
                const reportList = document.getElementById("rm-reports-list");
                reportList.innerHTML = d.reports?.length ? "" : "No reports yet.";
                d.reports?.forEach(r => {
                    reportList.innerHTML += `<p>• [${r.type}] ${r.reason}</p>`;
                });
                document.getElementById("readmore-modal").classList.remove("hidden");
            } catch (e) { alert("Error loading details."); }
        };
    </script>
</body>
</html>
