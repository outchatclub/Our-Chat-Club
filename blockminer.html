<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Miner - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .btn-press:active { transform: scale(0.95); }
        
        .mine-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }
        
        .block {
            aspect-ratio: 1/1;
            background: #1e293b;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #334155;
        }

        /* Block Types - High Contrast */
        .block.revealed { transform: scale(0.9); cursor: default; border: none; }
        .block.gold { background: #fbbf24; box-shadow: 0 0 15px #fbbf2466; }
        .block.silver { background: #94a3b8; box-shadow: 0 0 15px #94a3b866; }
        .block.bronze { background: #d97706; box-shadow: 0 0 15px #d9770666; }
        .block.bomb { background: #ef4444; box-shadow: 0 0 15px #ef444466; }
        .block.normal { background: #475569; }

        .header-glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="header-glass sticky top-0 z-50 p-4 flex justify-between items-center">
        <button onclick="location.href='index.html'" class="btn-press text-slate-400">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div id="index-wallet" class="bg-indigo-600/20 border border-indigo-500/30 px-5 py-2 rounded-full">
            <span id="wallet-display" class="font-black text-indigo-400">💰 ...</span>
        </div>
        <button id="refresh-grid" class="btn-press bg-white text-black p-2 rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </div>

    <div class="max-w-md mx-auto p-4 mt-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter uppercase italic">Block Miner</h1>
            <p class="text-[10px] text-indigo-500 font-black tracking-[0.3em] uppercase">Deep Core Extraction</p>
        </div>

        <div id="grid-container" class="mine-grid bg-slate-900 p-2 rounded-2xl border border-slate-800 shadow-2xl">
            </div>

        <div class="mt-10 grid grid-cols-2 gap-4 px-2">
            <div class="flex items-center gap-3 bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                <div class="w-4 h-4 bg-fbbf24 rounded shadow-[0_0_8px_#fbbf24]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400">Gold <span class="text-white">+20</span></span>
            </div>
            <div class="flex items-center gap-3 bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                <div class="w-4 h-4 bg-slate-400 rounded shadow-[0_0_8px_#94a3b8]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400">Silver <span class="text-white">+15</span></span>
            </div>
            <div class="flex items-center gap-3 bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                <div class="w-4 h-4 bg-orange-600 rounded shadow-[0_0_8px_#d97706]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400">Bronze <span class="text-white">+10</span></span>
            </div>
            <div class="flex items-center gap-3 bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                <div class="w-4 h-4 bg-red-500 rounded shadow-[0_0_8px_#ef4444]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400">Bomb <span class="text-white">-20</span></span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userUid = null;
        const gridContainer = document.getElementById('grid-container');
        const refreshBtn = document.getElementById('refresh-grid');

        onAuthStateChanged(auth, user => {
            if (!user) { location.href = 'index.html'; return; }
            userUid = user.uid;
            onSnapshot(doc(db, "users", user.uid), s => {
                if(s.exists()) document.getElementById("wallet-display").innerText = "💰 " + (s.data().wallet || 0);
            });
            initGame();
        });

        function initGame() {
            gridContainer.innerHTML = '';
            const blocks = [];
            
            // Core requirements
            for(let i=0; i<3; i++) blocks.push({ type: 'gold', val: 20 });
            for(let i=0; i<3; i++) blocks.push({ type: 'silver', val: 15 });
            for(let i=0; i<3; i++) blocks.push({ type: 'bronze', val: 10 });
            for(let i=0; i<10; i++) blocks.push({ type: 'bomb', val: -20 });
            
            // Fill remaining 45 with normal stone blocks
            while(blocks.length < 64) {
                blocks.push({ type: 'normal', val: 1 });
            }

            blocks.sort(() => Math.random() - 0.5);

            blocks.forEach(data => {
                const el = document.createElement('div');
                el.className = 'block';
                el.onclick = () => revealBlock(el, data);
                gridContainer.appendChild(el);
            });
        }

        async function revealBlock(el, data) {
            if (el.classList.contains('revealed')) return;
            el.classList.add('revealed', data.type);
            
            try {
                await updateDoc(doc(db, "users", userUid), {
                    wallet: increment(data.val)
                });
            } catch (e) {
                console.error("Sync Error:", e);
            }
        }

        refreshBtn.onclick = () => {
            initGame();
        };
    </script>
</body>
</html>
