<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Miner - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .brand-indigo { color: #6366f1; }
        .brand-bg-indigo { background-color: #6366f1; }
        .btn-press:active { transform: scale(0.95); }
        
        /* Grid Styling */
        .mine-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            perspective: 1000px;
        }
        
        .block {
            aspect-ratio: 1/1;
            background: #1e293b;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            border: 1px solid #334155;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);
        }

        .block.revealed { transform: rotateY(180deg); background: #0f172a; border-color: transparent; cursor: default; }
        .block.gold { background: linear-gradient(135deg, #f59e0b, #78350f); box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        .block.silver { background: linear-gradient(135deg, #94a3b8, #334155); box-shadow: 0 0 15px rgba(148, 163, 184, 0.4); }
        .block.bronze { background: linear-gradient(135deg, #b45309, #451a03); box-shadow: 0 0 10px rgba(180, 83, 9, 0.3); }
        .block.bomb { background: linear-gradient(135deg, #ef4444, #7f1d1d); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .block.normal { background: #334155; }

        .stat-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto p-4 pb-20">
        <div class="flex justify-between items-center mb-6 mt-2">
            <button onclick="location.href='index.html'" class="btn-press bg-slate-800 p-3 rounded-2xl text-indigo-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="text-center">
                <h1 class="text-xl font-900 tracking-tighter uppercase">Block Miner</h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-widest">PRECISION MINING</p>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-2xl">
                <span id="wallet-display" class="font-black text-indigo-400">...</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="stat-card p-4 rounded-3xl text-center">
                <span class="block text-[10px] font-black text-slate-500 uppercase mb-1">Session Profit</span>
                <span id="session-profit" class="text-xl font-black text-emerald-400">+0</span>
            </div>
            <button id="refresh-grid" class="btn-press bg-indigo-600 p-4 rounded-3xl flex flex-col items-center justify-center gap-1 shadow-lg shadow-indigo-500/20">
                <span class="text-[10px] font-black uppercase text-indigo-100">Refresh Area</span>
                <span class="text-xs font-black">NEW GRID</span>
            </button>
        </div>

        <div id="grid-container" class="mine-grid bg-slate-800/30 p-3 rounded-[2rem] border border-slate-800">
            </div>

        <div class="mt-8 grid grid-cols-4 gap-2 px-2">
            <div class="text-center"><div class="w-2 h-2 rounded-full bg-amber-400 mx-auto mb-1"></div><p class="text-[8px] font-bold text-slate-500">GOLD (+20)</p></div>
            <div class="text-center"><div class="w-2 h-2 rounded-full bg-slate-300 mx-auto mb-1"></div><p class="text-[8px] font-bold text-slate-500">SILVER (+15)</p></div>
            <div class="text-center"><div class="w-2 h-2 rounded-full bg-orange-700 mx-auto mb-1"></div><p class="text-[8px] font-bold text-slate-500">BRONZE (+10)</p></div>
            <div class="text-center"><div class="w-2 h-2 rounded-full bg-red-500 mx-auto mb-1"></div><p class="text-[8px] font-bold text-slate-500">BOMB (-20)</p></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userUid = null;
        let sessionScore = 0;

        const gridContainer = document.getElementById('grid-container');
        const refreshBtn = document.getElementById('refresh-grid');
        const profitDisplay = document.getElementById('session-profit');

        onAuthStateChanged(auth, user => {
            if (!user) { location.href = 'index.html'; return; }
            userUid = user.uid;
            onSnapshot(doc(db, "users", user.uid), s => {
                if(s.exists()) document.getElementById("wallet-display").innerText = "💰 " + (s.data().wallet || 0);
            });
            initGame();
        });

        function initGame() {
            gridContainer.innerHTML = '';
            const blocks = [];
            
            // Create the pool of special blocks
            for(let i=0; i<3; i++) blocks.push({ type: 'gold', val: 20, icon: '🏆' });
            for(let i=0; i<3; i++) blocks.push({ type: 'silver', val: 15, icon: '🥈' });
            for(let i=0; i<3; i++) blocks.push({ type: 'bronze', val: 10, icon: '🥉' });
            for(let i=0; i<10; i++) blocks.push({ type: 'bomb', val: -20, icon: '💥' });
            
            // Fill remaining with normal blocks (64 total - 19 specials = 45 normals)
            while(blocks.length < 64) {
                blocks.push({ type: 'normal', val: 1, icon: '💎' });
            }

            // Shuffle
            blocks.sort(() => Math.random() - 0.5);

            blocks.forEach(data => {
                const el = document.createElement('div');
                el.className = 'block';
                el.onclick = () => revealBlock(el, data);
                gridContainer.appendChild(el);
            });
        }

        async function revealBlock(el, data) {
            if (el.classList.contains('revealed')) return;

            el.classList.add('revealed', data.type);
            el.innerHTML = `<span style="transform: rotateY(180deg) scale(1.2); display: block;">${data.icon}</span>`;
            
            sessionScore += data.val;
            profitDisplay.innerText = (sessionScore >= 0 ? '+' : '') + sessionScore;
            profitDisplay.className = `text-xl font-black ${sessionScore >= 0 ? 'text-emerald-400' : 'text-red-400'}`;

            try {
                await updateDoc(doc(db, "users", userUid), {
                    wallet: increment(data.val)
                });
            } catch (e) {
                console.error("Wallet update failed:", e);
            }

            if (data.type === 'bomb') {
                // Flash effect for bomb
                gridContainer.style.borderColor = '#ef4444';
                setTimeout(() => gridContainer.style.borderColor = '#1e293b', 200);
            }
        }

        refreshBtn.onclick = () => {
            refreshBtn.classList.add('opacity-50');
            initGame();
            setTimeout(() => refreshBtn.classList.remove('opacity-50'), 500);
        };
    </script>
</body>
</html>
