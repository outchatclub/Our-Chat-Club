<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Miner - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .btn-press:active { transform: scale(0.95); }
        
        .mine-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
        }
        
        .block {
            aspect-ratio: 1/1;
            background: #1e293b;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #334155;
            position: relative;
        }

        /* Revealed States */
        .block.revealed { cursor: default; border: none; transform: scale(0.95); }
        
        /* Specialized Blocks with Glow */
        .block.gold { background: #fbbf24; box-shadow: 0 0 20px #fbbf2444; }
        .block.silver { background: #cbd5e1; box-shadow: 0 0 20px #cbd5e144; }
        .block.bronze { background: #d97706; box-shadow: 0 0 20px #d9770644; }
        .block.bomb { background: #ef4444; box-shadow: 0 0 20px #ef444444; }
        
        /* Normal Stone - No Diamond, Just Texture */
        .block.normal { background: #475569; border: 1px solid #64748b; }

        .header-glass {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .legend-item {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="header-glass sticky top-0 z-50 p-4 flex justify-between items-center">
        <button onclick="location.href='index.html'" class="btn-press bg-slate-900 p-2 rounded-xl border border-slate-800">
            <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div class="bg-indigo-600/10 border border-indigo-500/20 px-5 py-2 rounded-2xl">
            <span id="wallet-display" class="font-black text-indigo-400 tracking-tight">💰 ...</span>
        </div>
        <button id="refresh-grid" class="btn-press bg-white text-black p-2 rounded-xl shadow-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </div>

    <div class="max-w-md mx-auto p-5">
        <div class="text-center mt-4 mb-8">
            <h1 class="text-3xl font-black tracking-tighter uppercase italic">Block Miner</h1>
            <p class="text-[10px] text-indigo-500 font-black tracking-[0.4em] uppercase opacity-80">Deep Core Extraction</p>
        </div>

        <div id="grid-container" class="mine-grid bg-slate-900/50 p-3 rounded-[2rem] border border-slate-800/50">
            </div>

        <div class="mt-8 grid grid-cols-2 gap-3">
            <div class="legend-item flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-[#fbbf24] shadow-[0_0_10px_#fbbf24]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400">Gold <span class="text-white ml-1">+20</span></span>
            </div>
            <div class="legend-item flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-[#cbd5e1] shadow-[0_0_10px_#cbd5e1]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400">Silver <span class="text-white ml-1">+15</span></span>
            </div>
            <div class="legend-item flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-[#d97706] shadow-[0_0_10px_#d97706]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400">Bronze <span class="text-white ml-1">+10</span></span>
            </div>
            <div class="legend-item flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-[#ef4444] shadow-[0_0_10px_#ef4444]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400">Bomb <span class="text-white ml-1">-20</span></span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userUid = null;
        const gridContainer = document.getElementById('grid-container');
        const refreshBtn = document.getElementById('refresh-grid');

        onAuthStateChanged(auth, user => {
            if (!user) { location.href = 'index.html'; return; }
            userUid = user.uid;
            onSnapshot(doc(db, "users", user.uid), s => {
                if(s.exists()) document.getElementById("wallet-display").innerText = "💰 " + (s.data().wallet || 0);
            });
            initGame();
        });

        function initGame() {
            gridContainer.innerHTML = '';
            const blocks = [];
            
            // Set required special blocks
            for(let i=0; i<3; i++) blocks.push({ type: 'gold', val: 20, icon: '🏆' });
            for(let i=0; i<3; i++) blocks.push({ type: 'silver', val: 15, icon: '🥈' });
            for(let i=0; i<3; i++) blocks.push({ type: 'bronze', val: 10, icon: '🥉' });
            for(let i=0; i<10; i++) blocks.push({ type: 'bomb', val: -20, icon: '💥' });
            
            // Remaining blocks are normal stone (no icon)
            while(blocks.length < 64) {
                blocks.push({ type: 'normal', val: 1, icon: '' });
            }

            // Shuffle grid
            blocks.sort(() => Math.random() - 0.5);

            blocks.forEach(data => {
                const el = document.createElement('div');
                el.className = 'block';
                el.onclick = () => revealBlock(el, data);
                gridContainer.appendChild(el);
            });
        }

        async function revealBlock(el, data) {
            if (el.classList.contains('revealed')) return;
            el.classList.add('revealed', data.type);
            
            // Only show icons for special items, leave normal stone empty
            if (data.icon !== '') {
                el.innerHTML = `<span style="font-size: 1.2rem;">${data.icon}</span>`;
            }
            
            try {
                await updateDoc(doc(db, "users", userUid), {
                    wallet: increment(data.val)
                });
            } catch (e) {
                console.error("Update failed:", e);
            }
        }

        refreshBtn.onclick = () => {
            initGame();
        };
    </script>
</body>
</html>
