<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCC - Scratch & Win</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #7b2ff7 0%, #2b58f0 100%);
            --dark-bg: #0a0b10;
            --card-bg: #161822;
            --text-main: #ffffff;
            --accent: #00f2ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Branding Section */
        .header {
            margin-bottom: 20px;
            text-align: center;
        }
        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .sub-text {
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* Game Container */
        .game-container {
            position: relative;
            width: 320px;
            height: 450px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            text-align: center;
        }

        .points-display {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--accent);
        }

        /* The Scratch Card */
        #scratch-card {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
            background: #fff; /* Where points are hidden */
            border-radius: 15px;
            overflow: hidden;
            user-select: none;
        }

        #points-reveal {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            color: #1a1a1a;
            z-index: 1;
        }

        #points-reveal h2 { font-size: 3rem; margin: 0; color: #2b58f0; }
        
        #scratch-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            cursor: crosshair;
            touch-action: none;
        }

        /* Timer Overlay */
        #timer-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(22, 24, 34, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 24px;
        }

        .countdown-circle {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent);
            border: 4px solid var(--accent);
            width: 100px; height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .btn-disabled {
            margin-top: 20px;
            padding: 10px 20px;
            background: #333;
            border-radius: 8px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo-text">OCC</h1>
        <div class="sub-text">Our Chat Club Rewards</div>
    </div>

    <div class="game-container">
        <div class="points-display">Total Wallet: <span id="wallet">0</span> pts</div>
        
        <div id="scratch-card">
            <div id="points-reveal">
                <p>YOU WON</p>
                <h2 id="won-points">0</h2>
                <p>POINTS</p>
            </div>
            <canvas id="scratch-canvas" width="280" height="280"></canvas>
        </div>

        <p id="instruction" style="margin-top: 20px; opacity: 0.6;">Scratch the card to reveal points!</p>

        <div id="timer-overlay">
            <p>Generating New Card...</p>
            <div class="countdown-circle" id="seconds">15</div>
            <p>Please wait</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const walletEl = document.getElementById('wallet');
        const wonPointsEl = document.getElementById('won-points');
        const timerOverlay = document.getElementById('timer-overlay');
        const secondsEl = document.getElementById('seconds');

        let isDrawing = false;
        let totalWallet = 0;
        let pointsThisRound = 0;
        let scratchedPercentage = 0;
        let isScratched = false;

        function initCard() {
            isScratched = false;
            scratchedPercentage = 0;
            pointsThisRound = Math.floor(Math.random() * 50) + 10; // 10-60 points
            wonPointsEl.innerText = pointsThisRound;
            
            // Create Scratch Layer (Gradient Like Logo)
            const grad = ctx.createLinearGradient(0, 0, 280, 280);
            grad.addColorStop(0, '#7b2ff7');
            grad.addColorStop(1, '#2b58f0');
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 280, 280);
            
            // Add some pattern to the top
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            for(let i=0; i<100; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*280, Math.random()*280, 1, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function scratch(e) {
            if (isScratched) return;
            isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if (!isDrawing) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.pageX || e.touches[0].pageX) - rect.left;
            const y = (e.pageY || e.touches[0].pageY) - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.fill();

            checkScratchedAmount();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function checkScratchedAmount() {
            if (isScratched) return;

            const imageData = ctx.getImageData(0, 0, 280, 280);
            const pixels = imageData.data;
            let transparentPixels = 0;

            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) transparentPixels++;
            }

            scratchedPercentage = (transparentPixels / (pixels.length / 4)) * 100;

            if (scratchedPercentage > 45) { // Auto-reveal at 45%
                isScratched = true;
                ctx.clearRect(0, 0, 280, 280);
                awardPoints();
            }
        }

        function awardPoints() {
            totalWallet += pointsThisRound;
            walletEl.innerText = totalWallet;
            
            // Start 15s Timer
            setTimeout(startCooldown, 1000);
        }

        function startCooldown() {
            timerOverlay.style.display = 'flex';
            let timeLeft = 15;
            secondsEl.innerText = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                secondsEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerOverlay.style.display = 'none';
                    initCard();
                }
            }, 1000);
        }

        // Event Listeners
        canvas.addEventListener('mousedown', scratch);
        canvas.addEventListener('touchstart', scratch);
        window.addEventListener('mousemove', draw);
        window.addEventListener('touchmove', draw);
        window.addEventListener('mouseup', stopDrawing);
        window.addEventListener('touchend', stopDrawing);

        initCard();
    </script>
</body>
</html>
