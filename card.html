<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Professional Scratch</title>
    <style>
        :root {
            --primary: #7b2ff7;
            --secondary: #2b58f0;
            --accent: #00f2ff;
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box; /* इससे वो फालतू की सफ़ेद लाइनें नहीं आएँगी */
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Wallet UI */
        .wallet-container {
            background: var(--glass);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bump { transform: scale(1.2); border-color: var(--accent); }

        #wallet-amount {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--accent);
        }

        /* Card Container */
        .card-frame {
            position: relative;
            width: 320px;
            height: 320px;
            background: #161822;
            border-radius: 30px;
            padding: 10px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #scratch-area {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }

        .reward-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%);
            color: #1a1a1a;
            z-index: 1;
        }

        .reward-layer h3 { margin: 0; font-size: 0.9rem; opacity: 0.6; text-transform: uppercase; }
        .reward-layer .points { font-size: 4.5rem; font-weight: 900; color: var(--secondary); margin: 5px 0; }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            border-radius: 20px;
            touch-action: none;
        }

        /* Cooldown Overlay */
        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 11, 16, 0.98);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .timer-ring {
            width: 80px; height: 80px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 0 20px var(--primary);
        }

        .status-msg { margin-top: 25px; height: 20px; }
    </style>
</head>
<body>

    <div class="wallet-container" id="wallet-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>
        <span id="wallet-amount">0</span>
    </div>

    <div class="card-frame">
        <div id="scratch-area">
            <div class="reward-layer">
                <h3>You Unlocked</h3>
                <div class="points" id="points-value">0</div>
                <p style="margin:0; font-weight:bold; color:#777">OCC POINTS</p>
            </div>
            <canvas id="canvas"></canvas>
        </div>

        <div class="cooldown-overlay" id="timer-screen">
            <div class="timer-ring" id="countdown">15</div>
            <p style="margin:0; font-weight:600">Syncing with Club...</p>
        </div>
    </div>

    <div class="status-msg"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const walletEl = document.getElementById('wallet-amount');
        const walletBox = document.getElementById('wallet-box');
        const pointsEl = document.getElementById('points-value');
        const timerScreen = document.getElementById('timer-screen');
        const countdownEl = document.getElementById('countdown');
        
        let totalWallet = 0;
        let currentPoints = 0;
        let isDrawing = false;
        let isScratchedComplete = false;
        const size = 300;

        function init() {
            isScratchedComplete = false;
            canvas.width = size;
            canvas.height = size;
            
            // 5 से 50 के बीच रैंडम पॉइंट्स
            currentPoints = Math.floor(Math.random() * 46) + 5;
            pointsEl.innerText = currentPoints;

            // कवर डिजाइन
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#7b2ff7');
            grad.addColorStop(1, '#2b58f0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);

            // ब्रांडिंग
            ctx.font = "bold 40px Arial";
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.textAlign = "center";
            ctx.fillText("OCC", size/2, size/2 + 15);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function scratch(e) {
            if(isScratchedComplete) return;
            isDrawing = true;
            move(e);
        }

        function move(e) {
            if(!isDrawing || isScratchedComplete) return;
            const p = getPos(e);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(p.x, p.y, 25, 0, Math.PI * 2);
            ctx.fill();
            check();
        }

        function check() {
            const data = ctx.getImageData(0, 0, size, size).data;
            let clear = 0;
            for (let i = 3; i < data.length; i += 80) {
                if (data[i] === 0) clear++;
            }
            // 40% होने पर दावा करें
            if ((clear / (data.length / 80)) * 100 > 40) {
                complete();
            }
        }

        function complete() {
            if(isScratchedComplete) return;
            isScratchedComplete = true;
            isDrawing = false;
            ctx.clearRect(0, 0, size, size);

            // तुरंत वॉलेट अपडेट
            totalWallet += currentPoints;
            walletEl.innerText = totalWallet;
            
            // वॉलेट एनीमेशन
            walletBox.classList.add('bump');
            setTimeout(() => walletBox.classList.remove('bump'), 400);

            // 15 सेकंड का टाइमर
            setTimeout(() => {
                timerScreen.style.display = 'flex';
                let sec = 15;
                countdownEl.innerText = sec;
                const itv = setInterval(() => {
                    sec--;
                    countdownEl.innerText = sec;
                    if(sec <= 0) {
                        clearInterval(itv);
                        timerScreen.style.display = 'none';
                        init();
                    }
                }, 1000);
            }, 500);
        }

        canvas.addEventListener('mousedown', scratch);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); scratch(e); });
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', (e) => { move(e); });
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);

        init();
    </script>
</body>
</html>
