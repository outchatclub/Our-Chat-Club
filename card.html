<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC - Scratch & Win</title>
    <style>
        :root {
            --primary: #4338ca;
            --bg: #0a0b10;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .wallet-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid var(--primary);
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(67, 56, 202, 0.3);
        }

        #wallet-amount { font-weight: 900; font-size: 1.8rem; }

        .card-frame {
            position: relative;
            width: 320px;
            height: 320px;
            background: #161822;
            border-radius: 30px;
            padding: 10px;
        }

        #scratch-area {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: white;
        }

        .reward-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
            z-index: 1;
        }

        .points { font-size: 4.5rem; font-weight: 900; color: var(--primary); margin: 0; }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            cursor: crosshair;
            border-radius: 20px;
        }

        .progress-bar {
            width: 320px;
            height: 8px;
            background: #161822;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.2s;
        }

        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 11, 16, 0.98);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }

        .timer-ring {
            width: 60px; height: 60px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="wallet-container">
        💰 <span id="wallet-amount">...</span>
    </div>

    <div class="card-frame">
        <div id="scratch-area">
            <div class="reward-layer">
                <p style="margin:0; opacity:0.5; font-size: 12px;">REVEALED</p>
                <div class="points" id="points-display">0</div>
                <p style="margin:0; font-weight:bold; color:#777">COINS</p>
            </div>
            <canvas id="canvas"></canvas>
        </div>
        <div class="cooldown-overlay" id="cooldown-screen">
            <div class="timer-ring" id="timer">15</div>
            <p>Next card loading...</p>
        </div>
    </div>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>
    <p style="font-size: 10px; margin-top: 5px; opacity: 0.6;">SCRATCH 40% TO CLAIM</p>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
            authDomain: "our-chat-club.firebaseapp.com",
            projectId: "our-chat-club",
            storageBucket: "our-chat-club.appspot.com",
            messagingSenderId: "367123498765", 
            appId: "1:367123498765:web:865f573f309a1e06579848"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const pointsDisplay = document.getElementById('points-display');
        const progressFill = document.getElementById('progress-fill');
        
        let isDrawing = false;
        let isClaimed = false;
        let currentUser = null;
        let currentPoints = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    document.getElementById('wallet-amount').innerText = doc.data()?.wallet || 0;
                });
            } else { window.location.href = 'index.html'; }
        });

        function initCard() {
            isClaimed = false;
            canvas.width = 300;
            canvas.height = 300;
            currentPoints = Math.floor(Math.random() * 46) + 5;
            pointsDisplay.innerText = currentPoints;
            progressFill.style.width = '0%';

            const grad = ctx.createLinearGradient(0, 0, 300, 300);
            grad.addColorStop(0, '#4338ca');
            grad.addColorStop(1, '#6366f1');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 300, 300);
            
            ctx.font = "bold 20px Inter";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.fillText("SCRATCH HERE", 150, 155);
            
            ctx.globalCompositeOperation = 'destination-out';
        }

        function getScratchPercentage() {
            const pixels = ctx.getImageData(0, 0, 300, 300).data;
            let count = 0;
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) count++;
            }
            return (count / (300 * 300)) * 100;
        }

        async function handleScratch(e) {
            if (isClaimed) return;
            isDrawing = true;
            scratch(e);
        }

        function scratch(e) {
            if (!isDrawing || isClaimed) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.pageX || e.touches[0].pageX) - rect.left;
            const y = (e.pageY || e.touches[0].pageY) - rect.top;

            ctx.lineWidth = 40;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y);
            ctx.stroke();

            const percent = getScratchPercentage();
            progressFill.style.width = Math.min(percent / 0.4, 100) + '%';

            if (percent >= 40) claim();
        }

        async function claim() {
            isClaimed = true;
            canvas.style.pointerEvents = 'none';
            ctx.clearRect(0, 0, 300, 300);
            
            try {
                await db.collection('users').doc(currentUser.uid).set({
                    wallet: firebase.firestore.FieldValue.increment(currentPoints)
                }, { merge: true });

                setTimeout(() => {
                    const screen = document.getElementById('cooldown-screen');
                    screen.style.display = 'flex';
                    let timeLeft = 15;
                    const timer = setInterval(() => {
                        timeLeft--;
                        document.getElementById('timer').innerText = timeLeft;
                        if (timeLeft <= 0) {
                            clearInterval(timer);
                            screen.style.display = 'none';
                            canvas.style.pointerEvents = 'auto';
                            initCard();
                        }
                    }, 1000);
                }, 1000);
            } catch (err) { console.error(err); isClaimed = false; }
        }

        canvas.addEventListener('mousedown', handleScratch);
        canvas.addEventListener('touchstart', handleScratch);
        window.addEventListener('mousemove', scratch);
        window.addEventListener('touchmove', scratch);
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);

        initCard();
    </script>
</body>
</html>
