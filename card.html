<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Professional Scratch</title>
    <style>
        :root {
            --primary: #4338ca;
            --secondary: #2b58f0;
            --accent: #00f2ff;
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .wallet-container {
            background: var(--glass);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px rgba(67, 56, 202, 0.3);
        }

        #wallet-amount {
            font-weight: 900;
            font-size: 1.8rem;
            color: white;
        }

        .card-frame {
            position: relative;
            width: 320px;
            height: 320px;
            background: #161822;
            border-radius: 30px;
            padding: 10px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        #scratch-area {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }

        .reward-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            color: #1a1a1a;
            z-index: 1;
        }

        .points { font-size: 4.5rem; font-weight: 900; color: #4338ca; margin: 0; }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            border-radius: 20px;
            cursor: crosshair;
        }

        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 11, 16, 0.98);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            text-align: center;
        }

        .timer-ring {
            width: 80px; height: 80px;
            border: 4px solid #4338ca;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .back-btn {
            margin-top: 20px;
            color: #4338ca;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="wallet-container">
        <span style="font-size: 1.2rem;">💰</span>
        <span id="wallet-amount">Loading...</span>
    </div>

    <div class="card-frame">
        <div id="scratch-area">
            <div class="reward-layer">
                <p style="margin:0; opacity:0.6;">YOU WON</p>
                <div class="points" id="points-display">0</div>
                <p style="margin:0; font-weight:bold; color:#777">POINTS</p>
            </div>
            <canvas id="canvas"></canvas>
        </div>

        <div class="cooldown-overlay" id="cooldown-screen">
            <div class="timer-ring" id="timer">15</div>
            <p>Next Card in...</p>
        </div>
    </div>

    <a href="index.html" class="back-btn">← Back to Dashboard</a>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Updated with info from your index.html
        const firebaseConfig = {
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
            authDomain: "our-chat-club.firebaseapp.com",
            projectId: "our-chat-club",
            storageBucket: "our-chat-club.appspot.com",
            messagingSenderId: "367123498765", 
            appId: "1:367123498765:web:865f573f309a1e06579848" // Extracted ID
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const walletDisplay = document.getElementById('wallet-amount');
        const pointsDisplay = document.getElementById('points-display');
        const cooldownScreen = document.getElementById('cooldown-screen');
        const timerDisplay = document.getElementById('timer');

        let currentPoints = 0;
        let isClaimed = false;
        let currentUser = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                // Listen for wallet updates
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        walletDisplay.innerText = doc.data().wallet || 0;
                    } else {
                        walletDisplay.innerText = "0";
                    }
                });
            } else {
                window.location.href = 'index.html'; // Redirect if not logged in
            }
        });

        function initCard() {
            isClaimed = false;
            canvas.width = 300;
            canvas.height = 300;
            currentPoints = Math.floor(Math.random() * 46) + 5;
            pointsDisplay.innerText = currentPoints;

            // Indigo Gradient to match your theme
            const grad = ctx.createLinearGradient(0, 0, 300, 300);
            grad.addColorStop(0, '#4338ca');
            grad.addColorStop(1, '#6366f1');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 300, 300);

            ctx.font = "bold 24px Inter, sans-serif";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.fillText("TAP TO REVEAL", 150, 155);
        }

        async function claimNow() {
            if (isClaimed || !currentUser) return;
            isClaimed = true;

            // Visual feedback: Clear canvas
            ctx.clearRect(0, 0, 300, 300);

            try {
                const userRef = db.collection('users').doc(currentUser.uid);
                
                // Increment wallet in Firestore
                await userRef.set({
                    wallet: firebase.firestore.FieldValue.increment(currentPoints)
                }, { merge: true });

                // Show cooldown screen
                setTimeout(() => {
                    cooldownScreen.style.display = 'flex';
                    let left = 15;
                    timerDisplay.innerText = left;
                    const clock = setInterval(() => {
                        left--;
                        timerDisplay.innerText = left;
                        if (left <= 0) {
                            clearInterval(clock);
                            cooldownScreen.style.display = 'none';
                            initCard();
                        }
                    }, 1000);
                }, 1000);

            } catch (e) {
                console.error("Error updating wallet: ", e);
                alert("Failed to claim points. Try again.");
                isClaimed = false;
                initCard();
            }
        }

        canvas.addEventListener('click', claimNow);
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            claimNow(); 
        });

        initCard();
    </script>
</body>
</html>
