<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Professional Scratch</title>
    <style>
        :root {
            --primary: #7b2ff7;
            --secondary: #2b58f0;
            --accent: #00f2ff;
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .wallet-container {
            background: var(--glass);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        /* Animation for when points are added */
        .wallet-update {
            transform: scale(1.15);
            border-color: var(--accent);
            background: rgba(0, 242, 255, 0.1);
        }

        #wallet-amount {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--accent);
        }

        .card-frame {
            position: relative;
            width: 320px;
            height: 320px;
            background: #161822;
            border-radius: 30px;
            padding: 10px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #scratch-area {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }

        .reward-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle, #ffffff 0%, #e8e8e8 100%);
            color: #1a1a1a;
            z-index: 1;
        }

        .reward-layer h3 { margin: 0; font-size: 0.9rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
        .reward-layer .points { font-size: 4.5rem; font-weight: 900; color: var(--secondary); line-height: 1; margin: 5px 0; }

        #canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            touch-action: none;
        }

        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 11, 16, 0.98);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .timer-ring {
            width: 80px; height: 80px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(123, 47, 247, 0.4);
        }

        .status-msg { margin-top: 25px; height: 20px; }
    </style>
</head>
<body>

    <div class="wallet-container" id="wallet-ui">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>
        <span id="wallet-amount">0</span>
    </div>

    <div class="card-frame">
        <div id="scratch-area">
            <div class="reward-layer">
                <h3>You Unlocked</h3>
                <div class="points" id="points-value">0</div>
                <p style="margin:0; font-weight:800; color:#888; font-size: 0.8rem;">OCC POINTS</p>
            </div>
            <canvas id="canvas"></canvas>
        </div>

        <div class="cooldown-overlay" id="timer-screen">
            <div class="timer-ring" id="countdown">15</div>
            <p style="margin:0; font-weight:600; color: #fff; opacity: 0.8;">Syncing with Club...</p>
        </div>
    </div>

    <div class="status-msg"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const walletEl = document.getElementById('wallet-amount');
        const walletUI = document.getElementById('wallet-ui');
        const pointsEl = document.getElementById('points-value');
        const timerScreen = document.getElementById('timer-screen');
        const countdownEl = document.getElementById('countdown');
        
        // GLOBAL STATE - Ensures points persist between cards
        let totalWallet = 0; 
        let currentPoints = 0;
        let isDrawing = false;
        let isScratchedComplete = false;
        const width = 300;
        const height = 300;

        function init() {
            isScratchedComplete = false;
            canvas.width = width;
            canvas.height = height;
            
            // Random points 5-50
            currentPoints = Math.floor(Math.random() * (50 - 5 + 1)) + 5;
            pointsEl.innerText = currentPoints;

            // Draw Card Cover
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#7b2ff7'); 
            gradient.addColorStop(1, '#2b58f0'); 
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Subtle Pattern
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            for(let i=0; i<100; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*width, Math.random()*height, Math.random()*2, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.font = "bold 40px sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.textAlign = "center";
            ctx.fillText("OCC", width/2, height/2 + 15);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function scratch(e) {
            if(isScratchedComplete) return;
            isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if(!isDrawing || isScratchedComplete) return;
            const pos = getPos(e);
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2);
            ctx.fill();

            // Frequency of checking progress
            checkProgress();
        }

        function checkProgress() {
            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;
            let clearPixels = 0;

            for (let i = 3; i < pixels.length; i += 40) {
                if (pixels[i] === 0) clearPixels++;
            }

            const percentage = (clearPixels / (pixels.length / 40)) * 100;

            // Threshold set to 40%
            if (percentage >= 40) {
                claimReward();
            }
        }

        function claimReward() {
            if(isScratchedComplete) return;
            isScratchedComplete = true;
            isDrawing = false;

            // 1. UPDATE WALLET IMMEDIATELY
            totalWallet += currentPoints;
            walletEl.innerText = totalWallet;

            // 2. VISUAL FEEDBACK
            walletUI.classList.add('wallet-update');
            setTimeout(() => walletUI.classList.remove('wallet-update'), 400);

            // 3. REVEAL ALL
            ctx.clearRect(0, 0, width, height);

            // 4. START COOLDOWN
            setTimeout(startCooldown, 800);
        }

        function startCooldown() {
            timerScreen.style.display = 'flex';
            let seconds = 15;
            countdownEl.innerText = seconds;

            const timer = setInterval(() => {
                seconds--;
                countdownEl.innerText = seconds;
                if(seconds <= 0) {
                    clearInterval(timer);
                    timerScreen.style.display = 'none';
                    init();
                }
            }, 1000);
        }

        canvas.addEventListener('mousedown', scratch);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); scratch(e); }, {passive: false});
        window.addEventListener('mousemove', draw);
        window.addEventListener('touchmove', (e) => { draw(e); }, {passive: false});
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);

        init();
    </script>
</body>
</html>
