<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Professional Scratch</title>
    <style>
        :root {
            --primary: #7b2ff7;
            --secondary: #2b58f0;
            --accent: #00f2ff;
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .wallet-container {
            background: var(--glass);
            padding: 12px 28px;
            border-radius: 50px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 100;
        }

        #wallet-amount {
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--accent);
            min-width: 20px;
            display: inline-block;
        }

        .card-frame {
            position: relative;
            width: 320px;
            height: 320px;
            background: #161822;
            border-radius: 30px;
            padding: 10px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #scratch-area {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }

        .reward-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%);
            color: #1a1a1a;
            z-index: 1;
        }

        .reward-layer h3 { margin: 0; font-size: 0.9rem; opacity: 0.6; text-transform: uppercase; }
        .reward-layer .points { font-size: 4.5rem; font-weight: 900; color: var(--secondary); margin: 5px 0; }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            border-radius: 20px;
            cursor: crosshair;
        }

        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 11, 16, 0.98);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            backdrop-filter: blur(12px);
        }

        .timer-ring {
            width: 80px; height: 80px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 15px;
            box-shadow: 0 0 20px var(--primary);
        }
    </style>
</head>
<body>

    <div class="wallet-container">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>
        <span id="wallet-amount">0</span>
    </div>

    <div class="card-frame">
        <div id="scratch-area">
            <div class="reward-layer">
                <h3>You Unlocked</h3>
                <div class="points" id="points-value">0</div>
                <p style="margin:0; font-weight:bold; color:#777">OCC POINTS</p>
            </div>
            <canvas id="canvas"></canvas>
        </div>

        <div class="cooldown-overlay" id="timer-screen">
            <div class="timer-ring" id="countdown">15</div>
            <p style="margin:0; font-weight:600">Syncing with Club...</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const walletAmountEl = document.getElementById('wallet-amount');
        const pointsValueEl = document.getElementById('points-value');
        const timerScreen = document.getElementById('timer-screen');
        const countdownEl = document.getElementById('countdown');
        
        let walletTotal = 0;
        let currentCardPoints = 0;
        let isDragging = false;
        let scratchFinished = false;
        const canvasSize = 300;

        function setupCard() {
            scratchFinished = false;
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            
            // ৫ থেকে ৫০ এর মধ্যে র‍্যান্ডম পয়েন্ট
            currentCardPoints = Math.floor(Math.random() * (50 - 5 + 1)) + 5;
            pointsValueEl.innerText = currentCardPoints;

            // প্রফেশনাল গ্রেডিয়েন্ট কভার
            const gradient = ctx.createLinearGradient(0, 0, canvasSize, canvasSize);
            gradient.addColorStop(0, '#7b2ff7');
            gradient.addColorStop(1, '#2b58f0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvasSize, canvasSize);

            // ব্র্যান্ডিং টেক্সট
            ctx.font = "bold 45px sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.textAlign = "center";
            ctx.fillText("OCC", canvasSize/2, canvasSize/2 + 15);
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handleScratch(e) {
            if(scratchFinished) return;
            isDragging = true;
            processMove(e);
        }

        function processMove(e) {
            if(!isDragging || scratchFinished) return;
            const pos = getMousePos(e);
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 28, 0, Math.PI * 2);
            ctx.fill();

            checkScratchProgress();
        }

        function checkScratchProgress() {
            const pixels = ctx.getImageData(0, 0, canvasSize, canvasSize).data;
            let transparent = 0;
            
            // পারফরম্যান্সের জন্য প্রতি ৮০তম পিক্সেল চেক করা হচ্ছে
            for (let i = 3; i < pixels.length; i += 80) {
                if (pixels[i] === 0) transparent++;
            }

            const percent = (transparent / (pixels.length / 80)) * 100;

            // ৪০% স্ক্র্যাচ হলে ওয়ালেটে পয়েন্ট যোগ হবে
            if (percent >= 40) {
                claimPoints();
            }
        }

        function claimPoints() {
            if(scratchFinished) return;
            scratchFinished = true;
            isDragging = false;

            // ক্যানভাস ক্লিয়ার করে রিওয়ার্ড দেখানো
            ctx.clearRect(0, 0, canvasSize, canvasSize);

            // ওয়ালেট আপডেট করা (অবিলম্বে)
            walletTotal += currentCardPoints;
            walletAmountEl.innerText = walletTotal;

            // ১৫ সেকেন্ডের ওয়েট পিরিয়ড শুরু
            setTimeout(triggerCooldown, 600);
        }

        function triggerCooldown() {
            timerScreen.style.display = 'flex';
            let timeLeft = 15;
            countdownEl.innerText = timeLeft;

            const countdownInterval = setInterval(() => {
                timeLeft--;
                countdownEl.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    timerScreen.style.display = 'none';
                    setupCard();
                }
            }, 1000);
        }

        // ইভেন্ট লিসেনার
        canvas.addEventListener('mousedown', handleScratch);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleScratch(e); }, {passive: false});
        
        window.addEventListener('mousemove', processMove);
        window.addEventListener('touchmove', (e) => { processMove(e); }, {passive: false});
        
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        // অ্যাপ শুরু
        setupCard();
    </script>
</body>
</html>
