<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Professional Scratch</title>
    <style>
        :root {
            --primary: #7b2ff7;
            --secondary: #2b58f0;
            --accent: #00f2ff;
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .wallet-container {
            background: var(--glass);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid var(--accent);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        #wallet-amount {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--accent);
        }

        .card-frame {
            position: relative;
            width: 320px;
            height: 320px;
            background: #161822;
            border-radius: 30px;
            padding: 10px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        #scratch-area {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }

        .reward-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            color: #1a1a1a;
            z-index: 1;
        }

        .points { font-size: 4.5rem; font-weight: 900; color: var(--secondary); margin: 0; }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            border-radius: 20px;
            cursor: crosshair;
        }

        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 11, 16, 0.98);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }

        .timer-ring {
            width: 80px; height: 80px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="wallet-container">
        <span style="font-size: 1.2rem;">💰</span>
        <span id="wallet-amount">Loading...</span>
    </div>

    <div class="card-frame">
        <div id="scratch-area">
            <div class="reward-layer">
                <p style="margin:0; opacity:0.6;">YOU WON</p>
                <div class="points" id="points-display">0</div>
                <p style="margin:0; font-weight:bold; color:#777">POINTS</p>
            </div>
            <canvas id="canvas"></canvas>
        </div>

        <div class="cooldown-overlay" id="cooldown-screen">
            <div class="timer-ring" id="timer">15</div>
            <p>Next Card in...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // REPLACE THESE WITH YOUR ACTUAL CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const walletDisplay = document.getElementById('wallet-amount');
        const pointsDisplay = document.getElementById('points-display');
        const cooldownScreen = document.getElementById('cooldown-screen');
        const timerDisplay = document.getElementById('timer');

        let currentPoints = 0;
        let isClaimed = false;
        let currentUser = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        walletDisplay.innerText = doc.data().wallet || 0;
                    }
                });
            } else {
                walletDisplay.innerText = "Login!";
            }
        });

        function initCard() {
            isClaimed = false;
            canvas.width = 300;
            canvas.height = 300;
            currentPoints = Math.floor(Math.random() * 46) + 5;
            pointsDisplay.innerText = currentPoints;

            const grad = ctx.createLinearGradient(0, 0, 300, 300);
            grad.addColorStop(0, '#7b2ff7');
            grad.addColorStop(1, '#2b58f0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 300, 300);

            ctx.font = "bold 30px Arial";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.fillText("TAP TO REVEAL", 150, 160);
        }

        // INSTANT CLAIM ON TOUCH
        async function claimNow() {
            if (isClaimed || !currentUser) return;
            isClaimed = true;

            // Clear the cover immediately
            ctx.clearRect(0, 0, 300, 300);

            try {
                const userRef = db.collection('users').doc(currentUser.uid);
                await userRef.update({
                    wallet: firebase.firestore.FieldValue.increment(currentPoints)
                });

                // Start 15s Cooldown
                setTimeout(() => {
                    cooldownScreen.style.display = 'flex';
                    let left = 15;
                    timerDisplay.innerText = left;
                    const clock = setInterval(() => {
                        left--;
                        timerDisplay.innerText = left;
                        if (left <= 0) {
                            clearInterval(clock);
                            cooldownScreen.style.display = 'none';
                            initCard();
                        }
                    }, 1000);
                }, 500);

            } catch (e) {
                console.error(e);
                isClaimed = false;
            }
        }

        // Event listeners trigger claim on any contact
        canvas.addEventListener('mousedown', claimNow);
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            claimNow(); 
        });

        initCard();
    </script>
</body>
</html>
