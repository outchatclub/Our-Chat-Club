<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Support - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* Animated Gradient Text */
        .coming-soon-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            background: linear-gradient(to right, #4338ca 20%, #0ea5e9 40%, #0ea5e9 60%, #4338ca 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            text-fill-color: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Pulse Glow Effect */
        .glow-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(67, 56, 202, 0.1);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 0.8; }
        }

        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-slate-900">

    <div class="glow-circle"></div>

    <div class="text-center px-6">
        <div class="mb-4">
            <h1 class="text-6xl font-black text-indigo-700 tracking-tighter mb-2">OCC</h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">Support Center</p>
        </div>

        <div class="relative py-10">
            <h2 class="coming-soon-text sm:text-7xl">COMING<br>SOON</h2>
        </div>

        <p class="text-slate-500 font-medium text-sm max-w-xs mx-auto mb-10 leading-relaxed">
            We're building a world-class help center for the club. Stay tuned!
        </p>

        <button onclick="location.href='index.html'" class="btn-press bg-white border border-slate-200 px-8 py-4 rounded-2xl text-[11px] font-black text-indigo-600 uppercase tracking-widest shadow-sm hover:shadow-md transition-all">
            ← Back to Dashboard
        </button>
    </div>

    <div class="fixed bottom-10 text-[9px] font-bold text-slate-300 uppercase tracking-[0.3em]">
        Our Chat Club © 2026
    </div>

</body>
</html>
