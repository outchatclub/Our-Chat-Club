<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Chat Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8faff; }
        .brand-gradient { background: linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb); }
        .brand-text { background: linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb); -webkit-background-clip: text; color: transparent; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <main class="flex-grow flex items-center justify-center p-4">
        <div id="auth-container" class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold brand-text">Our Chat Club</h1>
                <p class="text-gray-500" id="auth-title">Welcome back!</p>
            </div>

            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <input id="password" type="password" placeholder="Password" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                
                <button id="main-btn" class="w-full p-4 text-white font-bold brand-gradient rounded-2xl shadow-lg">Login</button>
                <button id="toggle-auth" class="w-full text-indigo-600 text-sm font-semibold">New here? Create account</button>
            </div>
        </div>

        <div id="menu-container" class="hidden w-full max-w-md space-y-4">
            <h1 class="text-3xl font-extrabold brand-text text-center mb-6">OCC Dashboard</h1>
            <a href="news.html" class="block p-6 bg-white rounded-3xl shadow-md hover:scale-105 transition-transform">
                <span class="text-2xl">📰</span>
                <span class="ml-4 font-bold text-lg text-gray-800">Latest News</span>
            </a>
            <a href="minigame.html" class="block p-6 bg-white rounded-3xl shadow-md hover:scale-105 transition-transform">
                <span class="text-2xl">🎮</span>
                <span class="ml-4 font-bold text-lg text-gray-800">Mini Game</span>
            </a>
            <a id="admin-link" href="admin.html" class="hidden block p-6 bg-indigo-50 border-2 border-indigo-200 rounded-3xl">
                <span class="text-2xl">🔑</span>
                <span class="ml-4 font-bold text-lg text-indigo-700">Admin Panel</span>
            </a>
            <button id="logout-btn" class="w-full p-3 text-red-500 font-medium">Logout</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        const ADMIN_EMAIL = "admin@occ.com"; // Change to your actual admin email

        let isLogin = true;

        document.getElementById("toggle-auth").onclick = () => {
            isLogin = !isLogin;
            document.getElementById("auth-title").innerText = isLogin ? "Welcome back!" : "Join the Club";
            document.getElementById("main-btn").innerText = isLogin ? "Login" : "Register";
            document.getElementById("toggle-auth").innerText = isLogin ? "New here? Create account" : "Have an account? Login";
        };

        document.getElementById("main-btn").onclick = async () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            try {
                if(isLogin) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch(e) { alert(e.message); }
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById("auth-container").classList.add("hidden");
                document.getElementById("menu-container").classList.remove("hidden");
                if(user.email === ADMIN_EMAIL) document.getElementById("admin-link").classList.remove("hidden");
            } else {
                document.getElementById("auth-container").classList.remove("hidden");
                document.getElementById("menu-container").classList.add("hidden");
            }
        });

        document.getElementById("logout-btn").onclick = () => signOut(auth);
    </script>
</body>
</html>
