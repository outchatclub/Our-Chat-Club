<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC - Official</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1340372907809425" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .brand-indigo { color: #4338ca; }
        .brand-bg-indigo { background-color: #4338ca; }
        .hidden { display: none !important; }
        .btn-press:active { transform: scale(0.96); }
        input { border: 1px solid #e2e8f0; border-radius: 1.25rem; padding: 16px; width: 100%; margin-bottom: 24px; outline: none; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .overlay-active { opacity: 1 !important; pointer-events: auto !important; }
    </style>
</head>
<body class="text-slate-900">
    <div id="sidebar-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-slate-900/40 z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>
    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white z-[70] shadow-2xl -translate-x-full flex flex-col p-8">
        <div class="mb-10 flex justify-between items-center">
            <h2 class="text-3xl font-black brand-indigo">MENU</h2>
            <button onclick="toggleMenu()" class="text-slate-400 text-2xl font-bold">&times;</button>
        </div>
        <nav class="flex flex-col gap-4">
            <button onclick="location.reload()" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700">🏠 Home</button>
            <a href="support.html" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700">🆘 Get Help</a>
        </nav>
    </div>

    <div id="ann-bar" class="hidden brand-bg-indigo p-3 text-center text-white text-[11px] font-bold uppercase tracking-widest sticky top-0 z-50">
        <span id="ann-text-display"></span>
    </div>

    <div id="auth-section" class="hidden max-w-md mx-auto p-8 pt-20">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50 text-center">
            <div id="login-form">
                <h2 class="text-2xl font-black mb-8">Login</h2>
                <input type="email" id="login-email" placeholder="Email Address">
                <input type="password" id="login-pass" placeholder="Password">
                <button id="do-login" class="btn-press w-full brand-bg-indigo text-white py-4 rounded-2xl font-black">Login</button>
                <p class="text-xs mt-10">New? <button onclick="toggleAuth(false)" class="brand-indigo font-black">Join Club</button></p>
            </div>
            <div id="signup-form" class="hidden">
                <h2 class="text-2xl font-black mb-8">Join OCC</h2>
                <input type="text" id="reg-name" placeholder="Full Name">
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-pass" placeholder="Password">
                <button id="do-signup" class="btn-press w-full brand-bg-indigo text-white py-4 rounded-2xl font-black">Create Account</button>
                <p class="text-xs mt-10"><button onclick="toggleAuth(true)" class="brand-indigo font-black">Back to Login</button></p>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="hidden max-w-md mx-auto p-6 pb-24">
        <div class="flex justify-between items-center mb-8 mt-2">
            <button onclick="toggleMenu()" class="btn-press bg-white p-3 rounded-2xl shadow-sm border border-slate-100 text-indigo-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-3xl font-black brand-indigo tracking-tighter">OCC</h1>
            <button id="logout-btn" class="text-xs font-black text-red-500">LOGOUT</button>
        </div>

        <section class="mb-10">
            <div class="gtranslate_wrapper mb-4"></div>
            <script>window.gtranslateSettings = {"default_language":"en","native_language_names":true,"detect_browser_language":true,"wrapper_selector":".gtranslate_wrapper","switcher_horizontal_position":"inline"}</script>
            <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>
            
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">Latest Feed</h3>
            <div id="news-feed" class="space-y-4"></div>
            <button onclick="location.href='news.html'" class="w-full mt-6 py-4 bg-white border rounded-2xl text-[11px] font-black text-slate-400 uppercase">View History</button>
        </section>

        <section class="mb-12">
            <button onclick="location.href='minigame.html'" class="w-full bg-white border p-6 rounded-[2.5rem] flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-5">
                    <div class="brand-bg-indigo w-14 h-14 rounded-3xl flex items-center justify-center text-2xl">🎮</div>
                    <span class="font-black text-slate-800 text-lg">MINI GAMES</span>
                </div>
                <span class="text-indigo-600 font-bold text-xl">➜</span>
            </button>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, query, collection, orderBy, limit, serverTimestamp, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.toggleMenu = () => { document.getElementById("sidebar").classList.toggle("sidebar-open"); document.getElementById("sidebar-overlay").classList.toggle("overlay-active"); };
        window.toggleAuth = (isLogin) => { document.getElementById("login-form").classList.toggle("hidden", !isLogin); document.getElementById("signup-form").classList.toggle("hidden", isLogin); };

        onAuthStateChanged(auth, user => {
            document.getElementById("auth-section").classList.toggle("hidden", !!user);
            document.getElementById("main-dashboard").classList.toggle("hidden", !user);
            if(user) loadData();
        });

        document.getElementById("do-login").onclick = () => signInWithEmailAndPassword(auth, document.getElementById("login-email").value, document.getElementById("login-pass").value).catch(e => alert(e.message));
        document.getElementById("do-signup").onclick = async () => {
            const name = document.getElementById("reg-name").value;
            const email = document.getElementById("reg-email").value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, document.getElementById("reg-pass").value);
                await updateProfile(res.user, { displayName: name });
                await setDoc(doc(db, "users", res.user.uid), { name, email, createdAt: serverTimestamp() });
            } catch(e) { alert(e.message); }
        };
        document.getElementById("logout-btn").onclick = () => signOut(auth);

        function loadData() {
            onSnapshot(doc(db, "settings", "announcement"), s => {
                const d = s.data();
                const bar = document.getElementById("ann-bar");
                if(d && d.expiry > Date.now()) {
                    document.getElementById("ann-text-display").innerText = d.text;
                    bar.classList.remove("hidden");
                } else bar.classList.add("hidden");
            });

            const newsQ = query(collection(db, "news"), orderBy("createdAt", "desc"), limit(3));
            onSnapshot(newsQ, snap => {
                const feed = document.getElementById("news-feed");
                feed.innerHTML = "";
                snap.forEach(sDoc => {
                    const d = sDoc.data();
                    const isLiked = d.likes?.includes(auth.currentUser?.uid);
                    
                    let postDate = "Just now";
                    if (d.createdAt) {
                        const dateObj = d.createdAt.toDate();
                        postDate = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + " • " + dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                    }

                    feed.innerHTML += `
                        <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex-1">
                                    <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest mb-1">${postDate}</p>
                                    <h4 class="font-black text-slate-800 text-lg leading-tight mb-1">${d.title}</h4>
                                    <p class="text-slate-500 text-[11px]">${(d.content || "").substring(0, 60)}...</p>
                                </div>
                                <img src="${d.imageUrl || 'news.png'}" class="w-16 h-16 rounded-2xl object-cover ml-4 border">
                            </div>
                            <button onclick="window.toggleLike('${sDoc.id}', ${isLiked})" class="text-[11px] font-black ${isLiked ? 'text-red-500' : 'text-slate-400'}">${isLiked ? '❤️' : '🤍'} ${d.likes?.length || 0}</button>
                        </div>`;
                });
            });
        }
        window.toggleLike = (id, currentlyLiked) => updateDoc(doc(db, "news", id), { likes: currentlyLiked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) });
    </script>
</body>
</html>
