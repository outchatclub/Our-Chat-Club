<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Chat Club | Purely Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .post-card { transition: transform 0.2s; }
        .post-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight text-indigo-600">Our Chat Club</h1>
            <div id="nav-auth-links">
                <button id="logout-btn" class="hidden text-sm font-medium text-gray-600 hover:text-red-500">Sign Out</button>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto py-8 px-4">
        
        <section id="auth-section" class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-center" id="auth-title">Welcome to the Club</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <div class="flex flex-col gap-3">
                    <button id="login-btn" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700">Login</button>
                    <button id="signup-btn" class="w-full bg-gray-100 text-gray-700 font-semibold py-3 rounded-lg hover:bg-gray-200">Create Account</button>
                </div>
            </div>
        </section>

        <section id="feed-section" class="hidden space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <textarea id="post-content" rows="3" placeholder="What's on your mind? (Text only)" class="w-full p-3 bg-gray-50 border-none rounded-lg focus:ring-0 resize-none text-lg"></textarea>
                <div class="flex justify-end mt-2">
                    <button id="submit-post" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-medium hover:bg-indigo-700">Post</button>
                </div>
            </div>

            <div id="posts-container" class="space-y-4">
                </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
            authDomain: "our-chat-club.firebaseapp.com",
            projectId: "our-chat-club",
            storageBucket: "our-chat-club.firebasestorage.app",
            messagingSenderId: "533265719248",
            appId: "1:533265719248:web:e4f61e9267c64b0b3663d5",
            measurementId: "G-1RZKH72PH2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const authSection = document.getElementById('auth-section');
        const feedSection = document.getElementById('feed-section');
        const postsContainer = document.getElementById('posts-container');
        const logoutBtn = document.getElementById('logout-btn');

        // Auth Listeners
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.classList.add('hidden');
                feedSection.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                loadPosts();
            } else {
                authSection.classList.remove('hidden');
                feedSection.classList.add('hidden');
                logoutBtn.classList.add('hidden');
                postsContainer.innerHTML = '';
            }
        });

        // Sign Up
        document.getElementById('signup-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await createUserWithEmailAndPassword(auth, email, pass); } 
            catch (e) { alert(e.message); }
        };

        // Login
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { alert(e.message); }
        };

        // Logout
        logoutBtn.onclick = () => signOut(auth);

        // Create Post
        document.getElementById('submit-post').onclick = async () => {
            const content = document.getElementById('post-content').value;
            if (!content.trim()) return;

            try {
                await addDoc(collection(db, "posts"), {
                    text: content,
                    author: auth.currentUser.email,
                    uid: auth.currentUser.uid,
                    createdAt: serverTimestamp()
                });
                document.getElementById('post-content').value = '';
            } catch (e) { console.error("Error adding post: ", e); }
        };

        // Load Posts Real-time
        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                postsContainer.innerHTML = '';
                snapshot.forEach((doc) => {
                    const post = doc.data();
                    const postEl = document.createElement('div');
                    postEl.className = "bg-white p-6 rounded-xl border border-gray-100 shadow-sm post-card";
                    postEl.innerHTML = `
                        <p class="text-xs font-bold text-indigo-500 mb-1 uppercase tracking-wider">${post.author.split('@')[0]}</p>
                        <p class="text-gray-800 leading-relaxed">${post.text}</p>
                        <p class="text-[10px] text-gray-400 mt-4">${post.createdAt?.toDate().toLocaleString() || 'Just now'}</p>
                    `;
                    postsContainer.appendChild(postEl);
                });
            });
        }
    </script>
</body>
</html>
