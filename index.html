<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .brand-indigo { color: #4338ca; }
        .brand-bg-indigo { background-color: #4338ca; }
        .hidden { display: none !important; }
        .btn-press:active { transform: scale(0.96); }
        input { border: 1px solid #e2e8f0; border-radius: 1.25rem; padding: 16px; width: 100%; margin-bottom: 20px; outline: none; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .overlay-active { opacity: 1 !important; pointer-events: auto !important; }
        
        /* New Wallet Style matching your brand */
        .wallet-float {
            position: fixed;
            top: 65px; /* Placed below the announcement bar */
            right: 20px;
            background: white;
            padding: 8px 16px;
            border-radius: 50px;
            border: 2px solid #4338ca;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(67, 56, 202, 0.15);
            z-index: 40;
        }
    </style>
</head>
<body class="text-slate-900">
    <div id="sidebar-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-slate-900/40 z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>
    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white z-[70] shadow-2xl -translate-x-full flex flex-col p-8">
        <div class="mb-10 flex justify-between items-center">
            <h2 class="text-3xl font-black brand-indigo tracking-tighter">MENU</h2>
            <button onclick="toggleMenu()" class="text-slate-400 text-2xl font-bold">&times;</button>
        </div>
        <nav class="flex flex-col gap-4">
            <button onclick="location.reload()" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 transition-all"><span>🏠</span> Home</button>
            <a href="https://www.youtube.com/@ourchatclub" target="_blank" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700 hover:bg-red-50 hover:text-red-600 transition-all"><span>📺</span> YouTube</a>
            <a href="https://www.instagram.com/ourchatclub.in?igsh=Z3U2ajg1Z3VndHA1" target="_blank" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700 hover:bg-pink-50 hover:text-pink-600 transition-all"><span>📸</span> Instagram</a>
            <a href="support.html" class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 font-black text-slate-700 hover:bg-sky-50 hover:text-sky-600 transition-all"><span>🎧</span> Get Help</a>
        </nav>
    </div>

    <div id="ann-bar" class="hidden brand-bg-indigo p-3 text-center text-white text-[11px] font-bold uppercase tracking-widest sticky top-0 z-50">
        <span id="ann-text-display"></span>
    </div>

    <div id="index-wallet" class="hidden wallet-float">
        <span style="font-size: 1.2rem;">💰</span>
        <span id="wallet-amount-index" class="font-black brand-indigo text-lg">...</span>
    </div>

    <div id="auth-section" class="hidden max-w-md mx-auto p-8 pt-20">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50 text-center">
            <div id="login-form">
                <h2 class="text-2xl font-black mb-8">Login</h2>
                <input type="email" id="login-email" placeholder="Email Address">
                <input type="password" id="login-pass" placeholder="Password">
                <button id="do-login" class="btn-press w-full brand-bg-indigo text-white py-4 rounded-2xl font-black shadow-lg">Login</button>
                <p class="text-xs mt-10">New? <button onclick="toggleAuth(false)" class="brand-indigo font-black">Join Club</button></p>
            </div>
            <div id="signup-form" class="hidden">
                <h2 class="text-2xl font-black mb-8">Join OCC</h2>
                <input type="text" id="reg-name" placeholder="Full Name">
                <input type="email" id="reg-email" placeholder="Email Address">
                <input type="password" id="reg-pass" placeholder="Password">
                <button id="do-signup" class="btn-press w-full brand-bg-indigo text-white py-4 rounded-2xl font-black shadow-lg">Sign Up</button>
                <p class="text-xs mt-10"><button onclick="toggleAuth(true)" class="brand-indigo font-black">Back to Login</button></p>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="hidden max-w-md mx-auto p-6 pb-24">
        <div class="flex justify-between items-center mb-8 mt-2">
            <button onclick="toggleMenu()" class="btn-press bg-white p-3 rounded-2xl shadow-sm border border-slate-100 text-indigo-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-3xl font-black brand-indigo tracking-tighter leading-none">OCC</h1>
            <button id="logout-btn" class="text-[10px] font-black text-red-500 uppercase tracking-widest">Logout</button>
        </div>

        <button onclick="location.href='donateus.html'" class="btn-press w-full mb-8 py-4 brand-bg-indigo text-white rounded-2xl font-black text-[12px] uppercase tracking-widest shadow-lg">
            Donate Us
        </button>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="location.href='minigame.html'" class="btn-press bg-white border border-slate-100 p-5 rounded-[2.5rem] shadow-sm flex flex-col items-center justify-center gap-3">
                <div class="brand-bg-indigo w-14 h-14 rounded-3xl flex items-center justify-center text-2xl shadow-inner">🎮</div>
                <span class="font-black text-slate-800 text-[11px] uppercase tracking-tighter">Mini Game</span>
            </button>
            <button onclick="location.href='card.html'" class="btn-press bg-white border border-slate-100 p-5 rounded-[2.5rem] shadow-sm flex flex-col items-center justify-center gap-3">
                <div class="bg-amber-400 w-14 h-14 rounded-3xl flex items-center justify-center text-2xl shadow-inner">✨</div>
                <span class="font-black text-slate-800 text-[11px] uppercase tracking-tighter">Scratch Card</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.toggleMenu = () => { 
            document.getElementById("sidebar").classList.toggle("sidebar-open"); 
            document.getElementById("sidebar-overlay").classList.toggle("overlay-active"); 
        };
        
        window.toggleAuth = (isLogin) => { 
            document.getElementById("login-form").classList.toggle("hidden", !isLogin); 
            document.getElementById("signup-form").classList.toggle("hidden", isLogin); 
        };

        onAuthStateChanged(auth, user => {
            document.getElementById("auth-section").classList.toggle("hidden", !!user);
            document.getElementById("main-dashboard").classList.toggle("hidden", !user);
            document.getElementById("index-wallet").classList.toggle("hidden", !user);
            
            if(user) {
                // Wallet Sync
                onSnapshot(doc(db, "users", user.uid), s => {
                    if(s.exists()) document.getElementById("wallet-amount-index").innerText = s.data().wallet || 0;
                });

                // Announcement Sync
                onSnapshot(doc(db, "settings", "announcement"), s => {
                    const d = s.data();
                    const bar = document.getElementById("ann-bar");
                    if(d && d.expiry > Date.now()) {
                        document.getElementById("ann-text-display").innerText = d.text;
                        bar.classList.remove("hidden");
                    } else bar.classList.add("hidden");
                });
            }
        });

        document.getElementById("do-login").onclick = () => {
            const email = document.getElementById("login-email").value;
            const pass = document.getElementById("login-pass").value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };

        document.getElementById("do-signup").onclick = async () => {
            const name = document.getElementById("reg-name").value;
            const email = document.getElementById("reg-email").value;
            const pass = document.getElementById("reg-pass").value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
            } catch(e) { alert(e.message); }
        };

        document.getElementById("logout-btn").onclick = () => signOut(auth);
    </script>
</body>
</html>
