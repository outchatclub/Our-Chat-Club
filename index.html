<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'occ-indigo': '#4338ca', // Main brand color
                        'occ-dark': '#0a0b10', // Page background
                        'occ-light': '#161822', // Card background
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0b10; }
        .feature-card { transition: all 0.3s ease; }
        .feature-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="text-white min-h-vh p-4 relative">

    <div class="fixed top-4 right-4 z-50">
        <div id="logged-in-wallet" class="hidden flex items-center gap-3 bg-[#161822] px-6 py-2.5 rounded-full border-2 border-occ-indigo shadow-[0_0_15px_rgba(67,56,202,0.3)]">
            <span class="text-2xl">💰</span>
            <span id="wallet-amount-index" class="font-black text-2xl tracking-tight">...</span>
            <span class="text-sm font-bold text-gray-400 mt-1">PTS</span>
        </div>
    </div>

    <div class="container mx-auto pt-24 pb-8"> <div id="loggedInView" class="hidden text-center space-y-6">
            <h1 id="userWelcome" class="text-3xl font-extrabold tracking-tighter sm:text-4xl">Welcome, OCC Fan</h1>
            
            <p id="userEmail" class="text-gray-400 text-sm italic"></p>
            
            <p class="text-gray-400 text-sm">Select a tool to explore OCC features.</p>
            
            <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto">
                <a href="card.html" class="feature-card block text-center space-y-2 bg-occ-light p-5 rounded-3xl border border-gray-800">
                    <span class="text-4xl block">🎁</span>
                    <span class="text-sm font-bold text-white">Scratch & Win</span>
                    <span class="text-xs block text-occ-indigo font-semibold">Earn Points</span>
                </a>
                <div class="feature-card block text-center space-y-2 bg-occ-light p-5 rounded-3xl border border-gray-800 opacity-60">
                    <span class="text-4xl block">🎮</span>
                    <span class="text-sm font-bold text-white">Mini Game</span>
                    <span class="text-xs block text-gray-500 font-semibold">Soon</span>
                </div>
                </div>
            
            <button id="logoutBtn" class="mt-8 text-xs text-gray-600 font-semibold">Log out of my profile</button>
        </div>

        <div id="loggedOutView" class="hidden text-center space-y-4">
            <h1 class="text-3xl font-black tracking-tight mt-12 sm:text-4xl">OCC PRO TOOLS</h1>
            <p class="text-gray-400 text-xs">Unlock exclusive OCC features.</p>
            
            <button onclick="document.getElementById('email').focus();" class="w-full max-w-sm mx-auto bg-occ-indigo text-white font-bold py-3 px-6 rounded-xl hover:bg-indigo-600 transition">
              Launch Pro
            </button>
            <a href="card.html" class="inline-block mt-4 text-occ-indigo font-semibold text-xs">Test Card without Login</a>
        </div>

    </div> <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
            authDomain: "our-chat-club.firebaseapp.com",
            projectId: "our-chat-club",
            storageBucket: "our-chat-club.appspot.com",
            messagingSenderId: "367123498765", 
            appId: "1:367123498765:web:865f573f309a1e06579848"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // DOM elements
        const loggedInView = document.getElementById('loggedInView');
        const loggedOutView = document.getElementById('loggedOutView');
        const walletIndex = document.getElementById('logged-in-wallet');
        const walletAmountIndex = document.getElementById('wallet-amount-index');
        const welcomeText = document.getElementById('userWelcome');
        const emailText = document.getElementById('userEmail');
        const logoutBtn = document.getElementById('logoutBtn');

        // Manage UI based on auth state
        auth.onAuthStateChanged(user => {
            if (user) {
                // User is signed in
                loggedOutView.classList.add('hidden');
                loggedInView.classList.remove('hidden');
                walletIndex.classList.remove('hidden'); // Show the wallet
                
                welcomeText.innerText = "Welcome, OCC Fan"; 
                emailText.innerText = user.email;

                // 2. UNIVERSAL REAL-TIME LISTENER (INDEX)
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        walletAmountIndex.innerText = doc.data().wallet || 0;
                    } else {
                        walletAmountIndex.innerText = "0";
                    }
                }, error => {
                    console.error("Wallet listener failed:", error);
                });

            } else {
                // User is signed out
                loggedInView.classList.add('hidden');
                walletIndex.classList.add('hidden'); // Hide the wallet
                loggedOutView.classList.remove('hidden');
            }
        });

        // Simple Logout function
        logoutBtn.addEventListener('click', () => {
            auth.signOut().then(() => {
                alert("You have been logged out.");
            });
        });
    </script>

</body>
</html>
