<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .brand-indigo { color: #4338ca; }
        .brand-bg-indigo { background-color: #4338ca; }
        .brand-sky { color: #0ea5e9; }
        .brand-bg-sky { background-color: #0ea5e9; }
        .vip-gradient { background: linear-gradient(135deg, #4338ca 0%, #1e1b4b 100%); }
        .hidden { display: none !important; }
        .btn-press:active { transform: scale(0.96); }
        
        /* Adjusted Spacing for Inputs */
        input { 
            border: 1px solid #e2e8f0; 
            border-radius: 1rem; 
            padding: 14px; 
            width: 100%; 
            margin-bottom: 18px; /* Increased gap between fields */
            outline: none; 
            transition: 0.2s; 
        }
        input:focus { border-color: #4338ca; box-shadow: 0 0 0 2px rgba(67, 56, 202, 0.1); }
    </style>
</head>
<body class="text-slate-900">

    <div id="ann-bar" class="hidden brand-bg-indigo p-3 text-center text-white text-[11px] font-bold uppercase tracking-widest sticky top-0 z-50">
        <span id="ann-text-display"></span>
    </div>

    <div id="auth-section" class="hidden max-w-md mx-auto p-8 pt-20">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black brand-indigo tracking-tighter mb-2">OCC</h1>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Join the Club</p>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
            <div id="login-form">
                <h2 class="text-xl font-black mb-6">Login</h2>
                <input type="email" id="login-email" placeholder="Email Address">
                <input type="password" id="login-pass" placeholder="Password">
                <button id="do-login" class="btn-press w-full brand-bg-indigo text-white py-4 rounded-2xl font-black mt-2 shadow-lg shadow-indigo-200">Login</button>
                <p class="text-center text-xs mt-8 text-slate-500 font-medium">New here? <button onclick="toggleAuth(false)" class="brand-sky font-black">Create Account</button></p>
            </div>

            <div id="signup-form" class="hidden">
                <h2 class="text-xl font-black mb-6">Create Account</h2>
                <input type="text" id="reg-name" placeholder="Full Name">
                <input type="email" id="reg-email" placeholder="Email Address">
                <input type="password" id="reg-pass" placeholder="Create Password">
                <button id="do-signup" class="btn-press w-full brand-bg-indigo text-white py-4 rounded-2xl font-black mt-2 shadow-lg shadow-indigo-200">Sign Up</button>
                <p class="text-center text-xs mt-8 text-slate-500 font-medium">Have an account? <button onclick="toggleAuth(true)" class="brand-indigo font-black">Login Instead</button></p>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="hidden max-w-md mx-auto p-6 pb-24">
        <div class="flex justify-between items-center mb-8 mt-2">
            <div>
                <h1 class="text-3xl font-black brand-indigo tracking-tighter">OCC</h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Official Dashboard</p>
            </div>
            <button id="logout-btn" class="btn-press bg-white border border-red-50 px-5 py-2 rounded-2xl text-xs font-black text-red-500 shadow-sm">LOGOUT</button>
        </div>

        <section class="mb-10">
            <div class="vip-gradient p-8 rounded-[2.5rem] shadow-2xl border-b-8 border-indigo-950">
                <h2 class="text-white font-black text-2xl mb-1 tracking-tight">👑 VIP PANEL</h2>
                <p id="user-display" class="text-indigo-300 text-[10px] font-bold uppercase tracking-widest mb-6">Member</p>
                <button id="vip-btn" class="btn-press w-full brand-bg-sky text-white py-4 rounded-2xl font-black text-sm uppercase">Enter Premium Zone</button>
            </div>
        </section>

        <section class="mb-10">
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-2 text-center">Latest News</h3>
            <div id="news-feed" class="space-y-4"></div>
            <button onclick="location.href='news.html'" class="btn-press w-full mt-6 py-4 bg-white border border-slate-200 rounded-2xl text-[11px] font-black text-slate-400 uppercase tracking-widest">More News</button>
        </section>

        <section>
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-2 text-center">Entertainment</h3>
            <button onclick="location.href='minigame.html'" class="btn-press w-full bg-white border border-slate-200 p-6 rounded-[2.5rem] flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-5">
                    <div class="brand-bg-indigo w-14 h-14 rounded-3xl flex items-center justify-center text-2xl">🎮</div>
                    <div class="text-left">
                        <span class="block font-black text-slate-800 text-lg">MINI GAMES</span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase">Enjoy & Relax</span>
                    </div>
                </div>
                <span class="brand-sky text-xl">➜</span>
            </button>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot, query, orderBy, limit, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", 
            authDomain: "our-chat-club.firebaseapp.com", 
            projectId: "our-chat-club" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.toggleAuth = (isLogin) => {
            document.getElementById("login-form").classList.toggle("hidden", !isLogin);
            document.getElementById("signup-form").classList.toggle("hidden", isLogin);
        };

        onAuthStateChanged(auth, (user) => {
            const authSec = document.getElementById("auth-section");
            const dashSec = document.getElementById("main-dashboard");
            if (user) {
                authSec.classList.add("hidden");
                dashSec.classList.remove("hidden");
                document.getElementById("user-display").innerText = `Logged in as: ${user.displayName || 'Member'}`;
                loadDashboardData();
            } else {
                authSec.classList.remove("hidden");
                dashSec.classList.add("hidden");
                document.getElementById("ann-bar").classList.add("hidden");
            }
        });

        document.getElementById("do-login").onclick = () => {
            const email = document.getElementById("login-email").value;
            const pass = document.getElementById("login-pass").value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };

        document.getElementById("do-signup").onclick = async () => {
            const name = document.getElementById("reg-name").value;
            const email = document.getElementById("reg-email").value;
            const pass = document.getElementById("reg-pass").value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
            } catch (e) { alert(e.message); }
        };

        document.getElementById("logout-btn").onclick = () => signOut(auth);

        function loadDashboardData() {
            onSnapshot(doc(db, "settings", "announcement"), (s) => {
                const data = s.data();
                const bar = document.getElementById("ann-bar");
                if (data && data.expiry > Date.now()) {
                    document.getElementById("ann-text-display").innerText = data.text;
                    bar.classList.remove("hidden");
                } else { bar.classList.add("hidden"); }
            });

            const newsQ = query(collection(db, "news"), orderBy("createdAt", "desc"), limit(3));
            onSnapshot(newsQ, (snap) => {
                const feed = document.getElementById("news-feed");
                feed.innerHTML = "";
                snap.forEach(sDoc => {
                    const data = sDoc.data();
                    const isLiked = data.likes?.includes(auth.currentUser?.uid);
                    const content = (data.content || "").substring(0, 100) + (data.content?.length > 100 ? "..." : "");
                    const card = document.createElement("div");
                    card.className = "bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm";
                    card.innerHTML = `
                        <h4 class="font-black text-slate-800 text-lg mb-1">${data.title}</h4>
                        <p class="text-slate-500 text-sm leading-relaxed mb-4">${content}</p>
                        <div class="flex justify-between items-center">
                            <button onclick="window.toggleLike('${sDoc.id}', ${isLiked})" class="text-[11px] font-black ${isLiked ? 'text-red-500' : 'text-slate-400'}">
                                ${isLiked ? '❤️' : '🤍'} ${data.likes?.length || 0}
                            </button>
                            <a href="news.html?id=${sDoc.id}" class="brand-sky font-black text-[11px] uppercase tracking-tighter">Read More ➜</a>
                        </div>
                    `;
                    feed.appendChild(card);
                });
            });
        }

        window.toggleLike = async (id, currentlyLiked) => {
            const ref = doc(db, "news", id);
            await updateDoc(ref, { likes: currentlyLiked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) });
        };

        document.getElementById("vip-btn").onclick = async () => {
            const code = prompt("Enter VIP Code:");
            if (!code) return;
            const snap = await getDoc(doc(db, "vip_codes", code));
            if (snap.exists()) {
                const d = snap.data();
                if (!d.usedBy || d.usedBy === auth.currentUser.uid) {
                    if (!d.usedBy) await updateDoc(doc(db, "vip_codes", code), { usedBy: auth.currentUser.uid });
                    window.location.href = "vip.html";
                } else alert("Access Denied.");
            } else alert("Invalid Code.");
        };
    </script>
</body>
</html>
