<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Chat Club | Purely Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .nav-blur { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.8); }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
            <h1 class="text-xl font-extrabold text-indigo-600 tracking-tight">Our Chat Club</h1>
            <button id="logout-btn" class="text-xs font-semibold text-gray-400 hover:text-red-500 hidden">SIGN OUT</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        
        <section id="login-section" class="mt-10 space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold">Welcome Back</h2>
                <p class="text-gray-500 mt-2">Join the new era of social media.</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <input type="email" id="login-email" placeholder="Email" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="password" id="login-password" placeholder="Password" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="do-login-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700">Login</button>
                <div class="relative py-2"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div><div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400">Or</span></div></div>
                <button id="google-btn" class="w-full bg-white border border-gray-200 text-gray-700 font-semibold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google Login
                </button>
                <p class="text-center text-sm text-gray-500">New here? <button id="go-to-signup" class="text-indigo-600 font-bold">Create Account</button></p>
            </div>
        </section>

        <section id="signup-section" class="hidden mt-10 space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold">Create Account</h2>
                <p class="text-gray-500 mt-2">Join the new era of social media.</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <input type="email" id="signup-email" placeholder="Choose Email" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="password" id="signup-password" placeholder="Choose Password" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="do-signup-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700">Register</button>
                <p class="text-center text-sm text-gray-500">Already have an account? <button id="go-to-login" class="text-indigo-600 font-bold">Login</button></p>
            </div>
        </section>

        <section id="username-section" class="hidden mt-10 bg-white p-8 rounded-2xl border border-indigo-100 shadow-xl">
            <h2 class="text-xl font-bold mb-2">Claim your handle</h2>
            <input type="text" id="new-username" placeholder="@username" class="w-full p-4 bg-indigo-50 rounded-xl outline-none font-bold text-indigo-600">
            <p id="username-error" class="text-red-500 text-xs mt-2 hidden">Username taken!</p>
            <button id="save-username-btn" class="w-full mt-6 bg-indigo-600 text-white font-bold py-3 rounded-xl">Continue</button>
        </section>

        <section id="feed-section" class="hidden space-y-4 pt-4">
            <div id="posts-container" class="space-y-4"></div>
        </section>

        <section id="profile-section" class="hidden mt-10">
            <div class="bg-white p-8 rounded-2xl text-center shadow-sm border border-gray-100">
                <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4" id="profile-initial">U</div>
                <h2 class="text-2xl font-bold" id="profile-handle">@username</h2>
                <p class="text-gray-400 text-sm" id="profile-email"></p>
            </div>
        </section>
    </main>

    <div id="post-modal" class="modal fixed inset-0 z-50 bg-black/50 items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg">New Post</h3>
                <button id="close-modal" class="text-2xl">&times;</button>
            </div>
            <textarea id="post-content" maxlength="2000" rows="6" placeholder="Write something..." class="w-full p-4 bg-gray-50 rounded-xl resize-none text-lg border-none focus:ring-2 focus:ring-indigo-500"></textarea>
            <div class="flex justify-between items-center mt-4">
                <span id="char-count" class="text-xs text-gray-400">0 / 2000</span>
                <button id="submit-post" class="bg-indigo-600 text-white px-8 py-2 rounded-full font-bold">Post</button>
            </div>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 nav-blur border-t border-gray-100 px-6 pb-6 pt-3 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <button id="nav-home" class="p-2 text-indigo-600"><svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></button>
            <button id="nav-post" class="bg-indigo-600 text-white p-3 rounded-2xl -mt-8 border-4 border-white shadow-lg"><svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"/></svg></button>
            <button id="nav-profile" class="p-2 text-gray-400"><svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></button>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
            authDomain: "our-chat-club.firebaseapp.com",
            projectId: "our-chat-club",
            storageBucket: "our-chat-club.firebasestorage.app",
            messagingSenderId: "533265719248",
            appId: "1:533265719248:web:e4f61e9267c64b0b3663d5",
            measurementId: "G-1RZKH72PH2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userHandle = "";

        function showScreen(id) {
            ['login-section', 'signup-section', 'feed-section', 'profile-section', 'username-section'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            const isAuth = id === 'login-section' || id === 'signup-section' || id === 'username-section';
            document.getElementById('bottom-nav').classList.toggle('hidden', isAuth);
            document.getElementById('logout-btn').classList.toggle('hidden', isAuth);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    userHandle = snap.data().username;
                    document.getElementById('profile-handle').innerText = `@${userHandle}`;
                    document.getElementById('profile-email').innerText = user.email;
                    showScreen('feed-section');
                    loadPosts();
                } else { showScreen('username-section'); }
            } else { showScreen('login-section'); }
        });

        // Navigation Toggle
        document.getElementById('go-to-signup').onclick = () => showScreen('signup-section');
        document.getElementById('go-to-login').onclick = () => showScreen('login-section');
        document.getElementById('nav-home').onclick = () => showScreen('feed-section');
        document.getElementById('nav-profile').onclick = () => showScreen('profile-section');
        document.getElementById('nav-post').onclick = () => document.getElementById('post-modal').classList.add('active');
        document.getElementById('close-modal').onclick = () => document.getElementById('post-modal').classList.remove('active');

        // Logic
        document.getElementById('google-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('do-login-btn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value).catch(e => alert(e.message));
        document.getElementById('do-signup-btn').onclick = () => createUserWithEmailAndPassword(auth, document.getElementById('signup-email').value, document.getElementById('signup-password').value).catch(e => alert(e.message));
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        document.getElementById('save-username-btn').onclick = async () => {
            const name = document.getElementById('new-username').value.trim().toLowerCase();
            const q = query(collection(db, "users"), where("username", "==", name));
            const snap = await getDocs(q);
            if (!snap.empty) return alert("Username taken!");
            await setDoc(doc(db, "users", auth.currentUser.uid), { username: name, email: auth.currentUser.email });
            location.reload();
        };

        document.getElementById('submit-post').onclick = async () => {
            const text = document.getElementById('post-content').value;
            if (!text.trim()) return;
            await addDoc(collection(db, "posts"), { text, author: userHandle, uid: auth.currentUser.uid, createdAt: serverTimestamp() });
            document.getElementById('post-content').value = "";
            document.getElementById('post-modal').classList.remove('active');
        };

        window.deletePost = async (id) => { if(confirm("Delete this post?")) await deleteDoc(doc(db, "posts", id)); };

        function loadPosts() {
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
                const container = document.getElementById('posts-container');
                container.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const isOwner = p.uid === auth.currentUser.uid;
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm relative">
                            <p class="text-sm font-bold text-indigo-600 mb-2">@${p.author}</p>
                            <p class="text-gray-800 whitespace-pre-wrap">${p.text}</p>
                            <div class="flex justify-between items-center mt-4">
                                <span class="text-[10px] text-gray-300 uppercase">${p.createdAt?.toDate().toLocaleString() || ''}</span>
                                ${isOwner ? `<button onclick="deletePost('${d.id}')" class="text-red-400 text-xs font-bold">DELETE</button>` : ''}
                            </div>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
