<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC - Our Chat Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8faff; }
        .brand-gradient { background: linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb); }
        .brand-text { background: linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb); -webkit-background-clip: text; color: transparent; }
    </style>
</head>
<body class="flex flex-col min-h-screen overflow-x-hidden">

    <main class="flex-grow flex items-center justify-center p-6">
        <div id="auth-container" class="w-full max-w-sm bg-white p-8 rounded-[2rem] shadow-2xl border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black brand-text leading-tight">OCC</h1>
                <p class="text-gray-400 font-medium" id="auth-title">Join the Club</p>
            </div>

            <div class="space-y-4">
                <input id="email" type="text" placeholder="Email or Username" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition-all">
                <input id="password" type="password" placeholder="Password" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition-all">
                
                <button id="main-btn" class="w-full p-4 text-white font-bold brand-gradient rounded-2xl shadow-lg active:scale-95 transition-transform">Login</button>
                <button id="toggle-auth" class="w-full text-indigo-600 text-sm font-bold pt-2">New user? Register</button>
            </div>
        </div>

        <div id="menu-container" class="hidden w-full max-w-sm space-y-4">
            <h1 class="text-3xl font-black brand-text text-center mb-8">OCC Dashboard</h1>
            
            <a href="news.html" class="flex items-center p-6 bg-white rounded-[2rem] shadow-md border border-gray-50 active:bg-gray-50">
                <div class="p-3 bg-indigo-100 rounded-2xl text-2xl">📰</div>
                <span class="ml-4 font-extrabold text-xl text-gray-800">Latest News</span>
            </a>

            <a href="minigame.html" class="flex items-center p-6 bg-white rounded-[2rem] shadow-md border border-gray-50 active:bg-gray-50">
                <div class="p-3 bg-blue-100 rounded-2xl text-2xl">🎮</div>
                <span class="ml-4 font-extrabold text-xl text-gray-800">Mini Game</span>
            </a>

            <a id="admin-link" href="admin.html" class="hidden flex items-center p-6 bg-indigo-50 border-2 border-indigo-100 rounded-[2rem] active:bg-indigo-100">
                <div class="p-3 bg-indigo-500 rounded-2xl text-2xl text-white">🔑</div>
                <span class="ml-4 font-extrabold text-xl text-indigo-700">Admin Panel</span>
            </a>

            <button id="logout-btn" class="w-full p-6 text-red-500 font-black uppercase tracking-widest text-sm mt-4">Logout</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        const ADMIN_USER = "@Admin";
        const ADMIN_PASS = "29102007";

        let isLogin = true;

        document.getElementById("toggle-auth").onclick = () => {
            isLogin = !isLogin;
            document.getElementById("auth-title").innerText = isLogin ? "Welcome back!" : "Join the Club";
            document.getElementById("main-btn").innerText = isLogin ? "Login" : "Register";
            document.getElementById("toggle-auth").innerText = isLogin ? "New user? Register" : "Have an account? Login";
        };

        document.getElementById("main-btn").onclick = async () => {
            const input = document.getElementById("email").value;
            const pass = document.getElementById("password").value;

            if(input === ADMIN_USER && pass === ADMIN_PASS) {
                localStorage.setItem("occ_admin_access", "true");
                showMenu(true);
                return;
            }

            try {
                if(isLogin) await signInWithEmailAndPassword(auth, input, pass);
                else await createUserWithEmailAndPassword(auth, input, pass);
            } catch(e) { alert("Access Denied: Check credentials."); }
        };

        function showMenu(isAdmin) {
            document.getElementById("auth-container").classList.add("hidden");
            document.getElementById("menu-container").classList.remove("hidden");
            if(isAdmin) document.getElementById("admin-link").classList.remove("hidden");
        }

        onAuthStateChanged(auth, user => {
            const isAdmin = localStorage.getItem("occ_admin_access") === "true";
            if(user || isAdmin) showMenu(isAdmin || user?.email === "admin@gmail.com");
        });

        document.getElementById("logout-btn").onclick = () => {
            localStorage.removeItem("occ_admin_access");
            signOut(auth).then(() => location.reload());
        };
    </script>
</body>
</html>
