<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Chat Club | Purely Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; padding-bottom: 90px; }
        .nav-blur { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.8); }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
            <h1 class="text-xl font-extrabold text-indigo-600 tracking-tight">Our Chat Club</h1>
            <button id="logout-btn" class="text-xs font-semibold text-gray-400 hover:text-red-500 hidden uppercase">Sign Out</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        
        <section id="login-section" class="mt-10 space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold">Welcome Back</h2>
                <p class="text-gray-500 mt-2">Join the new era of social media.</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <input type="email" id="login-email" placeholder="Email" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="password" id="login-password" placeholder="Password" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="do-login-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100">Login</button>
                <p class="text-center text-sm text-gray-500">New here? <button id="go-to-signup" class="text-indigo-600 font-bold">Create Account</button></p>
            </div>
        </section>

        <section id="signup-section" class="hidden mt-10 space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold">Create Account</h2>
                <p class="text-gray-500 mt-2">Join the new era of social media.</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <input type="email" id="signup-email" placeholder="Email Address" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="password" id="signup-password" placeholder="Create Password" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="do-signup-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100">Register</button>
                <p class="text-center text-sm text-gray-500">Already have an account? <button id="go-to-login" class="text-indigo-600 font-bold">Login</button></p>
            </div>
        </section>

        <section id="username-section" class="hidden mt-10 bg-white p-8 rounded-3xl border border-indigo-50 shadow-xl">
            <h2 class="text-2xl font-bold mb-2">Claim your handle</h2>
            <input type="text" id="new-username" placeholder="username" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold text-indigo-600 border-2 border-transparent focus:border-indigo-500">
            <button id="save-username-btn" class="w-full mt-6 bg-indigo-600 text-white font-bold py-4 rounded-2xl">Continue</button>
        </section>

        <section id="feed-section" class="hidden space-y-4 pt-4">
            <div id="posts-container" class="space-y-4"></div>
        </section>

        <section id="profile-section" class="hidden mt-10">
            <div class="bg-white p-8 rounded-3xl text-center shadow-sm border border-gray-100">
                <div class="w-24 h-24 bg-indigo-600 text-white rounded-full flex items-center justify-center text-4xl font-black mx-auto mb-4" id="profile-initial">?</div>
                <h2 class="text-2xl font-bold" id="profile-handle">@username</h2>
                <p class="text-gray-400 text-sm mt-1" id="profile-email"></p>
            </div>
        </section>
    </main>

    <div id="post-modal" class="modal fixed inset-0 z-50 bg-black/60 backdrop-blur-sm items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-xl">Create Post</h3>
                <button id="close-modal" class="text-gray-400 text-3xl">&times;</button>
            </div>
            <textarea id="post-content" maxlength="2000" rows="8" placeholder="What's happening?" class="w-full p-5 bg-gray-50 rounded-2xl resize-none text-lg border-none focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
            <div class="flex justify-between items-center mt-6">
                <span id="char-count" class="text-xs font-bold text-gray-300">0 / 2000</span>
                <button id="submit-post" class="bg-indigo-600 text-white px-10 py-3 rounded-full font-bold shadow-lg shadow-indigo-100">Post</button>
            </div>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 nav-blur border-t border-gray-100 px-8 pb-8 pt-4 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <button id="nav-home" class="p-2 text-indigo-600"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></button>
            <button id="nav-post" class="bg-indigo-600 text-white p-4 rounded-2xl -mt-12 border-[6px] border-gray-50 shadow-xl transition-transform active:scale-90"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"/></svg></button>
            <button id="nav-profile" class="p-2 text-gray-300"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></button>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
            authDomain: "our-chat-club.firebaseapp.com",
            projectId: "our-chat-club",
            storageBucket: "our-chat-club.firebasestorage.app",
            messagingSenderId: "533265719248",
            appId: "1:533265719248:web:e4f61e9267c64b0b3663d5",
            measurementId: "G-1RZKH72PH2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userHandle = "";

        function showScreen(id) {
            ['login-section', 'signup-section', 'feed-section', 'profile-section', 'username-section'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            const isAuth = id === 'login-section' || id === 'signup-section' || id === 'username-section';
            document.getElementById('bottom-nav').classList.toggle('hidden', isAuth);
            document.getElementById('logout-btn').classList.toggle('hidden', isAuth);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userHandle = snap.data().username;
                    document.getElementById('profile-handle').innerText = `@${userHandle}`;
                    document.getElementById('profile-email').innerText = user.email;
                    document.getElementById('profile-initial').innerText = userHandle[0].toUpperCase();
                    showScreen('feed-section');
                    loadPosts();
                } else { showScreen('username-section'); }
            } else { showScreen('login-section'); }
        });

        // Navigation UI Logic
        document.getElementById('go-to-signup').onclick = () => showScreen('signup-section');
        document.getElementById('go-to-login').onclick = () => showScreen('login-section');
        document.getElementById('nav-home').onclick = () => showScreen('feed-section');
        document.getElementById('nav-profile').onclick = () => showScreen('profile-section');
        document.getElementById('nav-post').onclick = () => document.getElementById('post-modal').classList.add('active');
        document.getElementById('close-modal').onclick = () => document.getElementById('post-modal').classList.remove('active');

        // Login/Signup Logic
        document.getElementById('do-login-btn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value).catch(e => alert(e.message));
        document.getElementById('do-signup-btn').onclick = () => createUserWithEmailAndPassword(auth, document.getElementById('signup-email').value, document.getElementById('signup-password').value).catch(e => alert(e.message));
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Username Logic
        document.getElementById('save-username-btn').onclick = async () => {
            const name = document.getElementById('new-username').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
            if (name.length < 3) return alert("Min 3 characters required.");
            const q = query(collection(db, "users"), where("username", "==", name));
            const snap = await getDocs(q);
            if (!snap.empty) return alert("Username taken!");
            await setDoc(doc(db, "users", auth.currentUser.uid), { username: name, email: auth.currentUser.email });
            location.reload();
        };

        // Post Logic
        document.getElementById('submit-post').onclick = async () => {
            const text = document.getElementById('post-content').value;
            if (!text.trim()) return;
            await addDoc(collection(db, "posts"), { text, author: userHandle, uid: auth.currentUser.uid, createdAt: serverTimestamp() });
            document.getElementById('post-content').value = "";
            document.getElementById('post-modal').classList.remove('active');
        };

        // Load Posts & Handled Deletion internally to fix scope bug
        function loadPosts() {
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
                const container = document.getElementById('posts-container');
                container.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const isOwner = p.uid === auth.currentUser.uid;
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-3xl border border-gray-100 shadow-sm relative";
                    card.innerHTML = `
                        <p class="text-sm font-bold text-indigo-600 mb-2">@${p.author}</p>
                        <p class="text-gray-800 leading-relaxed whitespace-pre-wrap">${p.text}</p>
                        <div class="flex justify-between items-center mt-6">
                            <span class="text-[10px] text-gray-300 font-bold uppercase">${p.createdAt?.toDate().toLocaleString('en-IN') || ''}</span>
                        </div>`;
                    
                    if (isOwner) {
                        const delBtn = document.createElement('button');
                        delBtn.className = "absolute top-6 right-6 text-red-400 text-[10px] font-black";
                        delBtn.innerText = "DELETE";
                        delBtn.onclick = async () => {
                            if(confirm("Delete post?")) await deleteDoc(doc(db, "posts", d.id));
                        };
                        card.appendChild(delBtn);
                    }
                    container.appendChild(card);
                });
            });
        }

        document.getElementById('post-content').oninput = (e) => {
            document.getElementById('char-count').innerText = `${e.target.value.length} / 2000`;
        };
    </script>
</body>
</html>
