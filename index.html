<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Your Brand Palette */
        .brand-indigo { color: #4338ca; }
        .brand-bg-indigo { background-color: #4338ca; }
        .brand-sky { color: #0ea5e9; }
        .brand-bg-sky { background-color: #0ea5e9; }
        
        .vip-card { background: linear-gradient(135deg, #4338ca 0%, #1e1b4b 100%); }
        .hidden { display: none !important; }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        
        .news-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            position: relative;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="text-slate-900">

    <div id="ann-bar" class="hidden brand-bg-indigo p-2 text-center text-white text-[10px] font-bold uppercase tracking-widest sticky top-0 z-50">
        <span id="ann-text-display"></span>
    </div>

    <div class="max-w-md mx-auto p-6 pb-24">
        
        <div class="flex justify-between items-center mb-8 mt-2">
            <div>
                <h1 class="text-2xl font-black brand-indigo leading-none">OCC</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Dashboard</p>
            </div>
            <button id="logout-btn" class="bg-white text-red-500 border border-red-100 px-4 py-2 rounded-xl text-xs font-black shadow-sm active:scale-95 transition-all">
                LOGOUT
            </button>
        </div>

        <section class="mb-8">
            <div class="vip-card p-6 rounded-[2rem] shadow-xl text-center border-b-4 border-indigo-900">
                <h2 class="text-white font-black text-xl mb-1 tracking-tight">👑 VIP PANEL</h2>
                <p id="user-display-name" class="text-indigo-200 text-[10px] font-bold uppercase tracking-widest mb-4">Authenticating...</p>
                <button id="vip-btn" class="w-full brand-bg-sky text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all uppercase text-sm">
                    Access VIP Dashboard
                </button>
            </div>
        </section>

        <section class="mb-8">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Latest News</h3>
            </div>
            
            <div id="news-feed" class="space-y-4">
                <div class="news-card animate-pulse h-32"></div>
            </div>
        </section>

        <section>
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 px-2">Entertainment</h3>
            <button id="mini-game-btn" class="w-full bg-white border border-slate-200 p-5 rounded-[2rem] flex items-center justify-between shadow-sm active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <div class="brand-bg-indigo w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-inner">🎮</div>
                    <div class="text-left">
                        <span class="block font-black text-slate-800">MINI GAMES</span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase">Play & Earn</span>
                    </div>
                </div>
                <span class="brand-sky text-lg">➜</span>
            </button>
        </section>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot, query, orderBy, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", 
            authDomain: "our-chat-club.firebaseapp.com", 
            projectId: "our-chat-club" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // LOGOUT LOGIC
        document.getElementById("logout-btn").onclick = () => {
            signOut(auth).then(() => window.location.href = "login.html");
        };

        onAuthStateChanged(auth, user => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                document.getElementById("user-display-name").innerText = `Logged in as: ${user.displayName || 'User'}`;
            }
        });

        // NEWS FEED WITH 100 CHAR LIMIT & READ MORE
        const newsQuery = query(collection(db, "news"), orderBy("createdAt", "desc"));
        onSnapshot(newsQuery, (snap) => {
            const feed = document.getElementById("news-feed");
            feed.innerHTML = "";
            
            snap.forEach(sDoc => {
                const data = sDoc.data();
                const isLiked = data.likes?.includes(auth.currentUser?.uid);
                
                // Content Truncation Logic
                const fullText = data.content || "";
                const shortText = fullText.length > 100 ? fullText.substring(0, 100) + "..." : fullText;
                
                const card = document.createElement("div");
                card.className = "news-card shadow-sm";
                card.innerHTML = `
                    <h4 class="font-black text-slate-800 text-lg mb-2">${data.title}</h4>
                    <p class="text-slate-500 text-sm leading-relaxed mb-6">${shortText}</p>
                    
                    <div class="flex justify-between items-center mt-4">
                        <button onclick="toggleLike('${sDoc.id}', ${isLiked})" class="flex items-center gap-2 text-xs font-bold ${isLiked ? 'text-red-500' : 'text-slate-400'}">
                            <span class="text-lg">${isLiked ? '❤️' : '🤍'}</span> 
                            <span>${data.likes?.length || 0}</span>
                        </button>
                        
                        <a href="news.html?id=${sDoc.id}" class="brand-sky font-black text-xs uppercase tracking-tighter hover:underline">
                            Read More ➜
                        </a>
                    </div>
                `;
                feed.appendChild(card);
            });
        });

        window.toggleLike = async (id, currentlyLiked) => {
            const ref = doc(db, "news", id);
            await updateDoc(ref, {
                likes: currentlyLiked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid)
            });
        };

        // VIP ACCESS LOGIC
        document.getElementById("vip-btn").onclick = async () => {
            const code = prompt("Enter your secret VIP Code:");
            if (!code) return;

            const codeRef = doc(db, "vip_codes", code);
            const snap = await getDoc(codeRef);

            if (snap.exists()) {
                const data = snap.data();
                if (!data.usedBy || data.usedBy === auth.currentUser.uid) {
                    if (!data.usedBy) await updateDoc(codeRef, { usedBy: auth.currentUser.uid });
                    window.location.href = "vip.html";
                } else {
                    alert("Unauthorized: This code belongs to another user.");
                }
            } else {
                alert("Invalid VIP code.");
            }
        };

        document.getElementById("mini-game-btn").onclick = () => window.location.href = "games.html";
    </script>
</body>
</html>
