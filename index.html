<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-blue { color: #2563eb; }
        .brand-bg-blue { background-color: #2563eb; }
        .vip-gold { background: linear-gradient(135deg, #f59e0b, #b45309); }
        .hidden { display: none !important; }
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="text-slate-900 font-sans">

    <div id="ann-bar" class="hidden brand-bg-blue p-3 text-center text-white text-xs font-bold sticky top-0 z-50">
        <span id="ann-text-display"></span>
    </div>

    <div class="max-w-md mx-auto p-5 pb-24">
        
        <div class="flex justify-between items-center mb-8 mt-4">
            <div>
                <h1 class="text-2xl font-black brand-blue">OCC DASHBOARD</h1>
                <p id="user-display-name" class="text-slate-400 text-xs font-bold uppercase tracking-widest">Welcome Back</p>
            </div>
            <button id="logout-btn" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-xs font-black active:scale-95 transition-all">
                LOGOUT
            </button>
        </div>

        <div class="mb-8">
            <div class="vip-gold p-6 rounded-[2rem] shadow-lg relative overflow-hidden">
                <div class="relative z-10 text-center">
                    <h2 class="text-white font-black text-xl mb-1">👑 VIP PANEL</h2>
                    <p class="text-amber-100 text-[10px] font-bold uppercase tracking-widest mb-4">Premium Dashboard Access</p>
                    <button id="vip-btn" class="w-full bg-white text-amber-700 py-4 rounded-2xl font-black shadow-md active:scale-95 transition-all">
                        ENTER VIP PANEL
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-2">Latest News</h3>
            <div id="news-feed" class="space-y-4">
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 animate-pulse h-24"></div>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-2">Mini Games</h3>
            <button id="mini-game-btn" class="w-full bg-white border-2 border-slate-100 p-6 rounded-[2rem] flex items-center justify-between active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <span class="text-2xl">🎮</span>
                    <span class="font-black brand-blue">PLAY MINI GAMES</span>
                </div>
                <span class="text-slate-300">➜</span>
            </button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot, query, orderBy, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", 
            authDomain: "our-chat-club.firebaseapp.com", 
            projectId: "our-chat-club" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- AUTH & LOGOUT ---
        document.getElementById("logout-btn").onclick = () => signOut(auth).then(() => window.location.href = "login.html");

        onAuthStateChanged(auth, user => {
            if (!user) window.location.href = "login.html";
            else document.getElementById("user-display-name").innerText = user.displayName || "User";
        });

        // --- ANNOUNCEMENTS ---
        onSnapshot(doc(db, "settings", "announcement"), (s) => {
            const data = s.data();
            const bar = document.getElementById("ann-bar");
            if (data && data.expiry > Date.now()) {
                document.getElementById("ann-text-display").innerText = data.text;
                bar.classList.remove("hidden");
            } else {
                bar.classList.add("hidden");
            }
        });

        // --- NEWS FEED ---
        const newsQuery = query(collection(db, "news"), orderBy("createdAt", "desc"));
        onSnapshot(newsQuery, (snap) => {
            const feed = document.getElementById("news-feed");
            feed.innerHTML = "";
            snap.forEach(sDoc => {
                const data = sDoc.data();
                const isLiked = data.likes?.includes(auth.currentUser?.uid);
                const card = document.createElement("div");
                card.className = "bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm";
                card.innerHTML = `
                    <h4 class="font-black text-slate-800 text-lg mb-1">${data.title}</h4>
                    <p class="text-slate-500 text-sm mb-4">${data.content}</p>
                    <button onclick="toggleLike('${sDoc.id}', ${isLiked})" class="flex items-center gap-2 text-xs font-bold ${isLiked ? 'text-red-500' : 'text-slate-400'}">
                        <span>${isLiked ? '❤️' : '🤍'}</span> ${data.likes?.length || 0}
                    </button>
                `;
                feed.appendChild(card);
            });
        });

        window.toggleLike = async (id, currentlyLiked) => {
            const ref = doc(db, "news", id);
            await updateDoc(ref, {
                likes: currentlyLiked ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid)
            });
        };

        // --- VIP LOGIC ---
        document.getElementById("vip-btn").onclick = async () => {
            const user = auth.currentUser;
            const codeInput = prompt("Enter VIP Code:");
            if (!codeInput) return;

            const codeRef = doc(db, "vip_codes", codeInput);
            const codeSnap = await getDoc(codeRef);

            if (codeSnap.exists()) {
                const data = codeSnap.data();
                if (!data.usedBy || data.usedBy === user.uid) {
                    if (!data.usedBy) await updateDoc(codeRef, { usedBy: user.uid });
                    window.location.href = "vip.html";
                } else {
                    alert("This code is linked to another account.");
                }
            } else {
                alert("Invalid Code.");
            }
        };

        // --- MINI GAME ACTION ---
        document.getElementById("mini-game-btn").onclick = () => {
            window.location.href = "games.html"; 
        };
    </script>
</body>
</html>
