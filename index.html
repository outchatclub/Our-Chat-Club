<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Chat Club | Text Only</title>
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .nav-blur { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.8); }
        .modal { display: none; }
        .modal.active { display: flex; }
        .header-grid { display: grid; grid-template-columns: 40px 1fr 60px; align-items: center; gap: 8px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 h-16 flex items-center">
        <div class="max-w-2xl mx-auto w-full px-4 header-grid">
            <button id="nav-dm" class="relative p-2 text-indigo-600 active:scale-90 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
            </button>
            <div class="relative">
                <input type="text" id="search-input" placeholder="Search @username..." class="w-full bg-gray-100 border-none rounded-2xl px-4 py-2 text-xs font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20">
            </div>
            <button id="logout-btn" class="text-[10px] font-black text-gray-300 hidden uppercase tracking-tighter hover:text-red-500">Sign Out</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <section id="login-section" class="mt-10 space-y-6">
            <div class="text-center">
                <div class="flex items-center justify-center gap-3">
                    <img src="logo.png" alt="Logo" class="w-10 h-10 object-contain">
                    <h2 class="text-3xl font-extrabold text-indigo-600">Our Chat Club</h2>
                </div>
                <p class="text-gray-500 mt-2">Join the new era of social media.</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                <input type="email" id="login-email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20">
                <input type="password" id="login-password" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20">
                <button id="do-login-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">Login</button>
                <p class="text-center text-sm text-gray-500">New? <button id="go-to-signup" class="text-indigo-600 font-bold">Create Account</button></p>
            </div>
        </section>

        <section id="signup-section" class="hidden mt-10 space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-extrabold text-indigo-600">Join the Club</h2>
                <p class="text-gray-500 mt-2">Create your unique @handle</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-gray-100 space-y-4">
                <input type="text" id="signup-username" placeholder="Choose @username" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <input type="email" id="signup-email" placeholder="Email Address" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <input type="password" id="signup-password" placeholder="Create Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <button id="do-signup-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl">Register</button>
                <p class="text-sm text-center"><button id="back-to-login" class="text-indigo-600 font-bold">Back to Login</button></p>
            </div>
        </section>

        <section id="feed-section" class="hidden space-y-4"><div id="posts-container" class="space-y-4"></div></section>
        
        <section id="profile-section" class="hidden mt-4">
            <div class="bg-white p-8 rounded-3xl text-center shadow-sm border border-gray-100">
                <div class="w-24 h-24 bg-indigo-600 text-white rounded-full flex items-center justify-center text-4xl font-black mx-auto mb-4" id="profile-initial">?</div>
                <h2 class="text-2xl font-bold" id="profile-handle">@username</h2>
                <p id="profile-bio" class="text-gray-500 italic text-sm my-4">No bio yet.</p>
                <div class="flex gap-2 justify-center">
                    <button id="edit-bio-btn" class="hidden bg-gray-100 text-gray-600 px-6 py-2 rounded-full font-bold text-xs">Edit Bio</button>
                    <button id="message-user-btn" class="hidden bg-indigo-600 text-white px-8 py-2 rounded-full font-bold text-xs shadow-md">Message</button>
                </div>
            </div>
        </section>

        <section id="dm-section" class="hidden mt-4">
            <div id="dm-inbox" class="space-y-4">
                <h3 class="font-bold text-gray-400 text-xs uppercase tracking-widest">Inbox</h3>
                <div id="chat-list" class="space-y-2"></div>
            </div>
            <div id="active-chat" class="hidden flex flex-col h-[75vh] bg-white rounded-3xl p-4 shadow-sm border">
                <div class="flex items-center justify-between border-b pb-4 mb-4 flex-shrink-0">
                    <h4 id="chat-with-name" class="font-bold text-indigo-600 text-sm">Chat</h4>
                    <button id="close-chat" class="text-gray-400 text-xs font-bold">CLOSE</button>
                </div>
                <div id="chat-messages" class="flex-1 overflow-y-auto space-y-2 pb-4 flex flex-col min-h-0"></div>
                <div class="flex gap-2 border-t pt-4 flex-shrink-0">
                    <input type="text" id="dm-input" placeholder="Type..." class="flex-1 bg-gray-50 border-none rounded-xl px-4 outline-none text-sm h-12">
                    <button id="send-dm" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-xs h-12">SEND</button>
                </div>
            </div>
        </section>
    </main>

    <div id="post-modal" class="modal fixed inset-0 z-50 bg-black/60 backdrop-blur-sm items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6">
            <textarea id="post-content" maxlength="2000" rows="6" class="w-full p-4 bg-gray-50 rounded-2xl outline-none resize-none mb-4" placeholder="Speak your mind..."></textarea>
            <button id="submit-post" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl">Post Now</button>
            <button id="close-modal" class="w-full mt-3 text-gray-400 text-xs font-bold uppercase">Cancel</button>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 nav-blur border-t border-gray-100 px-8 pb-8 pt-4 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <button id="btn-home" class="p-2 text-indigo-600"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></button>
            <button id="btn-add" class="bg-indigo-600 text-white p-4 rounded-2xl -mt-12 border-[6px] border-gray-50 shadow-xl active:scale-90 transition-transform"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"/></svg></button>
            <button id="btn-profile" class="p-2 text-gray-300"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></button>
        </div>
    </nav>

        <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
    import { getFirestore, doc, getDocs, collection, addDoc, updateDoc, increment, query, orderBy, onSnapshot, serverTimestamp, where, setDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
            
    const firebaseConfig = { 
        apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
        authDomain: "our-chat-club.firebaseapp.com",
        projectId: "our-chat-club",
        storageBucket: "our-chat-club.firebasestorage.app",
        messagingSenderId: "533265719248",
        appId: "1:533265719248:web:e4f61e9267c64b0b3663d5"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserHandle = "";
    let currentChatPartner = null;

    function showScreen(id) {
        ['login-section', 'signup-section', 'feed-section', 'profile-section', 'dm-section'].forEach(s => {
            const el = document.getElementById(s);
            if(el) el.classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
        const isAuth = id === 'login-section' || id === 'signup-section';
        document.getElementById('bottom-nav').classList.toggle('hidden', isAuth);
        document.getElementById('logout-btn').classList.toggle('hidden', isAuth);
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                currentUserHandle = snap.data().username;
                showScreen('feed-section');
                loadPosts();
            } else { 
                showScreen('login-section'); 
            }
        } else { showScreen('login-section'); }
    });

    // SEARCH & VIEW PROFILE (Case-Insensitive)
    window.viewProfile = async (username) => {
        const cleanName = username.toLowerCase().trim().replace('@', '');
        const q = query(collection(db, "users"), where("username", "==", cleanName));
        const snap = await getDocs(q);
        if (!snap.empty) {
            const data = snap.docs[0].data(), userId = snap.docs[0].id;
            showScreen('profile-section');
            document.getElementById('profile-handle').innerText = `@${data.username}`;
            document.getElementById('profile-bio').innerText = data.bio || "No bio yet.";
            document.getElementById('profile-initial').innerText = data.username[0].toUpperCase();
            const isMe = userId === auth.currentUser?.uid;
            document.getElementById('edit-bio-btn').classList.toggle('hidden', !isMe);
            document.getElementById('message-user-btn').classList.toggle('hidden', isMe);
            if(!isMe) document.getElementById('message-user-btn').onclick = () => startChat(userId, data.username);
            else document.getElementById('edit-bio-btn').onclick = async () => {
                const b = prompt("Edit Bio:", data.bio);
                if(b !== null) {
                    await updateDoc(doc(db, "users", userId), { bio: b });
                    document.getElementById('profile-bio').innerText = b;
                }
            };
        } else { alert("User not found!"); }
    };

    document.getElementById('search-input').onkeydown = (e) => {
        if(e.key === 'Enter') viewProfile(e.target.value);
    };

    // REGISTRATION WITH DUPLICATE CHECK
    document.getElementById('do-signup-btn').onclick = async () => {
        const userField = document.getElementById('signup-username').value.toLowerCase().trim().replace(/[^a-z0-9_]/g, '');
        const email = document.getElementById('signup-email').value, pass = document.getElementById('signup-password').value;
        
        if(!userField || !email || !pass) return alert("Fill all fields");
        if(userField.length < 3) return alert("Username too short");

        try {
            const q = query(collection(db, "users"), where("username", "==", userField));
            const snap = await getDocs(q);
            if(!snap.empty) return alert("Username already taken!");

            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "users", cred.user.uid), { 
                username: userField, 
                email: email, 
                bio: "",
                createdAt: serverTimestamp() 
            });
            location.reload();
        } catch(e) { alert("Error: " + e.message); }
    };

    document.getElementById('do-login-btn').onclick = () => {
        const email = document.getElementById('login-email').value, pass = document.getElementById('login-password').value;
        if(!email || !pass) return alert("Fill all fields");
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Login Failed: " + e.message));
    };

    // POSTS LOGIC
    function loadPosts() {
    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
        const container = document.getElementById('posts-container');
        container.innerHTML = "";
        snap.forEach(async (d) => {
            const p = d.data(), pid = d.id, uid = auth.currentUser.uid;
            const postRef = doc(db, "posts", pid);
            await updateDoc(postRef, { views: increment(1) });

            const card = document.createElement('div');
            card.className = "bg-white p-6 rounded-3xl border border-gray-100 shadow-sm";
            card.innerHTML = `
                <button class="user-link text-sm font-bold text-indigo-600 mb-2">@${p.author}</button>
                <p class="text-gray-800 whitespace-pre-wrap leading-relaxed">${p.text}</p>
                <div class="flex items-center gap-6 mt-4 border-t border-gray-50 pt-4">
                    <button class="like-btn flex items-center gap-1.5">
                        <svg class="w-5 h-5 ${p.likes?.includes(uid) ? 'fill-red-500 stroke-red-500' : 'stroke-gray-400'}" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span class="text-xs font-bold">${p.likes?.length || 0}</span>
                        <span class="views-count" style="margin-left: 8px;">👁️ ${p.views || 0} Views</span>
                    </button>
                    ${p.uid === uid ? `<button class="del-btn ml-auto text-red-400 text-[10px] font-black uppercase tracking-tighter">Delete</button>` : ''}
                </div>`;

            card.querySelector('.user-link').onclick = () => viewProfile(p.author);
            card.querySelector('.like-btn').onclick = () => updateDoc(doc(db, "posts", pid), { 
    likes: p.likes?.includes(uid) ? p.likes.filter(id => id !== uid) : [...(p.likes || []), uid] 
});
            
            if(p.uid === uid) card.querySelector('.del-btn').onclick = () => confirm("Delete?") && deleteDoc(doc(db, "posts", pid));
            container.appendChild(card);
        });
    });
    }
            
        });
    }

    // DM & INBOX (Simplified)
    document.getElementById('nav-dm').onclick = async () => { 
        showScreen('dm-section'); 
        const list = document.getElementById('chat-list');
        list.innerHTML = "Loading...";
        const snap = await getDocs(collection(db, "users"));
        list.innerHTML = "";
        snap.forEach(doc => {
            if(doc.id !== auth.currentUser.uid) {
           
                const u = doc.data();
                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-2xl flex items-center gap-3 border border-gray-100 cursor-pointer";
                item.innerHTML = `<div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center font-bold text-indigo-600">${u.username[0].toUpperCase()}</div><p class="font-bold text-sm">@${u.username}</p>`;
                item.onclick = () => startChat(doc.id, u.username);
                list.appendChild(item);
            }
        });
    };

    async function startChat(uid, username) {
        currentChatPartner = { uid, username };
        document.getElementById('dm-inbox').classList.add('hidden');
        document.getElementById('active-chat').classList.remove('hidden');
        document.getElementById('chat-with-name').innerText = `@${username}`;
        const chatId = [auth.currentUser.uid, uid].sort().join('_');
        onSnapshot(query(collection(db, `chats/${chatId}/messages`), orderBy("time", "asc")), (snap) => {
            const box = document.getElementById('chat-messages');
            box.innerHTML = "";
            snap.forEach(m => {
                const msg = m.data(), isMe = msg.sender === auth.currentUser.uid;
                const el = document.createElement('div');
                el.className = `p-3 rounded-2xl text-sm max-w-[85%] ${isMe ? 'bg-indigo-600 text-white self-end ml-auto' : 'bg-gray-100 text-gray-800 self-start mr-auto'}`;
                el.innerText = msg.text;
                box.appendChild(el);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById('send-dm').onclick = async () => {
        const text = document.getElementById('dm-input').value;
        if(!text.trim() || !currentChatPartner) return;
        const chatId = [auth.currentUser.uid, currentChatPartner.uid].sort().join('_');
        await addDoc(collection(db, `chats/${chatId}/messages`), { text, sender: auth.currentUser.uid, time: serverTimestamp() });
        document.getElementById('dm-input').value = "";
    };

    // BUTTONS
    document.getElementById('btn-home').onclick = () => showScreen('feed-section');
    document.getElementById('btn-profile').onclick = () => viewProfile(currentUserHandle);
    document.getElementById('btn-add').onclick = () => document.getElementById('post-modal').classList.add('active');
    document.getElementById('close-modal').onclick = () => document.getElementById('post-modal').classList.remove('active');
    document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('go-to-signup').onclick = () => showScreen('signup-section');
    document.getElementById('back-to-login').onclick = () => showScreen('login-section');
    document.getElementById('close-chat').onclick = () => { document.getElementById('dm-inbox').classList.remove('hidden'); document.getElementById('active-chat').classList.add('hidden'); };
    document.getElementById('submit-post').onclick = async () => {
        const text = document.getElementById('post-content').value;
        if(!text.trim()) return;
ws         await addDoc(collection(db, "posts"), { text, author: currentUserHandle, uid: auth.currentUser.uid, createdAt: serverTimestamp(), likes: [], views"0"});
        document.getElementById('post-content').value = ""; document.getElementById('post-modal').classList.remove('active');
    };
</script>
</body></html>
