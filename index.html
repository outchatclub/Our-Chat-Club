<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Chat Club | Text Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .nav-blur { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.8); }
        .post-modal { display: none; }
        .post-modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
            <h1 class="text-xl font-extrabold text-indigo-600 tracking-tight">Our Chat Club</h1>
            <button id="logout-btn" class="text-xs font-semibold text-gray-400 hover:text-red-500 hidden">SIGN OUT</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        
        <section id="auth-section" class="mt-10 space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold">Welcome</h2>
                <p class="text-gray-500 mt-2">Join the conversation, text only.</p>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <button id="login-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100">Login</button>
                
                <div class="relative py-2">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400">Or continue with</span></div>
                </div>

                <button id="google-btn" class="w-full bg-white border border-gray-200 text-gray-700 font-semibold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google Login
                </button>
                <p class="text-center text-sm text-gray-500">New here? <button id="signup-btn" class="text-indigo-600 font-bold">Create Account</button></p>
            </div>
        </section>

        <section id="username-section" class="hidden mt-10 bg-white p-8 rounded-2xl border border-indigo-100 shadow-xl">
            <h2 class="text-xl font-bold mb-2">Claim your identity</h2>
            <p class="text-sm text-gray-500 mb-6">Choose a unique username to start posting.</p>
            <input type="text" id="new-username" placeholder="@username" class="w-full p-4 bg-indigo-50 rounded-xl outline-none font-bold text-indigo-600">
            <p id="username-error" class="text-red-500 text-xs mt-2 hidden">Username already taken!</p>
            <button id="save-username-btn" class="w-full mt-6 bg-indigo-600 text-white font-bold py-3 rounded-xl">Get Started</button>
        </section>

        <section id="feed-section" class="hidden space-y-4 pt-4">
            <div id="posts-container" class="space-y-4">
                </div>
        </section>

        <section id="profile-section" class="hidden mt-10">
            <div class="bg-white p-8 rounded-2xl text-center shadow-sm border border-gray-100">
                <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4" id="profile-initial">U</div>
                <h2 class="text-2xl font-bold" id="profile-handle">@username</h2>
                <p class="text-gray-400 text-sm" id="profile-email">email@example.com</p>
                <div class="mt-8 pt-8 border-t border-gray-50 text-left">
                    <p class="text-xs font-bold text-gray-300 uppercase">Account Settings</p>
                    <button onclick="location.reload()" class="w-full text-left py-4 text-indigo-600 font-semibold">Refresh Feed</button>
                </div>
            </div>
        </section>
    </main>

    <div id="post-modal" class="post-modal fixed inset-0 z-50 bg-black/50 items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl p-6 shadow-2xl animate-in slide-in-from-bottom">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg">New Post</h3>
                <button id="close-modal" class="text-gray-400">&times;</button>
            </div>
            <textarea id="post-content" maxlength="2000" rows="6" placeholder="What's happening? (Text only...)" class="w-full p-4 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-500 resize-none text-lg"></textarea>
            <div class="flex justify-between items-center mt-4">
                <span id="char-count" class="text-xs text-gray-400 font-medium">0 / 2000</span>
                <button id="submit-post" class="bg-indigo-600 text-white px-8 py-2.5 rounded-full font-bold hover:bg-indigo-700">Post</button>
            </div>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 nav-blur border-t border-gray-100 px-6 pb-6 pt-3 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <button id="nav-home" class="p-2 text-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            </button>
            <button id="nav-post" class="bg-indigo-600 text-white p-3 rounded-2xl shadow-lg shadow-indigo-200 -mt-8 border-4 border-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" /></svg>
            </button>
            <button id="nav-profile" class="p-2 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </button>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
            authDomain: "our-chat-club.firebaseapp.com",
            projectId: "our-chat-club",
            storageBucket: "our-chat-club.firebasestorage.app",
            messagingSenderId: "533265719248",
            appId: "1:533265719248:web:e4f61e9267c64b0b3663d5",
            measurementId: "G-1RZKH72PH2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUserHandle = "";

        // UI Management
        function showScreen(screenId) {
            ['auth-section', 'feed-section', 'profile-section', 'username-section'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
            
            if (screenId === 'auth-section' || screenId === 'username-section') {
                document.getElementById('bottom-nav').classList.add('hidden');
                document.getElementById('logout-btn').classList.add('hidden');
            } else {
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
            }
        }

        // Auth Listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserHandle = userDoc.data().username;
                    setupUI(user);
                    showScreen('feed-section');
                } else {
                    showScreen('username-section');
                }
            } else {
                showScreen('auth-section');
            }
        });

        function setupUI(user) {
            document.getElementById('profile-handle').innerText = `@${currentUserHandle}`;
            document.getElementById('profile-email').innerText = user.email;
            document.getElementById('profile-initial').innerText = currentUserHandle[0].toUpperCase();
            loadPosts();
        }

        // Username Registration
        document.getElementById('save-username-btn').onclick = async () => {
            const username = document.getElementById('new-username').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
            if (username.length < 3) return alert("Username too short");

            // Check if unique
            const q = query(collection(db, "users"), where("username", "==", username));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                document.getElementById('username-error').classList.remove('hidden');
                return;
            }

            await setDoc(doc(db, "users", auth.currentUser.uid), {
                username: username,
                email: auth.currentUser.email,
                createdAt: serverTimestamp()
            });
            location.reload();
        };

        // Login & Social
        document.getElementById('google-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('signup-btn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Navigation Actions
        document.getElementById('nav-home').onclick = () => {
            showScreen('feed-section');
            updateNavIcons('home');
        };
        document.getElementById('nav-profile').onclick = () => {
            showScreen('profile-section');
            updateNavIcons('profile');
        };
        document.getElementById('nav-post').onclick = () => document.getElementById('post-modal').classList.add('active');
        document.getElementById('close-modal').onclick = () => document.getElementById('post-modal').classList.remove('active');

        function updateNavIcons(active) {
            document.getElementById('nav-home').classList.toggle('text-indigo-600', active === 'home');
            document.getElementById('nav-home').classList.toggle('text-gray-400', active !== 'home');
            document.getElementById('nav-profile').classList.toggle('text-indigo-600', active === 'profile');
            document.getElementById('nav-profile').classList.toggle('text-gray-400', active !== 'profile');
        }

        // Posting Logic
        const postInput = document.getElementById('post-content');
        postInput.oninput = () => {
            document.getElementById('char-count').innerText = `${postInput.value.length} / 2000`;
        };

        document.getElementById('submit-post').onclick = async () => {
            const content = postInput.value.trim();
            if (!content) return;

            try {
                await addDoc(collection(db, "posts"), {
                    text: content,
                    author: currentUserHandle,
                    uid: auth.currentUser.uid,
                    createdAt: serverTimestamp()
                });
                postInput.value = '';
                document.getElementById('post-modal').classList.remove('active');
            } catch (e) { alert("Post failed. Check connection."); }
        };

        // Real-time Feed
        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('posts-container');
                container.innerHTML = '';
                snapshot.forEach((doc) => {
                    const post = doc.data();
                    const postEl = document.createElement('div');
                    postEl.className = "bg-white p-5 rounded-2xl border border-gray-100 shadow-sm";
                    postEl.innerHTML = `
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-8 h-8 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600 text-xs font-bold">${post.author[0].toUpperCase()}</div>
                            <p class="text-sm font-bold text-gray-900">@${post.author}</p>
                        </div>
                        <p class="text-gray-700 leading-relaxed whitespace-pre-wrap">${post.text}</p>
                        <p class="text-[10px] text-gray-300 mt-4 font-medium uppercase tracking-widest">${post.createdAt?.toDate().toLocaleString() || 'Syncing...'}</p>
                    `;
                    container.appendChild(postEl);
                });
            });
        }
    </script>
</body>
</html>
