<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Chat Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .nav-blur { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.8); }
        .modal { display: none; }
        .modal.active { display: flex; }
        .badge { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: red; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="relative">
                <button id="nav-dm" class="p-2 text-gray-600 relative">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    <div id="dm-badge" class="badge hidden"></div>
                </button>
            </div>
            
            <div class="flex-1 px-4">
                <input type="text" id="search-input" placeholder="Search users..." class="w-full bg-gray-100 border-none rounded-full px-4 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
            </div>

            <button id="logout-btn" class="text-[10px] font-bold text-gray-400 hidden">LOGOUT</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <section id="login-section" class="mt-10 space-y-6">...</section>
        <section id="signup-section" class="hidden mt-10 space-y-6">...</section>
        
        <section id="profile-section" class="hidden mt-6">
            <div class="bg-white p-8 rounded-3xl text-center shadow-sm border border-gray-100">
                <div class="w-24 h-24 bg-indigo-600 text-white rounded-full flex items-center justify-center text-4xl font-black mx-auto mb-4" id="profile-initial">?</div>
                <h2 class="text-2xl font-bold" id="profile-handle">@username</h2>
                <div id="profile-bio-container" class="mt-2">
                    <p id="profile-bio" class="text-gray-500 italic">No bio yet.</p>
                    <button id="edit-bio-btn" class="text-indigo-600 text-xs font-bold mt-2 hidden">EDIT BIO</button>
                </div>
                <button id="message-user-btn" class="mt-6 bg-indigo-600 text-white px-8 py-2 rounded-full font-bold hidden">MESSAGE</button>
            </div>
        </section>

        <section id="dm-section" class="hidden mt-4 space-y-4">
            <button id="back-to-feed" class="text-indigo-600 font-bold text-sm mb-4">← Back to Feed</button>
            <div id="chat-list" class="space-y-2"></div>
            <div id="active-chat" class="hidden flex flex-col h-[70vh] bg-white rounded-3xl p-4 shadow-sm border">
                <div id="chat-messages" class="flex-1 overflow-y-auto space-y-2 pb-4"></div>
                <div class="flex gap-2 border-t pt-4">
                    <input type="text" id="dm-input" placeholder="Type a message..." class="flex-1 bg-gray-50 border-none rounded-xl px-4 outline-none">
                    <button id="send-dm" class="bg-indigo-600 text-white p-2 rounded-xl">Send</button>
                </div>
            </div>
        </section>

        <section id="feed-section" class="hidden pt-4 space-y-4">
            <div id="posts-container" class="space-y-4"></div>
        </section>
    </main>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 nav-blur border-t border-gray-100 px-8 pb-8 pt-4 z-40">...</nav>

    <script type="module">
        // (Standard Firebase Imports)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        // (Your specific Config)
        const firebaseConfig = { ... };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userHandle = "";
        let currentChatPartner = null;

        // PROFILE REDIRECT LOGIC
        window.viewProfile = async (username) => {
            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const userData = snap.docs[0].data();
                const userId = snap.docs[0].id;
                
                showScreen('profile-section');
                document.getElementById('profile-handle').innerText = `@${userData.username}`;
                document.getElementById('profile-bio').innerText = userData.bio || "No bio yet.";
                document.getElementById('profile-initial').innerText = userData.username[0].toUpperCase();
                
                // If it's my profile, show edit. If someone else's, show Message.
                const isMe = userId === auth.currentUser.uid;
                document.getElementById('edit-bio-btn').classList.toggle('hidden', !isMe);
                document.getElementById('message-user-btn').classList.toggle('hidden', isMe);
                
                if(!isMe) {
                    document.getElementById('message-user-btn').onclick = () => startChat(userId, userData.username);
                }
            }
        };

        // BIO UPDATE LOGIC
        document.getElementById('edit-bio-btn').onclick = async () => {
            const newBio = prompt("Enter your new bio (max 100 chars):");
            if (newBio) {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { bio: newBio });
                document.getElementById('profile-bio').innerText = newBio;
            }
        };

        // DM & NOTIFICATION LOGIC
        async function startChat(partnerUid, partnerName) {
            currentChatPartner = { uid: partnerUid, name: partnerName };
            showScreen('dm-section');
            document.getElementById('chat-list').classList.add('hidden');
            document.getElementById('active-chat').classList.remove('hidden');
            loadDMs();
        }

        async function loadDMs() {
            const chatId = [auth.currentUser.uid, currentChatPartner.uid].sort().join('_');
            const q = query(collection(db, `chats/${chatId}/messages`), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(m => {
                    const msg = m.data();
                    const isMe = msg.sender === auth.currentUser.uid;
                    box.innerHTML += `<div class="p-2 rounded-xl text-sm ${isMe ? 'bg-indigo-500 text-white self-end' : 'bg-gray-100 self-start text-gray-700'} max-w-[80%]">${msg.text}</div>`;
                });
            });
        }

        document.getElementById('send-dm').onclick = async () => {
            const text = document.getElementById('dm-input').value;
            const chatId = [auth.currentUser.uid, currentChatPartner.uid].sort().join('_');
            if(!text.trim()) return;
            await addDoc(collection(db, `chats/${chatId}/messages`), {
                text, sender: auth.currentUser.uid, time: serverTimestamp(), read: false
            });
            document.getElementById('dm-input').value = "";
        };

        // SEARCH LOGIC
        document.getElementById('search-input').onkeypress = async (e) => {
            if(e.key === 'Enter') {
                const term = e.target.value.toLowerCase().replace('@', '');
                window.viewProfile(term);
            }
        };

        // Re-inject window click listeners for usernames in posts
        // Modify your loadPosts inside the snap.forEach:
        // card.querySelector('.username-link').onclick = () => viewProfile(p.author);
    </script>
</body>
</html>
