<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Chat Club</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

body {
  font-family: 'Inter', sans-serif;
  background: #f8faff;
  padding-bottom: 100px;
}

.brand-gradient {
  background: linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb);
}

.brand-text {
  background: linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb);
  -webkit-background-clip: text;
  color: transparent;
}

.modal { display:none; }
.modal.active { display:flex; }

* { transition: all 0.2s ease; }
</style>
</head>
<body class="text-gray-900">

<header class="bg-white shadow p-3 sticky top-0">
  <input id="search-input" placeholder="Search @username..." class="w-full p-3 rounded-xl bg-gray-100">
</header>

<main class="max-w-2xl mx-auto p-4">

<!-- LOGIN -->
<section id="login-section">
  <h1 class="text-4xl font-bold text-center brand-text">Our Chat Club</h1>

  <div class="bg-white p-6 rounded-2xl mt-6 shadow space-y-3">
    <input id="login-email" placeholder="Email" class="w-full p-3 bg-gray-100 rounded-xl">
    <input id="login-password" type="password" placeholder="Password" class="w-full p-3 bg-gray-100 rounded-xl">

    <button id="do-login-btn" class="w-full p-3 text-white brand-gradient rounded-xl">
      Login
    </button>

    <button id="go-to-signup" class="text-indigo-600">Create account</button>
  </div>
</section>

<!-- SIGNUP -->
<section id="signup-section" class="hidden">
  <h1 class="text-4xl font-bold text-center brand-text">Join the Club</h1>

  <div class="bg-white p-6 rounded-2xl mt-6 shadow space-y-3">
    <input id="signup-username" placeholder="@username" class="w-full p-3 bg-gray-100 rounded-xl">
    <input id="signup-email" placeholder="Email" class="w-full p-3 bg-gray-100 rounded-xl">
    <input id="signup-password" type="password" placeholder="Password" class="w-full p-3 bg-gray-100 rounded-xl">

    <button id="do-signup-btn" class="w-full p-3 text-white brand-gradient rounded-xl">
      Register
    </button>

    <button id="back-to-login" class="text-indigo-600">Back</button>
  </div>
</section>

<!-- FEED -->
<section id="feed-section" class="hidden space-y-4">
  <div id="posts-container"></div>
</section>
</main>

<!-- POST MODAL -->
<div id="post-modal" class="modal fixed inset-0 bg-black/50 items-center justify-center">
  <div class="bg-white p-6 rounded-xl w-full max-w-md">
    <textarea id="post-content" class="w-full p-3 bg-gray-100 rounded-xl" placeholder="Write something..."></textarea>

    <div class="flex gap-2 mt-3">
      <button id="submit-post" class="flex-1 p-3 brand-gradient text-white rounded-xl">Post</button>
      <button id="close-modal" class="flex-1 p-3 bg-gray-200 rounded-xl">Cancel</button>
    </div>
  </div>
</div>

<!-- FLOAT BUTTON -->
<button id="btn-add" class="fixed bottom-6 right-6 bg-indigo-600 text-white w-14 h-14 rounded-full text-2xl shadow-lg">+</button>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
  authDomain: "our-chat-club.firebaseapp.com",
  projectId: "our-chat-club"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// SCREEN SWITCH
function show(id){
  ["login-section","signup-section","feed-section"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// AUTH STATE
onAuthStateChanged(auth,user=>{
  if(user){
    show("feed-section");
    loadFeed();
  } else {
    show("login-section");
  }
});

// NAV
document.getElementById("go-to-signup").onclick = () => show("signup-section");
document.getElementById("back-to-login").onclick = () => show("login-section");

// SIGNUP
document.getElementById("do-signup-btn").onclick = async () => {
  const username = document.getElementById("signup-username").value
    .toLowerCase()
    .replace(/[^a-z0-9_]/g,'');

  const email = document.getElementById("signup-email").value;
  const pass = document.getElementById("signup-password").value;

  if(!username || !email || !pass) return alert("Fill all fields");

  const q = query(collection(db,"users"),where("username","==",username));
  const snap = await getDocs(q);
  if(!snap.empty) return alert("Username taken");

  const cred = await createUserWithEmailAndPassword(auth,email,pass);

  await setDoc(doc(db,"users",cred.user.uid),{
    username,
    email,
    createdAt:serverTimestamp()
  });

  show("feed-section");
};

// LOGIN
document.getElementById("do-login-btn").onclick = () => {
  signInWithEmailAndPassword(
    auth,
    document.getElementById("login-email").value,
    document.getElementById("login-password").value
  ).catch(e => alert(e.message));
};

// FEED
function loadFeed(){
  onSnapshot(collection(db,"posts"),snap=>{
    const container = document.getElementById("posts-container");
    container.innerHTML = "";

    snap.forEach(docSnap=>{
      const p = docSnap.data();

      container.innerHTML += `
        <div class="bg-white p-4 rounded-xl shadow">
          <b>@${p.author}</b><br>${p.text}
        </div>
      `;
    });
  });
}

// OPEN MODAL
document.getElementById("btn-add").onclick = () => {
  document.getElementById("post-modal").classList.add("active");
};

// CLOSE MODAL
document.getElementById("close-modal").onclick = () => {
  document.getElementById("post-modal").classList.remove("active");
};

// POST
document.getElementById("submit-post").onclick = async () => {
  const text = document.getElementById("post-content").value.trim();
  if(!text) return;

  await addDoc(collection(db,"posts"),{
    text,
    author: auth.currentUser.email,
    createdAt: serverTimestamp()
  });

  document.getElementById("post-content").value = "";
  document.getElementById("post-modal").classList.remove("active");
};
</script>

</body>
</html>
