<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Chat Club</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

body {
  font-family: 'Inter', sans-serif;
  background: #f8faff;
  padding-bottom: 90px;
}

* { transition: all 0.2s ease; }

.brand-gradient {
  background: linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb);
}

.brand-text {
  background: linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb);
  -webkit-background-clip: text;
  color: transparent;
}

.modal { display:none; }
.modal.active { display:flex; }
</style>
</head>
<body class="text-gray-900">

<header class="bg-white shadow p-3 sticky top-0 z-50">
  <input id="search-input" placeholder="Search @username..." class="w-full p-3 rounded-xl bg-gray-100 outline-none">
</header>

<main class="max-w-2xl mx-auto p-4">

<!-- LOGIN -->
<section id="login-section">
  <h1 class="text-4xl font-black text-center brand-text">Our Chat Club</h1>

  <div class="bg-white p-6 rounded-3xl mt-6 space-y-3 shadow">
    <input id="login-email" placeholder="Email" class="w-full p-3 bg-gray-100 rounded-xl">
    <input id="login-password" type="password" placeholder="Password" class="w-full p-3 bg-gray-100 rounded-xl">

    <button id="do-login-btn" class="w-full p-3 text-white brand-gradient rounded-xl font-bold">
      Login
    </button>

    <button id="go-to-signup" class="text-indigo-600">Create account</button>
  </div>
</section>

<!-- SIGNUP -->
<section id="signup-section" class="hidden">
  <h1 class="text-4xl font-black text-center brand-text">Join the Club</h1>

  <div class="bg-white p-6 rounded-3xl mt-6 space-y-3 shadow">
    <input id="signup-username" placeholder="@username" class="w-full p-3 bg-gray-100 rounded-xl">
    <input id="signup-email" placeholder="Email" class="w-full p-3 bg-gray-100 rounded-xl">
    <input id="signup-password" type="password" placeholder="Password" class="w-full p-3 bg-gray-100 rounded-xl">

    <button id="do-signup-btn" class="w-full p-3 text-white brand-gradient rounded-xl font-bold">
      Register
    </button>

    <button id="back-to-login" class="text-indigo-600">Back</button>
  </div>
</section>

<!-- FEED -->
<section id="feed-section" class="hidden space-y-4">
  <div id="posts-container"></div>
</section>
<!-- PROFILE -->
<section id="profile-section" class="hidden mt-4">
  <div class="bg-white p-6 rounded-3xl text-center shadow">
    <div id="profile-initial" class="w-20 h-20 mx-auto rounded-full brand-gradient text-white flex items-center justify-center text-2xl font-bold">A</div>
    <h2 id="profile-handle">@user</h2>
    <p id="profile-bio" class="text-gray-500">Bio</p>
  </div>
</section>

<!-- DM -->
<section id="dm-section" class="hidden mt-4">
  <div id="chat-list"></div>

  <div id="active-chat" class="hidden">
    <div id="chat-messages" class="h-[60vh] overflow-y-auto"></div>

    <input id="dm-input" class="w-full p-3 bg-gray-100 mt-2 rounded-xl">
    <button id="send-dm" class="w-full p-3 bg-indigo-600 text-white rounded-xl mt-2">Send</button>
  </div>
</section>

</main>

<!-- POST MODAL -->
<div id="post-modal" class="modal fixed inset-0 bg-black/50 items-center justify-center">
  <div class="bg-white p-6 rounded-xl w-full max-w-md">
    <textarea id="post-content" class="w-full p-3 bg-gray-100 rounded-xl"></textarea>
    <button id="submit-post" class="w-full mt-3 p-3 brand-gradient text-white rounded-xl">Post</button>
  </div>
</div>

<!-- FLOAT BUTTON -->
<button id="btn-add" class="fixed bottom-6 right-6 bg-indigo-600 text-white w-14 h-14 rounded-full text-2xl shadow-lg">+</button>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, query, where, onSnapshot, serverTimestamp, updateDoc, increment, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

const firebaseConfig = { 
  apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE",
  authDomain: "our-chat-club.firebaseapp.com",
  projectId: "our-chat-club"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

function show(id){
  ["login-section","signup-section","feed-section"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

onAuthStateChanged(auth,user=>{
  if(user){ show("feed-section"); loadFeed(); }
  else show("login-section");
});

// NAV
go-to-signup.onclick=()=>show("signup-section");
back-to-login.onclick=()=>show("login-section");

// SIGNUP
do-signup-btn.onclick=async()=>{
  const user=signup-username.value.toLowerCase().replace(/[^a-z0-9_]/g,'');
  const email=signup-email.value;
  const pass=signup-password.value;

  const q=query(collection(db,"users"),where("username","==",user));
  const snap=await getDocs(q);
  if(!snap.empty) return alert("Username taken");

  const cred=await createUserWithEmailAndPassword(auth,email,pass);

  await setDoc(doc(db,"users",cred.user.uid),{
    username:user,
    email,
    createdAt:serverTimestamp()
  });
};

// LOGIN
do-login-btn.onclick=()=>{
  signInWithEmailAndPassword(auth,login-email.value,login-password.value);
};

// FEED
function loadFeed(){
  onSnapshot(collection(db,"posts"),snap=>{
    posts-container.innerHTML="";
    snap.forEach(d=>{
      const p=d.data();
      const id=d.id;

      posts-container.innerHTML+=`
      <div class="bg-white p-4 rounded-2xl shadow">
        <b>@${p.author}</b><br>${p.text}
      </div>`;
    });
  });
}

// POST
btn-add.onclick=()=>post-modal.classList.add("active");

submit-post.onclick=async()=>{
  const text=post-content.value;
  if(!text) return;

  await addDoc(collection(db,"posts"),{
    text,
    author:"user",
    createdAt:serverTimestamp(),
    likes:[],
    views:0,
    viewers:[]
  });

  post-modal.classList.remove("active");
};
</script>

</body>
</html>
