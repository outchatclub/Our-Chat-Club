<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OCC - Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black mb-8">Admin Dashboard</h1>

        <div class="grid grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-3xl shadow">
                <h2 class="font-black text-lg mb-4">Feature Requests</h2>
                <div id="request-list" class="space-y-3"></div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow">
                <h2 class="font-black text-lg mb-4">VIP Chats</h2>
                <div id="chat-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "requests"), snap => {
            const list = document.getElementById("request-list");
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="p-3 bg-slate-50 rounded-xl text-xs"><b>${data.name}:</b> ${data.request}</div>`;
            });
        });

        onSnapshot(collection(db, "vip_chats"), snap => {
            const list = document.getElementById("chat-list");
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                if(data.status === "open") {
                    const div = document.createElement("div");
                    div.className = "p-4 border rounded-2xl bg-indigo-50";
                    div.innerHTML = `<p class="font-bold text-sm">${data.userName}</p><p class="text-sm italic my-2">"${data.lastMessage}"</p>`;
                    const btn = document.createElement("button");
                    btn.className = "bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold";
                    btn.innerText = "REPLY";
                    btn.onclick = async () => {
                        const reply = prompt("Your Reply:");
                        if(reply) await updateDoc(doc(db, "vip_chats", d.id), { status: "closed", adminReply: reply });
                    };
                    div.appendChild(btn);
                    list.appendChild(div);
                }
            });
        });
    </script>
</body>
</html>
