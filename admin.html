<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Our Chat Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .admin-card { background: #111; border: 1px solid #333; border-radius: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="login-section" class="admin-card p-8 w-full max-w-md shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-500">Admin Login</h2>
        <div class="space-y-4">
            <input type="text" id="admin-user" placeholder="Admin Username (@admin)" 
                class="w-full p-3 bg-black border border-gray-700 rounded focus:border-blue-500 outline-none">
            <input type="password" id="admin-pass" placeholder="Password (DD/MM/YYYY)" 
                class="w-full p-3 bg-black border border-gray-700 rounded focus:border-blue-500 outline-none">
            <button onclick="checkLogin()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition">
                Access Panel
            </button>
            <p id="error-msg" class="text-red-500 text-sm text-center hidden">Galat Details! Dubara koshish karein.</p>
        </div>
    </div>

    <div id="admin-panel" class="w-full max-w-4xl hidden">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">OCC <span class="text-blue-500">Dashboard</span></h1>
            <button onclick="location.reload()" class="bg-red-600 px-4 py-2 rounded text-sm">Logout</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="admin-card p-6 text-center">
                <p class="text-gray-400">Total Users</p>
                <h3 id="user-count" class="text-4xl font-bold">--</h3>
            </div>
            <div class="admin-card p-6 text-center">
                <p class="text-gray-400">Total Posts</p>
                <h3 id="post-count" class="text-4xl font-bold">--</h3>
            </div>
            <div class="admin-card p-6 text-center border-blue-900">
                <p class="text-blue-400">Status</p>
                <h3 class="text-2xl font-bold text-green-500">System Live</h3>
            </div>
        </div>

        <div class="admin-card p-6">
            <h2 class="text-xl font-bold mb-4 border-b border-gray-800 pb-2">Management Console</h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 bg-black rounded border border-gray-800">
                    <div>
                        <p class="font-bold">Global Post Cleanup</p>
                        <p class="text-xs text-gray-500">Delete all messages from database</p>
                    </div>
                    <button class="bg-red-900/50 hover:bg-red-600 text-red-200 px-4 py-2 rounded transition text-sm">Clear All</button>
                </div>
                
                <div class="flex items-center justify-between p-4 bg-black rounded border border-gray-800">
                    <div>
                        <p class="font-bold">User Ban System</p>
                        <p class="text-xs text-gray-500">Restrict access to specific IDs</p>
                    </div>
                    <button class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded text-sm">Manage</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            const error = document.getElementById('error-msg');

            // Tumhari conditions: @admin aur birthday password
            if (user === "@admin" && (pass === "29/10/2007" || pass === "29102007")) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadStats();
            } else {
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 3000);
            }
        }

        // Dummy stats for now, later connect with your Firebase
        function loadStats() {
            document.getElementById('user-count').innerText = "124";
            document.getElementById('post-count').innerText = "1,850";
        }
    </script>
</body>
</html>
