<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-gradient { background: linear-gradient(135deg,#7c3aed,#2563eb); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div id="admin-auth-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[2.5rem] shadow-2xl text-slate-900">
            <h1 class="text-2xl font-black mb-2 text-indigo-600 text-center">ADMIN PANEL</h1>
            <p class="text-slate-400 text-sm text-center mb-6">Verification Required</p>
            
            <div class="space-y-4">
                <input id="admin-email-input" type="email" placeholder="Admin Email" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <input id="admin-pass-input" type="password" placeholder="Admin Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <button id="admin-login-btn" class="w-full p-4 text-white font-bold brand-gradient rounded-2xl shadow-lg active:scale-95 transition-all">UNLOCK PANEL</button>
            </div>
            <a href="index.html" class="block text-center mt-6 text-slate-400 text-xs font-bold uppercase tracking-widest">Exit to Home</a>
        </div>
    </div>

    <div id="admin-panel-content" class="hidden max-w-md mx-auto p-5 pb-24">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-indigo-400">CONTROL CENTER</h1>
            <button onclick="logoutAdmin()" class="bg-slate-800 p-3 px-5 rounded-2xl text-xs font-bold">LOCK</button>
        </div>
        
        <div class="bg-indigo-600 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-200">📢 Announcement</h2>
            <input id="ann-text" placeholder="Message..." class="w-full p-4 bg-indigo-700/50 rounded-2xl mb-3 outline-none">
            <div class="flex gap-2 mb-4">
                <input id="ann-hours" type="number" placeholder="Hrs" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none">
                <input id="ann-mins" type="number" placeholder="Mins" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none">
            </div>
            <button id="pub-ann" class="w-full p-4 bg-white text-indigo-600 rounded-2xl font-black">PUBLISH</button>
        </div>

        <div class="bg-white text-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase text-slate-400 mb-4">📰 Create News</h2>
            <input id="news-title" placeholder="Title" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <textarea id="news-content" placeholder="Content..." class="w-full p-4 bg-slate-100 rounded-2xl h-32 mb-4 outline-none"></textarea>
            <button id="post-news" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black">POST</button>
        </div>

        <div id="news-list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const MASTER_EMAIL = "admin@gmail.com";
        const MASTER_PASS = "29102007";

        document.getElementById("admin-login-btn").onclick = () => {
            const emailInput = document.getElementById("admin-email-input").value;
            const passInput = document.getElementById("admin-pass-input").value;
            const currentUser = auth.currentUser;

            // 1. Check local credentials
            if(emailInput === MASTER_EMAIL && passInput === MASTER_PASS) {
                // 2. Critical: Check if the user is actually signed into Firebase with admin@gmail.com
                if(currentUser && currentUser.email === MASTER_EMAIL) {
                    sessionStorage.setItem("admin_verified", "true");
                    unlockPanel();
                } else {
                    alert("Error: You must be logged into the main site as admin@gmail.com first.");
                }
            } else {
                alert("Incorrect credentials.");
            }
        };

        function unlockPanel() {
            document.getElementById("admin-auth-overlay").classList.add("hidden");
            document.getElementById("admin-panel-content").classList.remove("hidden");
            loadNews();
        }

        window.logoutAdmin = () => {
            sessionStorage.removeItem("admin_verified");
            location.reload();
        };

        // Persistent Session Check
        onAuthStateChanged(auth, (user) => {
            if(user && user.email === MASTER_EMAIL && sessionStorage.getItem("admin_verified") === "true") {
                unlockPanel();
            }
        });

        // --- CRUD OPERATIONS ---
        document.getElementById("post-news").onclick = async () => {
            const title = document.getElementById("news-title").value;
            const content = document.getElementById("news-content").value;
            if(!title || !content) return;
            try {
                await addDoc(collection(db, "news"), { title, content, likes: [], createdAt: serverTimestamp() });
                alert("News Published!");
                document.getElementById("news-title").value = ""; 
                document.getElementById("news-content").value = "";
            } catch(e) { alert("Permission Denied: Ensure rules are updated."); }
        };

        document.getElementById("pub-ann").onclick = async () => {
            const text = document.getElementById("ann-text").value;
            const hrs = parseInt(document.getElementById("ann-hours").value) || 0;
            const mins = parseInt(document.getElementById("ann-mins").value) || 0;
            const expiry = Date.now() + ((hrs * 60) + mins) * 60000;
            try {
                await setDoc(doc(db, "settings", "announcement"), { text, expiry });
                alert("Announcement Live!");
            } catch(e) { alert("Permission Denied."); }
        };

        function loadNews() {
            onSnapshot(collection(db, "news"), snap => {
                const list = document.getElementById("news-list");
                list.innerHTML = "";
                snap.forEach(sDoc => {
                    const d = document.createElement("div");
                    d.className = "flex justify-between items-center bg-slate-800 p-4 rounded-2xl";
                    d.innerHTML = `<span>${sDoc.data().title}</span>
                                   <button onclick="delNews('${sDoc.id}')" class="text-red-400 font-bold">DEL</button>`;
                    list.appendChild(d);
                });
            });
        }

        window.delNews = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "news", id)); };
    </script>
</body>
</html>
