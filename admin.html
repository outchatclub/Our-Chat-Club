<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCC Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .tab-btn.active { background: #4338ca; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-indigo-700">Admin Console</h1>
            <button onclick="location.href='index.html'" class="bg-white px-6 py-2 rounded-xl shadow-sm font-bold">Exit</button>
        </header>

        <nav class="flex gap-2 mb-8 overflow-x-auto pb-2">
            <button onclick="switchTab('payouts')" class="tab-btn active px-6 py-3 rounded-xl font-bold bg-white shadow-sm transition-all" id="btn-payouts">Payout Requests</button>
            <button onclick="switchTab('history')" class="tab-btn px-6 py-3 rounded-xl font-bold bg-white shadow-sm transition-all" id="btn-history">Payout History</button>
            <button onclick="switchTab('users')" class="tab-btn px-6 py-3 rounded-xl font-bold bg-white shadow-sm transition-all" id="btn-users">Registered Users</button>
        </nav>

        <section id="sec-payouts" class="tab-content space-y-4">
            <h2 class="text-xl font-black mb-4">Active Requests</h2>
            <div id="pending-list" class="grid gap-4"></div>
        </section>

        <section id="sec-history" class="tab-content hidden space-y-4">
            <h2 class="text-xl font-black mb-4">Processed History</h2>
            <div id="history-list" class="grid gap-4"></div>
        </section>

        <section id="sec-users" class="tab-content hidden">
            <div class="bg-white rounded-3xl p-6 shadow-sm overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="border-b"><th class="py-4">User</th><th>Email</th><th>Wallet</th><th>Actions</th></tr></thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="payout-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full">
            <h3 class="text-xl font-black mb-4" id="modal-title">Process Payout</h3>
            <textarea id="admin-note" class="w-full border p-4 rounded-2xl mb-4 h-32" placeholder="Enter redeem code or reason for rejection..."></textarea>
            <div class="flex gap-2">
                <button onclick="confirmPayout('accepted')" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-bold">Accept</button>
                <button onclick="confirmPayout('rejected')" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold">Reject</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-2 text-slate-400 font-bold">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let activePayoutId = null;

        onAuthStateChanged(auth, user => {
            if (!user || user.email !== "admin@gmail.com") {
                alert("Access Denied");
                location.href = 'index.html';
            } else {
                loadData();
            }
        });

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active');
        };

        function loadData() {
            // Pending Payouts
            onSnapshot(query(collection(db, "payouts"), where("status", "==", "pending"), orderBy("createdAt", "desc")), s => {
                document.getElementById("pending-list").innerHTML = s.docs.map(d => {
                    const item = d.data();
                    return `
                        <div class="bg-white p-6 rounded-3xl shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <p class="text-xs font-bold text-indigo-600 uppercase">Request from ${item.userName}</p>
                                <h3 class="text-lg font-black">${item.rewardTitle}</h3>
                                <p class="text-sm text-slate-500">${item.userEmail} | Current: 💰${item.currentWallet}</p>
                            </div>
                            <button onclick="openPayoutModal('${d.id}')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">Process</button>
                        </div>
                    `;
                }).join('');
            });

            // Payout History
            onSnapshot(query(collection(db, "payouts"), where("status", "!=", "pending"), orderBy("status")), s => {
                document.getElementById("history-list").innerHTML = s.docs.map(d => {
                    const item = d.data();
                    const color = item.status === 'accepted' ? 'bg-emerald-50' : 'bg-red-50';
                    return `
                        <div class="${color} p-4 rounded-2xl border flex justify-between items-center">
                            <div>
                                <p class="font-bold">${item.userName} - ${item.rewardTitle}</p>
                                <p class="text-xs">${item.adminMessage}</p>
                            </div>
                            <span class="font-black uppercase text-xs">${item.status}</span>
                        </div>
                    `;
                }).join('');
            });

            // Users List
            onSnapshot(collection(db, "users"), s => {
                document.getElementById("user-table-body").innerHTML = s.docs.map(d => {
                    const u = d.data();
                    return `
                        <tr class="border-b">
                            <td class="py-4 font-bold">${u.name}</td>
                            <td>${u.email}</td>
                            <td class="font-black text-indigo-600">${u.wallet || 0}</td>
                            <td><button onclick="deleteUser('${d.id}')" class="text-red-500 text-xs font-bold">Delete</button></td>
                        </tr>
                    `;
                }).join('');
            });
        }

        window.openPayoutModal = (id) => {
            activePayoutId = id;
            document.getElementById("payout-modal").classList.remove("hidden");
        };

        window.closeModal = () => {
            document.getElementById("payout-modal").classList.add("hidden");
            document.getElementById("admin-note").value = "";
        };

        window.confirmPayout = async (status) => {
            const note = document.getElementById("admin-note").value;
            if (!note) return alert("Please enter a message or code.");
            
            try {
                await updateDoc(doc(db, "payouts", activePayoutId), {
                    status: status,
                    adminMessage: note,
                    processedAt: Date.now()
                });
                closeModal();
            } catch (e) { alert(e.message); }
        };

        window.deleteUser = (id) => {
            if(confirm("Permanently delete this user?")) deleteDoc(doc(db, "users", id));
        };
    </script>
</body>
</html>
