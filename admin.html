<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Secure Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-gradient { background: linear-gradient(135deg,#7c3aed,#2563eb); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div id="admin-auth-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[2.5rem] shadow-2xl text-slate-900">
            <h1 class="text-2xl font-black mb-2 text-indigo-600 text-center">ADMIN ACCESS</h1>
            <p class="text-slate-400 text-sm text-center mb-6">Enter credentials to unlock panel</p>
            
            <div class="space-y-4">
                <input id="admin-email-input" type="email" placeholder="Admin Email" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <input id="admin-pass-input" type="password" placeholder="Admin Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <button id="admin-login-btn" class="w-full p-4 text-white font-bold brand-gradient rounded-2xl shadow-lg active:scale-95 transition-all">UNLOCK PANEL</button>
            </div>
            <a href="index.html" class="block text-center mt-6 text-slate-400 text-xs font-bold uppercase tracking-widest">Back to Site</a>
        </div>
    </div>

    <div id="admin-panel-content" class="hidden max-w-md mx-auto p-5 pb-24">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-indigo-400">ADMIN CONTROL</h1>
            <button onclick="logoutAdmin()" class="bg-slate-800 p-3 px-5 rounded-2xl text-xs font-bold uppercase">Lock Panel</button>
        </div>
        
        <div class="bg-indigo-600 p-6 rounded-[2.5rem] mb-6 shadow-xl shadow-indigo-500/20">
            <h2 class="text-xs font-black uppercase tracking-widest text-indigo-200 mb-4">📢 Top Announcement</h2>
            <input id="ann-text" placeholder="Important notice..." class="w-full p-4 bg-indigo-700/50 rounded-2xl mb-3 text-white placeholder-indigo-300 outline-none">
            <div class="flex gap-2 mb-4">
                <input id="ann-hours" type="number" placeholder="Hrs" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none" min="0">
                <input id="ann-mins" type="number" placeholder="Mins" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none" min="0">
            </div>
            <button id="pub-ann" class="w-full p-4 bg-white text-indigo-600 rounded-2xl font-black shadow-lg">PUBLISH LIVE</button>
        </div>

        <div class="bg-white text-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">📰 Create Post</h2>
            <input id="news-title" placeholder="News Headline" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <textarea id="news-content" placeholder="Full story..." class="w-full p-4 bg-slate-100 rounded-2xl h-32 mb-4 outline-none"></textarea>
            <button id="post-news" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black">UPLOAD NEWS</button>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-8 border border-slate-700">
            <h2 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-4">🚫 Ban Users</h2>
            <input id="ban-email" placeholder="user@email.com" class="w-full p-4 bg-slate-700 rounded-2xl mb-4 outline-none text-white">
            <div class="flex gap-3">
                <button onclick="handleBan(true)" class="w-1/2 p-4 bg-red-600 text-white rounded-2xl font-bold">BAN</button>
                <button onclick="handleBan(false)" class="w-1/2 p-4 bg-emerald-600 text-white rounded-2xl font-bold">UNBAN</button>
            </div>
        </div>

        <div id="news-list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "admin@gmail.com";
        const ADMIN_PASS = "29102007";

        // SEPARATE LOGIN CHECK
        document.getElementById("admin-login-btn").onclick = () => {
            const email = document.getElementById("admin-email-input").value;
            const pass = document.getElementById("admin-pass-input").value;

            if(email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                sessionStorage.setItem("admin_verified", "true");
                unlockPanel();
            } else {
                alert("Incorrect Admin Credentials.");
            }
        };

        function unlockPanel() {
            document.getElementById("admin-auth-overlay").classList.add("hidden");
            document.getElementById("admin-panel-content").classList.remove("hidden");
            loadNewsList();
        }

        window.logoutAdmin = () => {
            sessionStorage.removeItem("admin_verified");
            location.reload();
        };

        // Check on refresh
        if(sessionStorage.getItem("admin_verified") === "true") unlockPanel();

        // --- FEATURES ---

        document.getElementById("post-news").onclick = async () => {
            const title = document.getElementById("news-title").value;
            const content = document.getElementById("news-content").value;
            if(!title || !content) return;
            try {
                await addDoc(collection(db, "news"), { title, content, likes: [], createdAt: serverTimestamp() });
                alert("Success!");
                document.getElementById("news-title").value = ""; 
                document.getElementById("news-content").value = "";
            } catch(e) { alert("Access Denied on Server"); }
        };

        document.getElementById("pub-ann").onclick = async () => {
            const text = document.getElementById("ann-text").value;
            const hrs = parseInt(document.getElementById("ann-hours").value) || 0;
            const mins = parseInt(document.getElementById("ann-mins").value) || 0;
            const expiry = Date.now() + ((hrs * 60) + mins) * 60000;
            try {
                await setDoc(doc(db, "settings", "announcement"), { text, expiry });
                alert("Broadcast Live!");
            } catch(e) { alert("Access Denied on Server"); }
        };

        window.handleBan = async (status) => {
            const email = document.getElementById("ban-email").value.toLowerCase();
            if(!email) return;
            try {
                // Sanitize email for Firebase ID
                const safeId = email.replace(/\./g, '_');
                await setDoc(doc(db, "bannedUsers", safeId), { banned: status, email: email });
                alert(`User ${status ? 'BANNED' : 'UNBANNED'}`);
            } catch(e) { alert("Access Denied on Server"); }
        };

        function loadNewsList() {
            onSnapshot(collection(db, "news"), snap => {
                const list = document.getElementById("news-list");
                list.innerHTML = "";
                snap.forEach(sDoc => {
                    const div = document.createElement("div");
                    div.className = "flex justify-between items-center bg-slate-800 p-4 rounded-2xl";
                    div.innerHTML = `<span class="truncate max-w-[150px] font-bold">${sDoc.data().title}</span>
                                    <button onclick="delNews('${sDoc.id}')" class="text-red-400 font-bold px-2">DEL</button>`;
                    list.appendChild(div);
                });
            });
        }

        window.delNews = async (id) => { if(confirm("Delete this post?")) await deleteDoc(doc(db, "news", id)); };
    </script>
</body>
</html>
