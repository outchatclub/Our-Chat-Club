<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCC Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .tab-btn { color: #94a3b8; transition: all 0.3s; }
        .tab-btn.active { background: #4338ca; color: white; box-shadow: 0 4px 14px rgba(67, 56, 202, 0.4); }
        .card-dark { background: #1e293b; border: 1px solid #334155; }
        .input-dark { background: #0f172a; border: 1px solid #334155; color: white; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="admin-login-overlay" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-4">
        <div class="card-dark p-8 rounded-[2.5rem] max-w-sm w-full text-center">
            <h2 class="text-3xl font-black text-indigo-500 mb-8">ADMIN LOGIN</h2>
            <div class="space-y-4">
                <input type="email" id="admin-email" placeholder="Email" class="input-dark w-full p-4 rounded-2xl">
                <input type="password" id="admin-password" placeholder="Password" class="input-dark w-full p-4 rounded-2xl">
                <button id="do-admin-login" class="w-full bg-indigo-600 py-4 rounded-2xl font-black">Log In</button>
            </div>
        </div>
    </div>

    <div id="admin-content" class="max-w-5xl mx-auto hidden">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-indigo-500">ADMIN CONSOLE</h1>
            <button id="admin-logout-btn" class="bg-red-600 px-6 py-2 rounded-xl font-bold">Logout</button>
        </header>

        <nav class="flex gap-2 mb-8 overflow-x-auto">
            <button onclick="switchTab('payouts')" class="tab-btn active px-6 py-3 rounded-xl font-bold" id="btn-payouts">Requests</button>
            <button onclick="switchTab('history')" class="tab-btn px-6 py-3 rounded-xl font-bold" id="btn-history">History</button>
            <button onclick="switchTab('users')" class="tab-btn px-6 py-3 rounded-xl font-bold" id="btn-users">Users</button>
            <button onclick="switchTab('redeem')" class="tab-btn px-6 py-3 rounded-xl font-bold" id="btn-redeem">Codes</button>
        </nav>

        <section id="sec-payouts" class="tab-content grid gap-4"></section>
        <section id="sec-history" class="tab-content hidden grid gap-4"></section>
        <section id="sec-users" class="tab-content hidden card-dark rounded-3xl p-6 overflow-x-auto">
            <table class="w-full text-left">
                <thead class="text-slate-400"><tr><th class="py-4">Name</th><th>Email</th><th>Wallet</th><th>Action</th></tr></thead>
                <tbody id="user-table-body" class="divide-y divide-slate-700"></tbody>
            </table>
        </section>
        <section id="sec-redeem" class="tab-content hidden space-y-6">
            <div class="card-dark p-6 rounded-3xl grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="new-code" placeholder="CODE123" class="input-dark p-4 rounded-2xl uppercase">
                <input type="number" id="code-coins" placeholder="Coins" class="input-dark p-4 rounded-2xl">
                <button id="create-code-btn" class="bg-emerald-600 py-4 rounded-2xl font-black">Create</button>
            </div>
            <div class="card-dark p-6 rounded-3xl overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-slate-400"><tr><th class="py-4">Code</th><th>Coins</th><th>Status</th></tr></thead>
                    <tbody id="redeem-table-body" class="divide-y divide-slate-700"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="payout-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="card-dark rounded-[2.5rem] p-8 max-w-sm w-full">
            <h3 class="text-xl font-black mb-4 text-indigo-400">Process Request</h3>
            <textarea id="admin-note" class="input-dark w-full p-4 rounded-2xl mb-4 h-32" placeholder="Redeem code..."></textarea>
            <div class="flex gap-2">
                <button onclick="confirmPayout('accepted')" class="flex-1 bg-emerald-600 py-3 rounded-xl font-bold">Accept</button>
                <button onclick="confirmPayout('rejected')" class="flex-1 bg-red-600 py-3 rounded-xl font-bold">Reject</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-500 font-bold">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let activePayoutId = null;

        onAuthStateChanged(auth, user => {
            const overlay = document.getElementById("admin-login-overlay");
            const content = document.getElementById("admin-content");
            if (user && user.email === "admin@gmail.com") {
                overlay.classList.add("hidden"); content.classList.remove("hidden"); loadData();
            } else { overlay.classList.remove("hidden"); content.classList.add("hidden"); }
        });

        document.getElementById("do-admin-login").onclick = async () => {
            const email = document.getElementById("admin-email").value;
            const pass = document.getElementById("admin-password").value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert(e.message); }
        };

        document.getElementById("admin-logout-btn").onclick = () => signOut(auth);

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active');
        };

        function loadData() {
            // Pending Requests
            onSnapshot(query(collection(db, "payouts"), where("status", "==", "pending"), orderBy("createdAt", "desc")), s => {
                document.getElementById("sec-payouts").innerHTML = s.docs.map(d => {
                    const item = d.data();
                    return `<div class="card-dark p-6 rounded-3xl flex justify-between items-center border-l-4 border-indigo-500">
                        <div><p class="text-xs text-indigo-400">${item.userName}</p><h3 class="font-black">${item.rewardTitle}</h3></div>
                        <button onclick="openPayoutModal('${d.id}')" class="bg-indigo-600 px-6 py-2 rounded-xl font-bold">Process</button>
                    </div>`;
                }).join('');
            });

            // Payout History
            onSnapshot(query(collection(db, "payouts"), where("status", "!=", "pending"), orderBy("status"), orderBy("createdAt", "desc")), s => {
                document.getElementById("sec-history").innerHTML = s.docs.map(d => {
                    const item = d.data();
                    return `<div class="card-dark p-4 rounded-2xl opacity-80">
                        <p class="text-xs">${item.userName} - ${item.rewardTitle}</p>
                        <p class="font-bold text-indigo-400 uppercase text-xs">${item.status}</p>
                    </div>`;
                }).join('');
            });

            // Users List
            onSnapshot(collection(db, "users"), s => {
                document.getElementById("user-table-body").innerHTML = s.docs.map(d => {
                    const u = d.data();
                    return `<tr><td class="py-4 font-bold text-indigo-300">${u.name || 'N/A'}</td><td>${u.email}</td><td class="font-black">💰${u.wallet || 0}</td><td><button onclick="deleteUser('${d.id}')" class="text-red-500 text-xs font-black">BAN</button></td></tr>`;
                }).join('');
            });

            // Redeem Codes
            onSnapshot(query(collection(db, "redeem_codes"), orderBy("createdAt", "desc")), s => {
                document.getElementById("redeem-table-body").innerHTML = s.docs.map(d => {
                    const c = d.data();
                    return `<tr><td class="py-4 font-bold">${d.id}</td><td>${c.coins}</td><td class="text-xs uppercase">${c.status}</td></tr>`;
                }).join('');
            });
        }

        document.getElementById("create-code-btn").onclick = async () => {
            const code = document.getElementById("new-code").value.trim().toUpperCase();
            const coins = parseInt(document.getElementById("code-coins").value);
            if(!code || !coins) return alert("Missing fields");
            await setDoc(doc(db, "redeem_codes", code), { coins, status: "active", createdAt: Date.now() });
            alert("Code Created");
        };

        window.openPayoutModal = (id) => { activePayoutId = id; document.getElementById("payout-modal").classList.remove("hidden"); };
        window.closeModal = () => { document.getElementById("payout-modal").classList.add("hidden"); document.getElementById("admin-note").value = ""; };
        window.confirmPayout = async (status) => {
            const note = document.getElementById("admin-note").value;
            if(!note) return alert("Note required");
            await updateDoc(doc(db, "payouts", activePayoutId), { status, adminMessage: note, processedAt: Date.now() });
            closeModal();
        };
        window.deleteUser = (id) => { if(confirm("Ban User?")) deleteDoc(doc(db, "users", id)); };
    </script>
</body>
</html>
