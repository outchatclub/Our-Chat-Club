<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Control - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-gradient { background: linear-gradient(135deg,#7c3aed,#2563eb); }
        .hidden { display: none !important; }
        .vip-gold { background: linear-gradient(135deg, #f59e0b, #b45309); }
        .scroll-area { max-height: 300px; overflow-y: auto; }
        .scroll-area::-webkit-scrollbar { width: 3px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div id="admin-auth-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6 text-slate-900">
        <div class="w-full max-sm bg-white p-8 rounded-[2.5rem] shadow-2xl">
            <h1 class="text-2xl font-black mb-2 text-indigo-600 text-center uppercase tracking-tighter">Admin Panel</h1>
            <div class="space-y-4">
                <input id="admin-email-input" type="email" placeholder="Admin Email" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <input id="admin-pass-input" type="password" placeholder="Admin Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <button id="admin-login-btn" class="w-full p-4 text-white font-bold brand-gradient rounded-2xl shadow-lg active:scale-95 transition-all">UNLOCK PANEL</button>
            </div>
            <a href="index.html" class="block text-center mt-6 text-slate-400 text-xs font-bold uppercase tracking-widest">Exit</a>
        </div>
    </div>

    <div id="admin-panel-content" class="hidden max-w-md mx-auto p-5 pb-24">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black text-indigo-400 uppercase tracking-tighter">Control</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Master Dashboard</p>
            </div>
            <button onclick="logoutAdmin()" class="bg-slate-800 p-3 px-5 rounded-2xl text-xs font-bold uppercase">Lock</button>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-6 border border-slate-700 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-400 tracking-widest">⚖️ Legal & Policies</h2>
            <textarea id="terms-input" placeholder="Enter Terms and Conditions text..." class="w-full p-4 bg-slate-900/50 text-white rounded-2xl h-32 mb-4 outline-none border border-slate-700 text-sm"></textarea>
            <button id="update-terms" class="w-full p-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg uppercase tracking-wide">Update Terms</button>
        </div>

        <div class="bg-indigo-600 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-200 tracking-widest">📢 Global Announcement</h2>
            <input id="ann-text" placeholder="Broadcast Message..." class="w-full p-4 bg-indigo-700/50 rounded-2xl mb-3 outline-none text-white placeholder-indigo-300">
            <div class="flex gap-2 mb-4">
                <input id="ann-hours" type="number" placeholder="Hrs" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center text-white placeholder-indigo-300">
                <input id="ann-mins" type="number" placeholder="Mins" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center text-white placeholder-indigo-300">
            </div>
            <button id="pub-ann" class="w-full p-4 bg-white text-indigo-600 rounded-2xl font-black shadow-lg uppercase tracking-wide">Publish Announcement</button>
        </div>

        <div class="bg-white text-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">📰 Create News</h2>
            <input id="news-title" placeholder="News Title" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none focus:ring-2 ring-indigo-500">
            <input id="news-image" placeholder="Image URL (Direct Link)" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none focus:ring-2 ring-indigo-500">
            <textarea id="news-content" placeholder="Content..." class="w-full p-4 bg-slate-100 rounded-2xl h-24 mb-4 outline-none focus:ring-2 ring-indigo-500"></textarea>
            <button id="post-news" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg uppercase tracking-wide">Post News</button>
        </div>

        <div class="vip-gold p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-amber-100 tracking-widest">👑 VIP Codes</h2>
            <input id="vip-code-input" placeholder="Code Name" class="w-full p-4 bg-amber-700/30 rounded-2xl mb-3 outline-none placeholder-amber-200">
            <button id="gen-vip" class="w-full p-4 bg-white text-amber-700 rounded-2xl font-black shadow-lg uppercase tracking-wide">Create Code</button>
            <div id="vip-list" class="mt-4 space-y-2 scroll-area"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-6 border border-indigo-500/30">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-400 tracking-widest">💬 VIP Chats</h2>
            <div id="chat-list" class="scroll-area space-y-3"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-6 border border-slate-700">
            <h2 class="text-xs font-black uppercase mb-4 text-slate-400 tracking-widest">💡 Feature Requests</h2>
            <div id="request-list" class="scroll-area space-y-3"></div>
        </div>
        
        <div id="news-list" class="space-y-3 mt-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp, onSnapshot, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const MASTER_EMAIL = "admin@gmail.com";
        const MASTER_PASS = "29102007";

        document.getElementById("admin-login-btn").onclick = () => {
            if(document.getElementById("admin-email-input").value === MASTER_EMAIL && document.getElementById("admin-pass-input").value === MASTER_PASS) {
                sessionStorage.setItem("admin_verified", "true");
                unlockPanel();
            } else { alert("Wrong credentials."); }
        };

        function unlockPanel() {
            document.getElementById("admin-auth-overlay").classList.add("hidden");
            document.getElementById("admin-panel-content").classList.remove("hidden");
            loadData();
        }

        window.logoutAdmin = () => { sessionStorage.removeItem("admin_verified"); location.reload(); };
        onAuthStateChanged(auth, user => { if(sessionStorage.getItem("admin_verified") === "true") unlockPanel(); });

        async function loadData() {
            // Load existing Terms
            const tSnap = await getDoc(doc(db, "settings", "terms"));
            if(tSnap.exists()) document.getElementById("terms-input").value = tSnap.data().text;

            onSnapshot(collection(db, "news"), snap => {
                const list = document.getElementById("news-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const el = document.createElement("div");
                    el.className = "flex justify-between items-center bg-slate-800 p-4 rounded-2xl";
                    el.innerHTML = `<span class="text-sm font-bold truncate mr-4">${d.data().title}</span>
                                   <button onclick="delNews('${d.id}')" class="text-red-400 text-xs font-black uppercase tracking-tighter">Del</button>`;
                    list.appendChild(el);
                });
            });

            onSnapshot(collection(db, "vip_codes"), snap => {
                const list = document.getElementById("vip-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const statusText = data.usedBy ? "✅ Claimed" : "⏳ Pending";
                    const el = document.createElement("div");
                    el.className = "flex justify-between items-center bg-amber-900/30 p-3 rounded-xl border border-amber-500/20";
                    el.innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-xs font-black text-amber-200 uppercase tracking-tight">${d.id}</span>
                            <span class="text-[9px] font-bold text-amber-500/80 uppercase">${statusText}</span>
                        </div>
                        <button onclick="delVip('${d.id}')" class="text-white opacity-40 text-[10px] font-black uppercase">Delete</button>`;
                    list.appendChild(el);
                });
            });

            onSnapshot(collection(db, "requests"), snap => {
                const list = document.getElementById("request-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="bg-slate-700/50 p-4 rounded-2xl text-xs">
                        <p class="font-black text-indigo-400 uppercase mb-1">${data.name}</p>
                        <p class="mb-3">"${data.request}"</p>
                        <button onclick="delReq('${d.id}')" class="text-slate-500 font-bold uppercase">Dismiss</button>
                    </div>`;
                });
            });

            onSnapshot(collection(db, "vip_chats"), snap => {
                const list = document.getElementById("chat-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    if(data.status === "open") {
                        list.innerHTML += `<div class="bg-indigo-900/20 p-4 rounded-2xl border border-indigo-500/20">
                            <p class="text-[10px] font-black text-white mb-1 uppercase tracking-wider">${data.userName}</p>
                            <p class="text-xs italic text-slate-300 mb-4">"${data.lastMessage}"</p>
                            <button onclick="replyVip('${d.id}')" class="w-full py-2 bg-indigo-600 rounded-xl text-[10px] font-black uppercase tracking-widest">Reply</button>
                        </div>`;
                    }
                });
            });
        }

        window.delNews = id => deleteDoc(doc(db, "news", id));
        window.delVip = id => deleteDoc(doc(db, "vip_codes", id));
        window.delReq = id => deleteDoc(doc(db, "requests", id));
        window.replyVip = async id => {
            const reply = prompt("Enter reply for VIP:");
            if(reply) await updateDoc(doc(db, "vip_chats", id), { status: "closed", adminReply: reply });
        };

        // NEW: UPDATE TERMS ACTION
        document.getElementById("update-terms").onclick = async () => {
            const text = document.getElementById("terms-input").value;
            await setDoc(doc(db, "settings", "terms"), { text, lastUpdated: serverTimestamp() });
            alert("Terms Updated Successfully!");
        };

        document.getElementById("pub-ann").onclick = async () => {
            const text = document.getElementById("ann-text").value;
            const hrs = parseInt(document.getElementById("ann-hours").value) || 0;
            const mins = parseInt(document.getElementById("ann-mins").value) || 0;
            if(!text) return alert("Enter a message");
            const expiry = Date.now() + (hrs * 60 + mins) * 60000;
            await setDoc(doc(db, "settings", "announcement"), { text, expiry });
            document.getElementById("ann-text").value = "";
            document.getElementById("ann-hours").value = "";
            document.getElementById("ann-mins").value = "";
            alert("Announcement Published!");
        };

        document.getElementById("post-news").onclick = async () => {
            const title = document.getElementById("news-title").value;
            const content = document.getElementById("news-content").value;
            const imageUrl = document.getElementById("news-image").value;
            if(title && content) {
                await addDoc(collection(db, "news"), { title, content, imageUrl: imageUrl || "", likes: [], createdAt: serverTimestamp() });
                document.getElementById("news-title").value = "";
                document.getElementById("news-content").value = "";
                document.getElementById("news-image").value = "";
                alert("News Posted!");
            }
        };

        document.getElementById("gen-vip").onclick = async () => {
            const code = document.getElementById("vip-code-input").value.trim();
            if(code) await setDoc(doc(db, "vip_codes", code), { code, usedBy: null, createdAt: serverTimestamp() });
            document.getElementById("vip-code-input").value = "";
        };
    </script>
</body>
</html>
