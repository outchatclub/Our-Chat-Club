<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Control - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-gradient { background: linear-gradient(135deg,#7c3aed,#2563eb); }
        .hidden { display: none !important; }
        .vip-gold { background: linear-gradient(135deg, #f59e0b, #b45309); }
        .scroll-area { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div id="admin-auth-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6 text-slate-900">
        <div class="w-full max-sm bg-white p-8 rounded-[2.5rem] shadow-2xl">
            <h1 class="text-2xl font-black mb-2 text-indigo-600 text-center uppercase tracking-tighter">Admin Panel</h1>
            <div class="space-y-4">
                <input id="admin-email-input" type="email" placeholder="Email" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                <input id="admin-pass-input" type="password" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                <button id="admin-login-btn" class="w-full p-4 text-white font-bold brand-gradient rounded-2xl uppercase">Unlock</button>
            </div>
        </div>
    </div>

    <div id="admin-panel-content" class="hidden max-w-md mx-auto p-5 pb-24">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-indigo-400 uppercase tracking-tighter">Control</h1>
            <button onclick="location.reload()" class="bg-slate-800 p-3 px-5 rounded-2xl text-xs font-black uppercase">Lock</button>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-6 border border-slate-700 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-400 tracking-widest text-center">⚖️ Policy Control</h2>
            <textarea id="terms-input" placeholder="Terms..." class="w-full p-4 bg-slate-900/50 text-white rounded-2xl h-24 mb-2 outline-none border border-slate-700 text-sm"></textarea>
            <button id="update-terms" class="w-full p-3 bg-indigo-600 text-white rounded-xl font-black text-[10px] uppercase mb-4">Update Terms</button>
            
            <textarea id="privacy-input" placeholder="Privacy..." class="w-full p-4 bg-slate-900/50 text-white rounded-2xl h-24 mb-2 outline-none border border-slate-700 text-sm"></textarea>
            <button id="update-privacy" class="w-full p-3 bg-slate-700 text-white rounded-xl font-black text-[10px] uppercase">Update Privacy</button>
        </div>

        <div class="bg-indigo-600 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-200 tracking-widest text-center">📢 Announcement</h2>
            <input id="ann-text" placeholder="Broadcast Message..." class="w-full p-4 bg-indigo-700/50 rounded-2xl mb-3 outline-none text-white">
            <div class="flex gap-2 mb-4">
                <input id="ann-hours" type="number" placeholder="Hrs" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center">
                <input id="ann-mins" type="number" placeholder="Mins" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center">
            </div>
            <button id="pub-ann" class="w-full p-4 bg-white text-indigo-600 rounded-2xl font-black uppercase">Publish</button>
        </div>

        <div class="bg-white text-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest text-center">📰 News Feed</h2>
            <input id="news-title" placeholder="Title" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <input id="news-image" placeholder="Image URL" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <textarea id="news-content" placeholder="Content..." class="w-full p-4 bg-slate-100 rounded-2xl h-24 mb-4 outline-none"></textarea>
            <button id="post-news" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black uppercase">Post News</button>
        </div>
        <div id="news-list" class="space-y-2 mb-8"></div>

        <div class="vip-gold p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-amber-100 tracking-widest text-center">👑 VIP Codes</h2>
            <div class="flex gap-2 mb-4">
                <input id="vip-code-input" placeholder="New Code" class="flex-1 p-4 bg-amber-700/30 rounded-2xl outline-none text-white border border-amber-500/20">
                <button id="gen-vip" class="px-6 bg-white text-amber-700 rounded-2xl font-black uppercase text-[10px]">Add</button>
            </div>
            <div id="vip-display-list" class="scroll-area space-y-2 border-t border-amber-500/20 pt-4">
                </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-6 border border-indigo-500/30">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-400 tracking-widest text-center">💬 Active VIP Chats</h2>
            <div id="chat-display-list" class="space-y-3"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] border border-slate-700 mb-10">
            <h2 class="text-xs font-black uppercase mb-4 text-slate-400 tracking-widest text-center">💡 Feature Requests</h2>
            <div id="request-display-list" class="space-y-3"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp, onSnapshot, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LOGIN
        document.getElementById("admin-login-btn").onclick = () => {
            if(document.getElementById("admin-email-input").value === "admin@gmail.com" && document.getElementById("admin-pass-input").value === "29102007") {
                sessionStorage.setItem("logged", "true");
                start();
            } else alert("Denied");
        };
        if(sessionStorage.getItem("logged") === "true") start();

        function start() {
            document.getElementById("admin-auth-overlay").classList.add("hidden");
            document.getElementById("admin-panel-content").classList.remove("hidden");
            sync();
        }

        async function sync() {
            // Policies
            const t = await getDoc(doc(db, "settings", "terms"));
            if(t.exists()) document.getElementById("terms-input").value = t.data().text;
            const p = await getDoc(doc(db, "settings", "privacy"));
            if(p.exists()) document.getElementById("privacy-input").value = p.data().text;

            // VIP CODES (Real-time)
            onSnapshot(collection(db, "vip_codes"), snap => {
                const list = document.getElementById("vip-display-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const claimed = !!d.data().usedBy;
                    list.innerHTML += `<div class="flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5">
                        <div class="flex flex-col">
                            <span class="text-[11px] font-black uppercase text-amber-100">${d.id}</span>
                            <span class="text-[8px] font-bold uppercase ${claimed ? 'text-green-400' : 'text-amber-500'}">${claimed ? '✅ Claimed' : '⏳ Pending'}</span>
                        </div>
                        <button onclick="window.delVip('${d.id}')" class="text-red-400 text-[10px] font-black bg-red-950/20 px-3 py-1 rounded-lg uppercase">Del</button>
                    </div>`;
                });
            });

            // NEWS LIST
            onSnapshot(collection(db, "news"), snap => {
                const list = document.getElementById("news-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <span class="text-xs font-black truncate text-slate-300 uppercase">${d.data().title}</span>
                        <button onclick="window.delNews('${d.id}')" class="text-red-400 text-[10px] font-black uppercase">Del</button>
                    </div>`;
                });
            });

            // FEATURE REQUESTS
            onSnapshot(collection(db, "requests"), snap => {
                const list = document.getElementById("request-display-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div class="bg-slate-700/30 p-4 rounded-2xl text-xs border border-slate-700">
                        <p class="font-black text-indigo-400 uppercase mb-1">${d.data().name}</p>
                        <p class="mb-3 text-slate-300">"${d.data().request}"</p>
                        <button onclick="window.delReq('${d.id}')" class="text-slate-500 text-[9px] font-black uppercase">Dismiss</button>
                    </div>`;
                });
            });

            // VIP CHATS
            onSnapshot(collection(db, "vip_chats"), snap => {
                const list = document.getElementById("chat-display-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    if(d.data().status === "open") {
                        list.innerHTML += `<div class="bg-indigo-900/20 p-4 rounded-2xl border border-indigo-500/20">
                            <p class="text-[10px] font-black text-white uppercase">${d.data().userName}</p>
                            <p class="text-xs italic text-slate-400 mb-4">"${d.data().lastMessage}"</p>
                            <button onclick="window.repVip('${d.id}')" class="w-full py-2 bg-indigo-600 rounded-xl text-[10px] font-black uppercase">Reply</button>
                        </div>`;
                    }
                });
            });
        }

        // ACTIONS
        window.delNews = id => deleteDoc(doc(db, "news", id));
        window.delVip = id => deleteDoc(doc(db, "vip_codes", id));
        window.delReq = id => deleteDoc(doc(db, "requests", id));
        window.repVip = async id => {
            const r = prompt("Reply:");
            if(r) await updateDoc(doc(db, "vip_chats", id), { status: "closed", adminReply: r });
        };

        // HANDLERS
        document.getElementById("update-terms").onclick = async () => {
            await setDoc(doc(db, "settings", "terms"), { text: document.getElementById("terms-input").value, lastUpdated: serverTimestamp() });
            alert("Updated");
        };
        document.getElementById("update-privacy").onclick = async () => {
            await setDoc(doc(db, "settings", "privacy"), { text: document.getElementById("privacy-input").value, lastUpdated: serverTimestamp() });
            alert("Updated");
        };
        document.getElementById("gen-vip").onclick = async () => {
            const c = document.getElementById("vip-code-input").value.trim();
            if(c) await setDoc(doc(db, "vip_codes", c), { code: c, usedBy: null, createdAt: serverTimestamp() });
            document.getElementById("vip-code-input").value = "";
        };
        document.getElementById("pub-ann").onclick = async () => {
            const h = parseInt(document.getElementById("ann-hours").value) || 0;
            const m = parseInt(document.getElementById("ann-mins").value) || 0;
            const exp = Date.now() + (h * 60 + m) * 60000;
            await setDoc(doc(db, "settings", "announcement"), { text: document.getElementById("ann-text").value, expiry: exp });
            alert("Done");
        };
        document.getElementById("post-news").onclick = async () => {
            const t = document.getElementById("news-title").value;
            const c = document.getElementById("news-content").value;
            const i = document.getElementById("news-image").value;
            if(t && c) {
                await addDoc(collection(db, "news"), { title: t, content: c, imageUrl: i, likes: [], createdAt: serverTimestamp() });
                alert("Posted");
            }
        };
    </script>
</body>
</html>
