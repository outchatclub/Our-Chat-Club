<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>OCC Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Admin Panel</h1>
        
        <div class="bg-white text-gray-900 p-6 rounded-3xl mb-8 space-y-3">
            <input id="title" placeholder="News Title" class="w-full p-3 bg-gray-100 rounded-xl">
            <textarea id="content" placeholder="Content..." class="w-full p-3 bg-gray-100 rounded-xl h-32"></textarea>
            <button id="post-btn" class="w-full p-3 bg-indigo-600 text-white font-bold rounded-xl">Post News</button>
        </div>

        <div id="admin-list" class="space-y-2"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById("post-btn").onclick = async () => {
            const title = document.getElementById("title").value;
            const content = document.getElementById("content").value;
            if(!title || !content) return;

            await addDoc(collection(db, "news"), {
                title, content, likes: [], createdAt: serverTimestamp()
            });
            document.getElementById("title").value = "";
            document.getElementById("content").value = "";
        };

        onSnapshot(collection(db, "news"), snap => {
            const list = document.getElementById("admin-list");
            list.innerHTML = "";
            snap.forEach(sDoc => {
                list.innerHTML += `
                    <div class="flex justify-between bg-slate-800 p-4 rounded-xl items-center">
                        <span>${sDoc.data().title}</span>
                        <button onclick="delNews('${sDoc.id}')" class="text-red-400">Delete</button>
                    </div>
                `;
            });
        });

        window.delNews = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "news", id)); };
    </script>
</body>
</html>
