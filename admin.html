<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Control - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-gradient { background: linear-gradient(135deg,#7c3aed,#2563eb); }
        .hidden { display: none !important; }
        .vip-gold { background: linear-gradient(135deg, #f59e0b, #b45309); }
        .scroll-area { max-height: 300px; overflow-y: auto; }
        .scroll-area::-webkit-scrollbar { width: 3px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div id="admin-auth-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6 text-slate-900">
        <div class="w-full max-w-sm bg-white p-8 rounded-[2.5rem] shadow-2xl">
            <h1 class="text-2xl font-black mb-2 text-indigo-600 text-center uppercase tracking-tighter">Admin Panel</h1>
            <div class="space-y-4">
                <input id="admin-email-input" type="email" placeholder="Admin Email" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <input id="admin-pass-input" type="password" placeholder="Admin Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <button id="admin-login-btn" class="w-full p-4 text-white font-bold brand-gradient rounded-2xl shadow-lg active:scale-95 transition-all">UNLOCK PANEL</button>
            </div>
            <a href="index.html" class="block text-center mt-6 text-slate-400 text-xs font-bold uppercase tracking-widest">Exit</a>
        </div>
    </div>

    <div id="admin-panel-content" class="hidden max-w-md mx-auto p-5 pb-24">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-indigo-400 uppercase tracking-tighter">Control</h1>
            <button id="logout-admin-btn" class="bg-slate-800 p-3 px-5 rounded-2xl text-xs font-bold uppercase">Lock</button>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-6 border border-slate-700 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-400 tracking-widest">⚖️ Terms & Privacy Control</h2>
            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Terms & Conditions</label>
            <textarea id="terms-input" placeholder="Terms text..." class="w-full p-4 bg-slate-900/50 text-white rounded-2xl h-24 mb-3 outline-none border border-slate-700 text-sm mt-1"></textarea>
            <button id="update-terms" class="w-full p-3 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase mb-6">Update Terms</button>

            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Privacy Policy</label>
            <textarea id="privacy-input" placeholder="Privacy text..." class="w-full p-4 bg-slate-900/50 text-white rounded-2xl h-24 mb-3 outline-none border border-slate-700 text-sm mt-1"></textarea>
            <button id="update-privacy" class="w-full p-3 bg-slate-700 text-white rounded-xl font-black text-xs uppercase">Update Privacy</button>
        </div>

        <div class="bg-indigo-600 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-200 tracking-widest">📢 Global Announcement</h2>
            <input id="ann-text" placeholder="Broadcast Message..." class="w-full p-4 bg-indigo-700/50 rounded-2xl mb-3 outline-none text-white placeholder-indigo-300">
            <div class="flex gap-2 mb-4">
                <input id="ann-hours" type="number" placeholder="Hrs" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center">
                <input id="ann-mins" type="number" placeholder="Mins" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center">
            </div>
            <button id="pub-ann" class="w-full p-4 bg-white text-indigo-600 rounded-2xl font-black uppercase">Publish</button>
        </div>

        <div class="bg-white text-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">📰 News</h2>
            <input id="news-title" placeholder="Title" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <input id="news-image" placeholder="Image URL" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <textarea id="news-content" placeholder="Content..." class="w-full p-4 bg-slate-100 rounded-2xl h-24 mb-4 outline-none"></textarea>
            <button id="post-news" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg">POST NEWS</button>
            <div id="news-list" class="space-y-2 mt-4"></div>
        </div>

        <div class="vip-gold p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-amber-100 tracking-widest">👑 VIP Code Management</h2>
            <input id="vip-code-input" placeholder="Code (e.g. VIP2026)" class="w-full p-4 bg-amber-700/30 rounded-2xl mb-3 outline-none placeholder-amber-200">
            <button id="gen-vip" class="w-full p-4 bg-white text-amber-700 rounded-2xl font-black uppercase mb-4">Create Code</button>
            <div id="vip-list" class="space-y-2 scroll-area border-t border-amber-500/20 pt-4"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-6 border border-indigo-500/30">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-400 tracking-widest">💬 VIP Chats</h2>
            <div id="chat-list" class="scroll-area space-y-3"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-6 border border-slate-700">
            <h2 class="text-xs font-black uppercase mb-4 text-slate-400 tracking-widest">💡 Feature Requests</h2>
            <div id="request-list" class="scroll-area space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp, onSnapshot, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const MASTER_EMAIL = "admin@gmail.com";

        // Global function assignments for innerHTML buttons
        window.delNews = (id) => deleteDoc(doc(db, "news", id));
        window.delVip = (id) => deleteDoc(doc(db, "vip_codes", id));
        window.delReq = (id) => deleteDoc(doc(db, "requests", id));
        window.replyVip = async (id) => {
            const reply = prompt("Enter reply for VIP:");
            if(reply) await updateDoc(doc(db, "vip_chats", id), { status: "closed", adminReply: reply });
        };

        // UI Controls
        function unlockPanel() {
            document.getElementById("admin-auth-overlay").classList.add("hidden");
            document.getElementById("admin-panel-content").classList.remove("hidden");
            loadData();
        }

        document.getElementById("admin-login-btn").onclick = async () => {
            const email = document.getElementById("admin-email-input").value;
            const pass = document.getElementById("admin-pass-input").value;
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, pass);
                if (userCred.user.email === MASTER_EMAIL) {
                    sessionStorage.setItem("admin_verified", "true");
                    unlockPanel();
                } else {
                    alert("Unauthorized access.");
                    await signOut(auth);
                }
            } catch (e) { alert("Auth Error: " + e.message); }
        };

        document.getElementById("logout-admin-btn").onclick = async () => {
            await signOut(auth);
            sessionStorage.removeItem("admin_verified");
            location.reload();
        };

        onAuthStateChanged(auth, user => {
            if (user && user.email === MASTER_EMAIL && sessionStorage.getItem("admin_verified") === "true") {
                unlockPanel();
            }
        });

        async function loadData() {
            // Settings Initial Load
            const tSnap = await getDoc(doc(db, "settings", "terms"));
            if(tSnap.exists()) document.getElementById("terms-input").value = tSnap.data().text;
            const pSnap = await getDoc(doc(db, "settings", "privacy"));
            if(pSnap.exists()) document.getElementById("privacy-input").value = pSnap.data().text;

            // Listeners
            onSnapshot(collection(db, "news"), snap => {
                const list = document.getElementById("news-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div class="flex justify-between items-center bg-slate-100 p-3 rounded-xl mb-2">
                        <span class="text-xs font-bold truncate">${d.data().title}</span>
                        <button onclick="delNews('${d.id}')" class="text-red-500 font-black text-[10px]">DEL</button>
                    </div>`;
                });
            });

            onSnapshot(collection(db, "vip_codes"), snap => {
                const list = document.getElementById("vip-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const status = d.data().usedBy ? "✅" : "⏳";
                    list.innerHTML += `<div class="flex justify-between items-center bg-black/20 p-3 rounded-xl mb-2">
                        <span class="text-xs font-black">${d.id} ${status}</span>
                        <button onclick="delVip('${d.id}')" class="text-red-400 text-[10px] font-black uppercase">Del</button>
                    </div>`;
                });
            });

            onSnapshot(collection(db, "requests"), snap => {
                const list = document.getElementById("request-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div class="bg-slate-700/50 p-4 rounded-2xl text-xs">
                        <p class="font-black text-indigo-400">${d.data().name}</p>
                        <p>"${d.data().request}"</p>
                        <button onclick="delReq('${d.id}')" class="mt-2 text-slate-500 font-bold uppercase">Dismiss</button>
                    </div>`;
                });
            });

            onSnapshot(collection(db, "vip_chats"), snap => {
                const list = document.getElementById("chat-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    if(data.status === "open") {
                        list.innerHTML += `<div class="bg-indigo-900/20 p-4 rounded-2xl border border-indigo-500/20">
                            <p class="text-[10px] font-black">${data.userName}</p>
                            <p class="text-xs italic mb-2">"${data.lastMessage}"</p>
                            <button onclick="replyVip('${d.id}')" class="w-full py-2 bg-indigo-600 rounded-xl text-[10px] font-black uppercase">Reply</button>
                        </div>`;
                    }
                });
            });
        }

        // Action Handlers
        document.getElementById("update-terms").onclick = async () => {
            await setDoc(doc(db, "settings", "terms"), { text: document.getElementById("terms-input").value, lastUpdated: serverTimestamp() });
            alert("Terms Updated!");
        };

        document.getElementById("update-privacy").onclick = async () => {
            await setDoc(doc(db, "settings", "privacy"), { text: document.getElementById("privacy-input").value, lastUpdated: serverTimestamp() });
            alert("Privacy Updated!");
        };

        document.getElementById("pub-ann").onclick = async () => {
            const text = document.getElementById("ann-text").value;
            const expiry = Date.now() + (parseInt(document.getElementById("ann-hours").value || 0) * 3600000) + (parseInt(document.getElementById("ann-mins").value || 0) * 60000);
            await setDoc(doc(db, "settings", "announcement"), { text, expiry });
            alert("Announcement Published!");
        };

        document.getElementById("post-news").onclick = async () => {
            const title = document.getElementById("news-title").value;
            const content = document.getElementById("news-content").value;
            const imageUrl = document.getElementById("news-image").value;
            if(title && content) {
                await addDoc(collection(db, "news"), { title, content, imageUrl: imageUrl || "", likes: [], createdAt: serverTimestamp() });
                alert("News Posted!");
            }
        };

        document.getElementById("gen-vip").onclick = async () => {
            const code = document.getElementById("vip-code-input").value.trim();
            if(code) await setDoc(doc(db, "vip_codes", code), { code, usedBy: null, createdAt: serverTimestamp() });
            document.getElementById("vip-code-input").value = "";
        };
    </script>
</body>
</html>
