<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Control - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-gradient { background: linear-gradient(135deg,#7c3aed,#2563eb); }
        .hidden { display: none !important; }
        .vip-gold { background: linear-gradient(135deg, #f59e0b, #b45309); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div id="admin-auth-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[2.5rem] shadow-2xl text-slate-900">
            <h1 class="text-2xl font-black mb-2 text-indigo-600 text-center">ADMIN PANEL</h1>
            <div class="space-y-4">
                <input id="admin-email-input" type="email" placeholder="Admin Email" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <input id="admin-pass-input" type="password" placeholder="Admin Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500">
                <button id="admin-login-btn" class="w-full p-4 text-white font-bold brand-gradient rounded-2xl shadow-lg active:scale-95 transition-all">UNLOCK PANEL</button>
            </div>
            <a href="index.html" class="block text-center mt-6 text-slate-400 text-xs font-bold uppercase tracking-widest">Exit</a>
        </div>
    </div>

    <div id="admin-panel-content" class="hidden max-w-md mx-auto p-5 pb-24">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-indigo-400">CONTROL</h1>
            <button onclick="logoutAdmin()" class="bg-slate-800 p-3 px-5 rounded-2xl text-xs font-bold">LOCK</button>
        </div>

        <div class="vip-gold p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-amber-100">👑 Generate VIP Code</h2>
            <input id="vip-code-input" placeholder="Enter Code (e.g. VIP2026)" class="w-full p-4 bg-amber-700/30 rounded-2xl mb-3 outline-none placeholder-amber-200">
            <button id="gen-vip" class="w-full p-4 bg-white text-amber-700 rounded-2xl font-black">CREATE CODE</button>
            <div id="vip-list" class="mt-4 space-y-2"></div>
        </div>
        
        <div class="bg-indigo-600 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-200">📢 Announcement</h2>
            <input id="ann-text" placeholder="Message..." class="w-full p-4 bg-indigo-700/50 rounded-2xl mb-3 outline-none">
            <div class="flex gap-2 mb-4">
                <input id="ann-hours" type="number" placeholder="Hrs" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center">
                <input id="ann-mins" type="number" placeholder="Mins" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center">
            </div>
            <button id="pub-ann" class="w-full p-4 bg-white text-indigo-600 rounded-2xl font-black">PUBLISH</button>
        </div>

        <div class="bg-white text-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase text-slate-400 mb-4">📰 Create News</h2>
            <input id="news-title" placeholder="Title" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <textarea id="news-content" placeholder="Content..." class="w-full p-4 bg-slate-100 rounded-2xl h-24 mb-4 outline-none"></textarea>
            <button id="post-news" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black">POST NEWS</button>
        </div>

        <div id="news-list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const MASTER_EMAIL = "admin@gmail.com";
        const MASTER_PASS = "29102007";

        document.getElementById("admin-login-btn").onclick = () => {
            if(document.getElementById("admin-email-input").value === MASTER_EMAIL && 
               document.getElementById("admin-pass-input").value === MASTER_PASS) {
                if(auth.currentUser?.email === MASTER_EMAIL) {
                    sessionStorage.setItem("admin_verified", "true");
                    unlockPanel();
                } else { alert("Login as admin@gmail.com on main site first."); }
            } else { alert("Wrong credentials."); }
        };

        function unlockPanel() {
            document.getElementById("admin-auth-overlay").classList.add("hidden");
            document.getElementById("admin-panel-content").classList.remove("hidden");
            loadData();
        }

        window.logoutAdmin = () => { sessionStorage.removeItem("admin_verified"); location.reload(); };

        onAuthStateChanged(auth, user => {
            if(user?.email === MASTER_EMAIL && sessionStorage.getItem("admin_verified") === "true") unlockPanel();
        });

        // VIP LOGIC
        document.getElementById("gen-vip").onclick = async () => {
            const code = document.getElementById("vip-code-input").value.trim();
            if(!code) return;
            await setDoc(doc(db, "vip_codes", code), { code, usedBy: null, createdAt: serverTimestamp() });
            document.getElementById("vip-code-input").value = "";
        };

        function loadData() {
            onSnapshot(collection(db, "news"), snap => {
                const list = document.getElementById("news-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const el = document.createElement("div");
                    el.className = "flex justify-between items-center bg-slate-800 p-4 rounded-2xl";
                    el.innerHTML = `<span>${d.data().title}</span><button onclick="delNews('${d.id}')" class="text-red-400 font-bold">DEL</button>`;
                    list.appendChild(el);
                });
            });

            onSnapshot(collection(db, "vip_codes"), snap => {
                const list = document.getElementById("vip-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const el = document.createElement("div");
                    el.className = "text-xs bg-amber-900/40 p-3 rounded-xl flex justify-between items-center";
                    el.innerHTML = `<span>Code: <b>${d.id}</b> ${d.data().usedBy ? '✅' : '⏳'}</span>
                                   <button onclick="delVip('${d.id}')" class="text-white opacity-50">REMOVE</button>`;
                    list.appendChild(el);
                });
            });
        }

        window.delNews = id => deleteDoc(doc(db, "news", id));
        window.delVip = id => deleteDoc(doc(db, "vip_codes", id));

        document.getElementById("post-news").onclick = async () => {
            const title = document.getElementById("news-title").value;
            const content = document.getElementById("news-content").value;
            if(title && content) await addDoc(collection(db, "news"), { title, content, likes: [], createdAt: serverTimestamp() });
        };

        document.getElementById("pub-ann").onclick = async () => {
            const text = document.getElementById("ann-text").value;
            const expiry = Date.now() + ((parseInt(document.getElementById("ann-hours").value)||0)*60 + (parseInt(document.getElementById("ann-mins").value)||0))*60000;
            await setDoc(doc(db, "settings", "announcement"), { text, expiry });
        };
    </script>
</body>
</html>
