<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC - Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .brand-indigo { color: #4338ca; }
        .brand-bg-indigo { background-color: #4338ca; }
        .btn-press:active { transform: scale(0.96); }
        input, textarea { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 12px; width: 100%; outline: none; transition: 0.2s; font-size: 14px; }
        input:focus, textarea:focus { border-color: #4338ca; }
        .section-container { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .scroll-box { height: 300px; overflow-y: auto; padding-right: 8px; }
        .scroll-box::-webkit-scrollbar { width: 4px; }
        .scroll-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <div class="max-w-4xl mx-auto p-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black brand-indigo tracking-tighter">OCC ADMIN</h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Master Control Panel</p>
        </div>
        <button onclick="location.href='index.html'" class="btn-press bg-white border border-slate-200 px-5 py-2 rounded-2xl text-xs font-black text-slate-600 shadow-sm">EXIT</button>
    </div>

    <main class="max-w-4xl mx-auto px-6">

        <div class="section-container">
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">📢 Update Announcement</h3>
            <input type="text" id="ann-text" placeholder="Enter new announcement..." class="mb-3">
            <input type="number" id="ann-days" placeholder="Display for how many days?" class="mb-4">
            <button id="update-ann" class="btn-press w-full brand-bg-indigo text-white py-3 rounded-xl font-black text-xs uppercase tracking-widest">Update Bar</button>
        </div>

        <div class="section-container">
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">📰 Post Global News</h3>
            <input type="text" id="news-title" placeholder="News Title" class="mb-3">
            <textarea id="news-content" placeholder="Write news content here..." rows="4" class="mb-4"></textarea>
            <button id="post-news" class="btn-press w-full brand-bg-indigo text-white py-3 rounded-xl font-black text-xs uppercase tracking-widest">Post News</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="section-container mb-0">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">💬 VIP Chat Requests</h3>
                <div id="chat-list" class="scroll-box space-y-3">
                    <p class="text-center text-slate-400 text-[10px] mt-10">No active VIP chats.</p>
                </div>
            </div>
            <div class="section-container mb-0">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">💡 Feature Requests</h3>
                <div id="request-list" class="scroll-box space-y-3">
                    <p class="text-center text-slate-400 text-[10px] mt-10">No requests yet.</p>
                </div>
            </div>
        </div>

        <div class="section-container">
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">🗑️ Manage Existing News</h3>
            <div id="manage-news-list" class="space-y-3">
                </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", 
            authDomain: "our-chat-club.firebaseapp.com", 
            projectId: "our-chat-club" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 1. UPDATE ANNOUNCEMENT ---
        document.getElementById("update-ann").onclick = async () => {
            const text = document.getElementById("ann-text").value;
            const days = document.getElementById("ann-days").value;
            if(!text || !days) return alert("Fill all fields");
            
            const expiry = Date.now() + (days * 24 * 60 * 60 * 1000);
            await setDoc(doc(db, "settings", "announcement"), { text, expiry });
            alert("Announcement Updated!");
        };

        // --- 2. POST NEWS ---
        document.getElementById("post-news").onclick = async () => {
            const title = document.getElementById("news-title").value;
            const content = document.getElementById("news-content").value;
            if(!title || !content) return alert("Fill all fields");

            await addDoc(collection(db, "news"), {
                title, content, createdAt: Date.now(), likes: []
            });
            alert("News Posted!");
            document.getElementById("news-title").value = "";
            document.getElementById("news-content").value = "";
        };

        // --- 3. MANAGE NEWS (List with Delete) ---
        onSnapshot(query(collection(db, "news"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById("manage-news-list");
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="text-xs font-bold text-slate-700 truncate mr-4">${data.title}</p>
                        <button onclick="window.delNews('${d.id}')" class="text-[10px] font-black text-red-500 uppercase">Delete</button>
                    </div>`;
            });
        });
        window.delNews = async (id) => { if(confirm("Delete News?")) await deleteDoc(doc(db, "news", id)); };

        // --- 4. VIP FEATURE REQUESTS ---
        onSnapshot(collection(db, "requests"), (snap) => {
            const list = document.getElementById("request-list");
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                        <p class="text-[9px] font-black brand-indigo uppercase mb-1">${data.name}</p>
                        <p class="text-[11px] text-slate-600 mb-2">${data.request}</p>
                        <button onclick="window.delReq('${d.id}')" class="text-[8px] font-bold text-slate-400 uppercase">Dismiss</button>
                    </div>`;
            });
        });
        window.delReq = async (id) => await deleteDoc(doc(db, "requests", id));

        // --- 5. VIP CHATS ---
        onSnapshot(collection(db, "vip_chats"), (snap) => {
            const list = document.getElementById("chat-list");
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                if(data.status === "open") {
                    list.innerHTML += `
                        <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                            <p class="text-[10px] font-black text-slate-800 mb-1">${data.userName}</p>
                            <p class="text-xs italic text-slate-600 mb-3">"${data.lastMessage}"</p>
                            <button onclick="window.replyVIP('${d.id}')" class="w-full bg-indigo-600 text-white py-2 rounded-lg text-[10px] font-black uppercase">Reply</button>
                        </div>`;
                }
            });
        });
        window.replyVIP = async (id) => {
            const reply = prompt("Enter Reply:");
            if(reply) await updateDoc(doc(db, "vip_chats", id), { status: "closed", adminReply: reply });
        };

    </script>
</body>
</html>
