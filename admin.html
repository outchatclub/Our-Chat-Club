<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCC Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5 pb-24 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-indigo-400 mb-8">WORKING ADMIN PANEL</h1>
        
        <div class="bg-indigo-600 p-6 rounded-[2.5rem] mb-6 shadow-xl shadow-indigo-500/20">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-200">Broadcast Message</h2>
            <input id="ann-text" placeholder="Announcement text..." class="w-full p-4 bg-indigo-700/50 rounded-2xl mb-3 border-none text-white outline-none">
            <div class="flex gap-2 mb-4">
                <input id="ann-hours" type="number" placeholder="Hrs" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none" min="0">
                <input id="ann-mins" type="number" placeholder="Mins" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none" min="0">
            </div>
            <button id="pub-ann" class="w-full p-4 bg-white text-indigo-600 rounded-2xl font-black shadow-lg">PUBLISH</button>
        </div>

        <div class="bg-white text-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-slate-400">Add News</h2>
            <input id="news-title" placeholder="Headline" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <textarea id="news-content" placeholder="Content..." class="w-full p-4 bg-slate-100 rounded-2xl h-32 mb-4 outline-none"></textarea>
            <button id="post-news" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black">UPLOAD</button>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] mb-8">
            <h2 class="text-xs font-black uppercase mb-4 text-slate-500">Ban Management</h2>
            <input id="ban-email" placeholder="user@gmail.com" class="w-full p-4 bg-slate-700 rounded-2xl mb-4 outline-none text-white">
            <div class="flex gap-3">
                <button onclick="handleBan(true)" class="w-1/2 p-4 bg-red-600 text-white rounded-2xl font-bold">BAN</button>
                <button onclick="handleBan(false)" class="w-1/2 p-4 bg-emerald-600 text-white rounded-2xl font-bold">UNBAN</button>
            </div>
        </div>

        <div id="news-list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        if(localStorage.getItem("occ_admin_access") !== "true") window.location.href = "index.html";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Functional News Upload
        document.getElementById("post-news").onclick = async () => {
            const title = document.getElementById("news-title").value;
            const content = document.getElementById("news-content").value;
            if(!title || !content) return;
            try {
                await addDoc(collection(db, "news"), { 
                    title, content, likes: [], createdAt: serverTimestamp() 
                });
                alert("Success!");
                document.getElementById("news-title").value = ""; 
                document.getElementById("news-content").value = "";
            } catch(e) { alert("Error: " + e.message); }
        };

        // Functional Announcement
        document.getElementById("pub-ann").onclick = async () => {
            const text = document.getElementById("ann-text").value;
            const hrs = parseInt(document.getElementById("ann-hours").value) || 0;
            const mins = parseInt(document.getElementById("ann-mins").value) || 0;
            const expiry = Date.now() + ((hrs * 60) + mins) * 60000;
            try {
                await setDoc(doc(db, "settings", "announcement"), { text, expiry });
                alert("Announcement Published!");
            } catch(e) { alert("Error: " + e.message); }
        };

        // Ban Logic
        window.handleBan = async (status) => {
            const email = document.getElementById("ban-email").value.toLowerCase();
            if(!email) return;
            try {
                await setDoc(doc(db, "bannedUsers", email.replace('.', '_')), { banned: status });
                alert(`User ${status ? 'Banned' : 'Unbanned'}`);
            } catch(e) { alert("Error: " + e.message); }
        };

        // List & Delete
        onSnapshot(collection(db, "news"), snap => {
            const list = document.getElementById("news-list");
            list.innerHTML = "";
            snap.forEach(sDoc => {
                const div = document.createElement("div");
                div.className = "flex justify-between items-center bg-slate-800 p-4 rounded-2xl";
                div.innerHTML = `<span class="truncate max-w-[150px] font-bold">${sDoc.data().title}</span>
                                <button onclick="delNews('${sDoc.id}')" class="text-red-400 font-bold">DEL</button>`;
                list.appendChild(div);
            });
        });

        window.delNews = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "news", id)); };
    </script>
</body>
</html>
