<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brand-gradient { background: linear-gradient(135deg,#7c3aed,#2563eb); }
        .hidden { display: none !important; }
        .scroll-area { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <div id="admin-auth-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6 text-slate-900">
        <div class="w-full max-sm bg-white p-8 rounded-[2.5rem] shadow-2xl text-center">
            <h1 class="text-2xl font-black mb-6 text-indigo-600 uppercase">Admin Unlock</h1>
            <input id="admin-email-input" type="email" placeholder="Email" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none">
            <input id="admin-pass-input" type="password" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl mb-6 outline-none">
            <button id="admin-login-btn" class="w-full p-4 text-white font-bold brand-gradient rounded-2xl">UNLOCK</button>
        </div>
    </div>

    <div id="admin-panel-content" class="hidden max-w-md mx-auto p-5 pb-24">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-indigo-400 uppercase">OCC Admin</h1>
            <button id="logout-admin-btn" class="bg-slate-800 p-3 px-5 rounded-2xl text-xs font-bold uppercase">Lock</button>
        </div>

        <div class="bg-indigo-600 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-200 tracking-widest">📢 Global Announcement</h2>
            <input id="ann-text" placeholder="Message..." class="w-full p-4 bg-indigo-700/50 rounded-2xl mb-3 outline-none text-white">
            <div class="flex gap-2 mb-4">
                <input id="ann-hours" type="number" placeholder="Hrs" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center">
                <input id="ann-mins" type="number" placeholder="Mins" class="w-1/2 p-4 bg-indigo-700/50 rounded-2xl outline-none text-center">
            </div>
            <button id="pub-ann" class="w-full p-4 bg-white text-indigo-600 rounded-2xl font-black uppercase">Publish</button>
        </div>

        <div class="bg-white text-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl">
            <h2 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">📰 Post News</h2>
            <input id="news-title" placeholder="Title" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <input id="news-image" placeholder="Image URL (Blank for news.png)" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <textarea id="news-content" placeholder="Content..." class="w-full p-4 bg-slate-100 rounded-2xl h-24 mb-4 outline-none"></textarea>
            <button id="post-news" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg">POST NEWS</button>
        </div>

        <div class="bg-slate-800 p-6 rounded-[2.5rem] border border-slate-700">
            <h2 class="text-xs font-black uppercase mb-4 text-indigo-400 tracking-widest">👥 Registered Users</h2>
            <div id="user-list" class="scroll-area space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp, onSnapshot, query, orderBy, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById("admin-login-btn").onclick = async () => {
            try {
                const cred = await signInWithEmailAndPassword(auth, document.getElementById("admin-email-input").value, document.getElementById("admin-pass-input").value);
                if (cred.user.email === "admin@gmail.com") {
                    sessionStorage.setItem("admin_verified", "true");
                    location.reload();
                }
            } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, user => {
            if (user && user.email === "admin@gmail.com" && sessionStorage.getItem("admin_verified") === "true") {
                document.getElementById("admin-auth-overlay").classList.add("hidden");
                document.getElementById("admin-panel-content").classList.remove("hidden");
                loadData();
            }
        });

        function loadData() {
            onSnapshot(query(collection(db, "users"), orderBy("createdAt", "desc")), snap => {
                const list = document.getElementById("user-list");
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="bg-slate-900/50 p-4 rounded-2xl"><p class="font-black text-sm">${data.name}</p><p class="text-[9px] text-indigo-400 uppercase">${data.createdAt?.toDate().toLocaleString()}</p></div>`;
                });
            });
        }

        document.getElementById("pub-ann").onclick = async () => {
            const text = document.getElementById("ann-text").value;
            const expiry = Date.now() + (parseInt(document.getElementById("ann-hours").value || 0) * 3600000) + (parseInt(document.getElementById("ann-mins").value || 0) * 60000);
            await setDoc(doc(db, "settings", "announcement"), { text, expiry });
            alert("Published!");
        };

        document.getElementById("post-news").onclick = async () => {
            const img = document.getElementById("news-image").value.trim() || "news.png";
            await addDoc(collection(db, "news"), { title: document.getElementById("news-title").value, content: document.getElementById("news-content").value, imageUrl: img, likes: [], createdAt: serverTimestamp() });
            alert("News Posted!");
        };

        document.getElementById("logout-admin-btn").onclick = () => { signOut(auth); sessionStorage.removeItem("admin_verified"); location.reload(); };
    </script>
</body>
</html>
