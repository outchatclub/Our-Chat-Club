<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms & Conditions - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-slate-800 p-6">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 mt-10">
        <h1 class="text-3xl font-black text-indigo-700 mb-2 uppercase tracking-tighter">Terms & Conditions</h1>
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-8">User Agreement & Guidelines</p>
        
        <div id="terms-content" class="text-sm leading-relaxed text-slate-600 space-y-4 whitespace-pre-wrap min-h-[200px]">
            <div class="animate-pulse flex space-y-4 flex-col italic">Loading terms...</div>
        </div>

        <div class="mt-12 pt-8 border-t border-slate-50 flex flex-col gap-4">
            <button onclick="history.back()" class="w-full p-4 bg-indigo-600 text-white rounded-2xl font-black uppercase tracking-wide shadow-lg shadow-indigo-100">Accept & Go Back</button>
            <p class="text-center text-[9px] text-slate-400 font-bold uppercase tracking-widest">Last Updated: <span id="update-date">...</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "settings", "terms"), s => {
            const content = document.getElementById("terms-content");
            const dateEl = document.getElementById("update-date");
            if(s.exists()) {
                content.innerText = s.data().text;
                if(s.data().lastUpdated) {
                    dateEl.innerText = s.data().lastUpdated.toDate().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                }
            } else { content.innerText = "The terms have not been set yet."; }
        });
    </script>
</body>
</html>
