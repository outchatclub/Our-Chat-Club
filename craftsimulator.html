<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Craft Simulator Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* UI Layers */
        #ui-container {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* Top Left Back Button */
        #back-btn {
            position: absolute; top: 20px; left: 20px;
            width: 50px; height: 50px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; cursor: pointer;
            text-decoration: none; color: white; font-size: 24px;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.8);
            transform: translate(-50%, -50%);
        }

        /* Joystick */
        #joystick-wrapper {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
            pointer-events: auto;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px;
            background: white; border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Jump Button */
        #jump-btn {
            position: absolute; bottom: 60px; right: 40px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white; border-radius: 50%;
            color: white; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; backdrop-filter: blur(5px);
        }

        #back-btn:active, #jump-btn:active { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <div id="ui-container">
        <a href="index.html" id="back-btn">⬅</a>
        <div id="crosshair"></div>
        <div id="joystick-wrapper"><div id="joystick-knob"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Automation Logic (Fullscreen & Rotation) ---
        const startInteraction = () => {
            // Request Fullscreen
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            }
            // Request Landscape
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("Orientation lock not supported or failed"));
            }
        };

        // Trigger automation on first touch
        window.addEventListener('touchstart', startInteraction, { once: true });

        // --- Core 3D Engine ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 15, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // Ground
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshLambertMaterial({ color: 0x567d46 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Grid for 3D feeling
        const grid = new THREE.GridHelper(200, 80, 0x446633, 0x446633);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- Controls State ---
        const move = { forward: 0, right: 0 };
        const velocity = new THREE.Vector3();
        let lookPhi = 0, lookTheta = 0;

        // Joystick Input
        const knob = document.getElementById('joystick-knob');
        const wrapper = document.getElementById('joystick-wrapper');
        
        const updateJoystick = (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = wrapper.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width / 2);
            const dy = touch.clientY - (rect.top + rect.height / 2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            
            knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            move.right = (Math.cos(angle)*dist) / 50;
            move.forward = -(Math.sin(angle)*dist) / 50;
        };

        wrapper.addEventListener('touchstart', updateJoystick);
        wrapper.addEventListener('touchmove', updateJoystick);
        wrapper.addEventListener('touchend', () => {
            knob.style.transform = `translate(0,0)`;
            move.forward = 0; move.right = 0;
        });

        // Camera Look (Right side of screen)
        let lastX, lastY;
        window.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientX > window.innerWidth / 2) {
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches[0].clientX > window.innerWidth / 2) {
                const dx = e.touches[0].clientX - lastX;
                const dy = e.touches[0].clientY - lastY;
                lookTheta -= dx * 0.006;
                lookPhi = Math.max(-1.5, Math.min(1.5, lookPhi - dy * 0.006));
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        });

        document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (camera.position.y <= 1.75) velocity.y = 8;
        });

        // --- Render Loop ---
        camera.position.set(0, 1.7, 5);

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.order = 'YXZ';
            camera.rotation.set(lookPhi, lookTheta, 0);

            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0; right.y = 0;
            forward.normalize(); right.normalize();

            velocity.y -= 22 * 0.016; // Gravity
            camera.position.addScaledVector(forward, move.forward * 0.18);
            camera.position.addScaledVector(right, move.right * 0.18);
            camera.position.y += velocity.y * 0.016;

            if (camera.position.y < 1.7) {
                camera.position.y = 1.7;
                velocity.y = 0;
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
