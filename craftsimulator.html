<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Craft Simulator Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* Start Overlay - Critical for Browser Permission */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        #play-btn {
            padding: 20px 60px; font-size: 24px; font-weight: bold;
            background: #567d46; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px rgba(86, 125, 70, 0.5);
            margin-top: 20px;
        }

        /* UI Layers */
        #ui-container {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: none; /* Hidden until play */
        }

        #back-btn {
            position: absolute; top: 20px; left: 20px;
            width: 45px; height: 45px; background: rgba(0, 0, 0, 0.5);
            border: 2px solid white; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; text-decoration: none; color: white; font-size: 20px;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid white;
            transform: translate(-50%, -50%); opacity: 0.8;
        }

        #joystick-wrapper {
            position: absolute; bottom: 30px; left: 30px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
            pointer-events: auto;
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px;
            width: 40px; height: 40px; background: white; border-radius: 50%;
        }

        #jump-btn {
            position: absolute; bottom: 40px; right: 40px;
            width: 70px; height: 70px; background: rgba(255,255,255,0.2);
            border: 2px solid white; border-radius: 50%;
            color: white; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>CRAFT SIMULATOR</h1>
        <p>Optimized for Mobile Landscape</p>
        <button id="play-btn">START GAME</button>
    </div>

    <div id="ui-container">
        <a href="index.html" id="back-btn">⬅</a>
        <div id="crosshair"></div>
        <div id="joystick-wrapper"><div id="joystick-knob"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const overlay = document.getElementById('overlay');
        const ui = document.getElementById('ui-container');
        const playBtn = document.getElementById('play-btn');

        // --- THE "AUTO" SYSTEM ---
        playBtn.addEventListener('click', async () => {
            // 1. Force Fullscreen
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
            } catch (err) { console.warn("Fullscreen blocked", err); }

            // 2. Force Landscape
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (err) { console.warn("Orientation lock failed", err); }

            // Hide overlay, show game UI
            overlay.style.display = 'none';
            ui.style.display = 'block';
            
            // Re-sync renderer size after rotation
            setTimeout(onWindowResize, 200);
        });

        // --- Game Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(500, 500),
            new THREE.MeshLambertMaterial({ color: 0x567d46 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const grid = new THREE.GridHelper(500, 100, 0x446633, 0x446633);
        scene.add(grid);

        // Movement Logic
        const move = { f: 0, r: 0 };
        const vel = new THREE.Vector3();
        let lookP = 0, lookT = 0;

        // Joystick
        const knob = document.getElementById('joystick-knob');
        const wrap = document.getElementById('joystick-wrapper');
        const handleJoy = (e) => {
            e.preventDefault();
            const t = e.touches[0];
            const r = wrap.getBoundingClientRect();
            const dx = t.clientX - (r.left + r.width/2);
            const dy = t.clientY - (r.top + r.height/2);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
            const a = Math.atan2(dy, dx);
            knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
            move.r = (Math.cos(a)*d)/40; move.f = -(Math.sin(a)*d)/40;
        };
        wrap.addEventListener('touchmove', handleJoy);
        wrap.addEventListener('touchend', () => {
            knob.style.transform = 'none'; move.f = 0; move.r = 0;
        });

        // Touch Look
        let lX, lY;
        window.addEventListener('touchstart', (e) => {
            if(e.touches[0].clientX > window.innerWidth/2) {
                lX = e.touches[0].clientX; lY = e.touches[0].clientY;
            }
        });
        window.addEventListener('touchmove', (e) => {
            if(e.touches[0].clientX > window.innerWidth/2) {
                lookT -= (e.touches[0].clientX - lX) * 0.005;
                lookP = Math.max(-1.5, Math.min(1.5, lookP - (e.touches[0].clientY - lY) * 0.005));
                lX = e.touches[0].clientX; lY = e.touches[0].clientY;
            }
        });

        document.getElementById('jump-btn').addEventListener('touchstart', () => {
            if(camera.position.y <= 1.7) vel.y = 7;
        });

        camera.position.set(0, 1.7, 5);

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.order = 'YXZ';
            camera.rotation.set(lookP, lookT, 0);

            const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const rgt = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
            fwd.y = 0; rgt.y = 0;
            
            vel.y -= 20 * 0.016;
            camera.position.addScaledVector(fwd.normalize(), move.f * 0.15);
            camera.position.addScaledVector(rgt.normalize(), move.r * 0.15);
            camera.position.y += vel.y * 0.016;

            if(camera.position.y < 1.7) { camera.position.y = 1.7; vel.y = 0; }
            renderer.render(scene, camera);
        }
        animate();

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onWindowResize);
    </script>
</body>
</html>
