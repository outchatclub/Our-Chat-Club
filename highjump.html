<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Jump - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: white; 
            overflow: hidden; 
            touch-action: none; 
            user-select: none;
        }
        #game-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            background: linear-gradient(to top, #0f172a, #1e3a8a, #3b82f6); 
            overflow: hidden; 
        }
        .platform { 
            position: absolute; 
            height: 14px; 
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            width: 85px; 
        }
        #player { 
            position: absolute; 
            width: 40px; 
            height: 40px; 
            font-size: 2.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 100;
            bottom: 0;
            left: 0;
        }
        .hud-glass { 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
    </style>
</head>
<body>

    <div id="game-container" onpointerdown="handleJump()">
        <div class="absolute top-0 left-0 right-0 p-6 flex justify-between items-start z-[110]">
            <button onclick="event.stopPropagation(); location.href='index.html'" class="hud-glass p-3 rounded-2xl active:scale-90 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            </button>

            <div class="text-center">
                <p id="height-txt" class="text-5xl font-black italic tracking-tighter text-white">0m</p>
                <p class="text-[10px] font-bold uppercase tracking-widest text-blue-300 opacity-70">Target: 10,000m</p>
            </div>
            
            <button onclick="event.stopPropagation(); resetGame()" class="hud-glass p-3 rounded-full active:rotate-180 transition-transform duration-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </div>

        <div id="platforms-layer"></div>
        <div id="player">🧍‍♂️</div>
        
        <div id="hint" class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <p class="text-lg font-black opacity-30 animate-pulse uppercase tracking-widest">Tap to Jump</p>
        </div>
    </div>

    <script>
        const playerEl = document.getElementById('player');
        const platLayer = document.getElementById('platforms-layer');
        const heightTxt = document.getElementById('height-txt');

        let posX, posY, velY, score, platforms;
        let currentPlatform = null; // To track which platform the player is on
        
        const gravity = 0.35;
        const jumpPower = 12;
        const maxLimit = 10000;
        const screenWidth = window.innerWidth;

        function resetGame() {
            posX = (screenWidth / 2) - 20;
            posY = 150;
            velY = 0;
            score = 0;
            platforms = [];
            currentPlatform = null;
            platLayer.innerHTML = '';
            heightTxt.innerText = "0m";
            document.getElementById('hint').style.display = 'flex';
            
            // Initial Base Platform
            spawnPlatform(100, (screenWidth / 2) - 42, 0);
            
            // Random Moving Platforms
            for(let i=1; i<7; i++) {
                spawnPlatform(i * 140 + 100);
            }
        }

        function spawnPlatform(y, customX = null, speed = null) {
            const x = customX !== null ? customX : Math.random() * (screenWidth - 85);
            const moveSpeed = speed !== null ? speed : (Math.random() * 1.5 + 1.2) * (Math.random() > 0.5 ? 1 : -1);
            
            const div = document.createElement('div');
            div.className = 'platform';
            div.style.left = x + 'px';
            div.style.bottom = y + 'px';
            platLayer.appendChild(div);
            
            platforms.push({ el: div, x: x, y: y, speed: moveSpeed });
        }

        function handleJump() {
            // Player can only jump if they are stationary on a platform or the ground
            if (Math.abs(velY) <= 0.1) { 
                velY = jumpPower;
                currentPlatform = null; // Release from platform friction
                document.getElementById('hint').style.display = 'none';
            }
        }

        function update() {
            // Apply Gravity
            velY -= gravity;
            posY += velY;

            // Update Platforms
            platforms.forEach(p => {
                p.x += p.speed;
                if(p.x <= 0 || p.x >= screenWidth - 85) p.speed *= -1;
                p.el.style.left = p.x + 'px';

                // Collision Detection (Landing)
                if(velY < 0) {
                    if(posX + 30 > p.x && posX < p.x + 85 && posY > p.y && posY < p.y + 20) {
                        velY = 0;
                        posY = p.y + 14;
                        currentPlatform = p; // Hook player to this platform
                    }
                }
            });

            // Move player with the platform if landed
            if (currentPlatform) {
                posX += currentPlatform.speed;
            }

            // Screen Wrap for player
            if(posX < -40) posX = screenWidth;
            if(posX > screenWidth) posX = -40;

            // Camera Scroll & Score
            if(posY > 350) {
                let diff = posY - 350;
                posY = 350;
                score += diff;
                
                let currentMeters = Math.floor(score / 15);
                heightTxt.innerText = currentMeters + "m";

                if(currentMeters >= maxLimit) {
                    alert("10KM REACHED! YOU ARE A LEGEND!");
                    resetGame();
                }

                platforms.forEach(p => {
                    p.y -= diff;
                    if(p.y < -30) {
                        p.y = 800 + Math.random() * 50;
                        p.x = Math.random() * (screenWidth - 85);
                        p.speed = (Math.random() * 1.5 + 1.2) * (Math.random() > 0.5 ? 1 : -1);
                    }
                    p.el.style.bottom = p.y + 'px';
                });
            }

            // Fall Off (Game Over)
            if(posY < -50) {
                resetGame();
            }

            // Render Player
            playerEl.style.transform = `translate3d(${posX}px, ${-posY}px, 0)`;

            requestAnimationFrame(update);
        }

        resetGame();
        update();
    </script>
</body>
</html>
