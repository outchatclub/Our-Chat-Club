<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Jump - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .btn-press:active { transform: scale(0.95); }
        
        #game-canvas {
            height: 65vh;
            background: linear-gradient(to top, #38bdf8, #87ceeb);
            transition: background 2s ease;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .player-character {
            width: 60px;
            height: 60px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            z-index: 20;
        }

        .hud-glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .upgrade-section {
            height: 35vh;
            background: #0f172a;
            padding: 24px;
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        @keyframes coin-pop {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1.2); opacity: 0; }
        }
        .coin-anim { position: absolute; left: 50%; animation: coin-pop 0.8s ease-out forwards; pointer-events: none; }
    </style>
</head>
<body>

    <div class="fixed top-0 left-0 right-0 p-4 flex justify-between items-center z-50">
        <button onclick="location.href='index.html'" class="hud-glass p-3 rounded-2xl">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div class="hud-glass px-5 py-2 rounded-2xl flex items-center gap-2">
            <span class="text-amber-400">💰</span>
            <span id="wallet-display" class="font-black text-sm tracking-tight">...</span>
        </div>
    </div>

    <div id="game-canvas" onclick="triggerJump()">
        <div class="absolute top-24 left-0 right-0 text-center">
            <span id="height-display" class="text-6xl font-black tracking-tighter opacity-90">0m</span>
            <p id="milestone-text" class="text-[10px] font-black uppercase tracking-[0.3em] text-white/50 mt-2">Surface Level</p>
        </div>

        <div id="player" class="player-character">🏃‍♂️</div>
        
        <div class="absolute bottom-0 w-full h-4 bg-slate-900/20"></div>
    </div>

    <div class="upgrade-section">
        <div class="flex justify-between items-end mb-6">
            <div>
                <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Ability Upgrade</p>
                <h2 class="text-2xl font-black">Leg Strength</h2>
            </div>
            <div class="text-right">
                <span id="lvl-badge" class="bg-indigo-500/20 text-indigo-400 text-[10px] font-black px-3 py-1 rounded-full border border-indigo-500/20">LEVEL 1</span>
            </div>
        </div>

        <button id="upgrade-btn" class="btn-press w-full bg-white text-black p-5 rounded-[2rem] shadow-xl flex items-center justify-between group">
            <div class="flex flex-col items-start">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Next Upgrade</span>
                <span id="upgrade-cost" class="text-xl font-black italic">💰 500</span>
            </div>
            <div class="bg-indigo-600 p-3 rounded-2xl text-white group-active:scale-90 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
            </div>
        </button>

        <div class="mt-8 flex items-center gap-4">
            <div class="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-700" style="width: 0%"></div>
            </div>
            <span class="text-[9px] font-black text-slate-500 uppercase whitespace-nowrap">10km Goal</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userUid = null;
        let isBusy = false;
        let localData = { wallet: 0, jumpLvl: 1 };

        onAuthStateChanged(auth, user => {
            if (!user) { location.href = 'index.html'; return; }
            userUid = user.uid;
            onSnapshot(doc(db, "users", user.uid), s => {
                if(s.exists()){
                    localData = s.data();
                    localData.jumpLvl = localData.jumpLvl || 1;
                    renderUI();
                }
            });
        });

        function renderUI() {
            document.getElementById('wallet-display').innerText = localData.wallet || 0;
            const cost = localData.jumpLvl * 500;
            document.getElementById('upgrade-cost').innerText = `💰 ${cost}`;
            document.getElementById('lvl-badge').innerText = `LEVEL ${localData.jumpLvl}`;
            
            const currentMax = localData.jumpLvl * 10;
            const perc = (currentMax / 10000) * 100;
            document.getElementById('progress-bar').style.width = `${Math.min(perc, 100)}%`;
        }

        window.triggerJump = async () => {
            if (isBusy) return;
            isBusy = true;

            const height = localData.jumpLvl * 5;
            document.getElementById('height-display').innerText = `${height}m`;

            // Background Transitions
            const canvas = document.getElementById('game-canvas');
            const mile = document.getElementById('milestone-text');
            if(height < 500) { canvas.style.background = "#38bdf8"; mile.innerText = "Clear Skies"; }
            else if(height < 2000) { canvas.style.background = "#1e40af"; mile.innerText = "Troposphere"; }
            else if(height < 5000) { canvas.style.background = "#0f172a"; mile.innerText = "Stratosphere"; }
            else { canvas.style.background = "#020617"; mile.innerText = "Edge of Space"; }

            // Jump Animation
            const p = document.getElementById('player');
            p.style.bottom = "70%";
            
            const earn = Math.floor(Math.random() * 5) + 1;
            popCoin(earn);

            setTimeout(async () => {
                p.style.bottom = "20px";
                isBusy = false;
                await updateDoc(doc(db, "users", userUid), { wallet: increment(earn) });
            }, 700);
        };

        function popCoin(v) {
            const div = document.createElement('div');
            div.className = 'coin-anim font-black text-amber-400';
            div.style.top = "60%";
            div.innerText = `+${v} 💰`;
            document.getElementById('game-canvas').appendChild(div);
            setTimeout(() => div.remove(), 800);
        }

        document.getElementById('upgrade-btn').onclick = async () => {
            const cost = localData.jumpLvl * 500;
            if (localData.wallet >= cost) {
                await updateDoc(doc(db, "users", userUid), {
                    wallet: increment(-cost),
                    jumpLvl: increment(1)
                });
            } else {
                alert("Insufficient Coins!");
            }
        };
    </script>
</body>
</html>
