<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Jump - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100%; height: 70vh; background: linear-gradient(to top, #3b82f6, #60a5fa); overflow: hidden; }
        .platform { position: absolute; height: 15px; background: rgba(255, 255, 255, 0.9); border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 70px; }
        #player { position: absolute; width: 40px; height: 40px; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; z-index: 100; transition: transform 0.1s linear; }
        .hud-glass { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .upgrade-dock { height: 30vh; background: #0f172a; padding: 20px; border-top: 2px solid #1e293b; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="absolute top-0 left-0 right-0 p-4 flex justify-between items-center z-[110]">
            <button onclick="location.href='index.html'" class="hud-glass p-3 rounded-2xl">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="text-center">
                <p id="height-txt" class="text-4xl font-black italic">0m</p>
                <p id="status-txt" class="text-[9px] font-black uppercase tracking-widest text-blue-200">Climbing...</p>
            </div>
            <div class="hud-glass px-4 py-2 rounded-2xl flex items-center gap-2">
                <span class="text-amber-400">💰</span>
                <span id="wallet-display" class="font-black">...</span>
            </div>
        </div>

        <div id="player">🧍‍♂️</div>
        <div id="platforms-layer"></div>
        
        <div class="absolute inset-0 flex">
            <div class="w-1/2 h-full" onpointerdown="moveLeft(true)" onpointerup="moveLeft(false)"></div>
            <div class="w-1/2 h-full" onpointerdown="moveRight(true)" onpointerup="moveRight(false)"></div>
        </div>
    </div>

    <div class="upgrade-dock">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-black">Rocket Boots</h2>
            <span id="lvl-tag" class="text-xs bg-indigo-500/20 text-indigo-400 px-3 py-1 rounded-full font-black">LVL 1</span>
        </div>
        <button id="upgrade-btn" class="w-full bg-indigo-600 p-5 rounded-3xl flex items-center justify-between shadow-xl">
            <div class="text-left">
                <p class="text-[10px] font-bold opacity-60 uppercase">Power Up</p>
                <p id="cost-txt" class="text-xl font-black">💰 500</p>
            </div>
            <span class="text-2xl">⚡</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let uid, stats = { wallet: 0, jumpLvl: 1 };
        const player = document.getElementById('player');
        const platLayer = document.getElementById('platforms-layer');
        const gameBox = document.getElementById('game-container');

        // Physics Variables
        let posX = window.innerWidth / 2 - 20, posY = 100;
        let velY = 0, velX = 0;
        let platforms = [];
        let score = 0;
        let gravity = 0.25;

        onAuthStateChanged(auth, user => {
            if (!user) return location.href = 'index.html';
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), s => {
                if(s.exists()){
                    stats = s.data();
                    stats.jumpLvl = stats.jumpLvl || 1;
                    document.getElementById('wallet-display').innerText = stats.wallet;
                    document.getElementById('cost-txt').innerText = `💰 ${stats.jumpLvl * 500}`;
                    document.getElementById('lvl-tag').innerText = `LVL ${stats.jumpLvl}`;
                }
            });
            initGame();
        });

        function initGame() {
            platforms = [];
            platLayer.innerHTML = '';
            // Initial platforms
            for(let i=0; i<6; i++) spawnPlatform(i * 100 + 50);
            gameLoop();
        }

        function spawnPlatform(y) {
            const x = Math.random() * (window.innerWidth - 80);
            const div = document.createElement('div');
            div.className = 'platform';
            div.style.left = x + 'px';
            div.style.bottom = y + 'px';
            platLayer.appendChild(div);
            platforms.push({ el: div, x, y });
        }

        function gameLoop() {
            velY -= gravity;
            posY += velY;
            posX += velX;

            // Screen Wrap
            if(posX < -40) posX = window.innerWidth;
            if(posX > window.innerWidth) posX = -40;

            // Collision Detection (Falling down)
            if(velY < 0) {
                platforms.forEach(p => {
                    if(posX + 30 > p.x && posX < p.x + 70 && posY > p.y && posY < p.y + 15) {
                        velY = 8 + (stats.jumpLvl * 0.2); // Jump power scales with level
                        if(p.y > score) {
                            score = Math.floor(p.y / 10);
                            document.getElementById('height-txt').innerText = score + 'm';
                        }
                    }
                });
            }

            // Camera movement
            if(posY > 250) {
                let diff = posY - 250;
                posY = 250;
                platforms.forEach(p => {
                    p.y -= diff;
                    p.el.style.bottom = p.y + 'px';
                    if(p.y < -20) {
                        p.y = 600;
                        p.x = Math.random() * (window.innerWidth - 80);
                        p.el.style.left = p.x + 'px';
                        // Reward for climbing
                        updateDoc(doc(db, "users", uid), { wallet: increment(1) });
                    }
                });
            }

            // Game Over
            if(posY < -50) {
                posY = 100; velY = 10; score = 0;
                document.getElementById('height-txt').innerText = '0m';
            }

            player.style.bottom = posY + 'px';
            player.style.left = posX + 'px';
            requestAnimationFrame(gameLoop);
        }

        window.moveLeft = (on) => velX = on ? -5 : 0;
        window.moveRight = (on) => velX = on ? 5 : 0;

        document.getElementById('upgrade-btn').onclick = async () => {
            const cost = stats.jumpLvl * 500;
            if(stats.wallet >= cost) {
                await updateDoc(doc(db, "users", uid), { wallet: increment(-cost), jumpLvl: increment(1) });
            }
        };
    </script>
</body>
</html>
