<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Climber - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .btn-press:active { transform: scale(0.95); }
        
        #game-viewport {
            height: 70vh;
            background: linear-gradient(to top, #38bdf8, #60a5fa);
            position: relative;
            overflow: hidden;
            transition: background 2s ease;
        }

        .platform {
            position: absolute;
            height: 12px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.3);
            transition: top 0.3s linear;
        }

        #player {
            width: 45px;
            height: 45px;
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.2s ease;
        }

        .hud-pill {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .upgrade-dock {
            height: 30vh;
            background: #0f172a;
            border-top: 2px solid #1e293b;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="fixed top-0 left-0 right-0 p-4 flex justify-between items-center z-[100]">
        <button onclick="location.href='index.html'" class="hud-pill p-3 rounded-2xl">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div class="hud-pill px-4 py-2 rounded-2xl flex flex-col items-center">
            <span class="text-[9px] font-black text-blue-400 uppercase">Altitude</span>
            <span id="alt-display" class="text-xl font-black italic">0m</span>
        </div>
        <div class="hud-pill px-4 py-2 rounded-2xl flex items-center gap-2">
            <span class="text-amber-400">💰</span>
            <span id="wallet-display" class="font-black">...</span>
        </div>
    </div>

    <div id="game-viewport" onclick="gameTap(event)">
        <div id="player">🏃‍♂️</div>
        <div id="platform-layer"></div>
    </div>

    <div class="upgrade-dock">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-black tracking-tight">Boost Shoes</h2>
            <span id="lvl-text" class="text-xs font-black text-indigo-400 bg-indigo-500/10 px-3 py-1 rounded-full">LVL 1</span>
        </div>

        <button id="upgrade-btn" class="btn-press w-full bg-indigo-600 text-white p-4 rounded-2xl shadow-lg flex items-center justify-between">
            <div class="text-left">
                <p class="text-[10px] font-bold opacity-70 uppercase">Upgrade Power</p>
                <p id="upgrade-cost" class="text-lg font-black">💰 500</p>
            </div>
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </button>
        
        <p class="text-center text-[9px] text-slate-500 font-bold uppercase mt-4 tracking-widest">Reach 10,000m to win</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userUid = null;
        let isMoving = false;
        let currentAlt = 0;
        let userData = { wallet: 0, jumpLvl: 1 };

        onAuthStateChanged(auth, user => {
            if (!user) { location.href = 'index.html'; return; }
            userUid = user.uid;
            onSnapshot(doc(db, "users", user.uid), s => {
                if(s.exists()){
                    userData = s.data();
                    userData.jumpLvl = userData.jumpLvl || 1;
                    syncUI();
                }
            });
        });

        function syncUI() {
            document.getElementById('wallet-display').innerText = userData.wallet || 0;
            document.getElementById('lvl-text').innerText = `LVL ${userData.jumpLvl}`;
            document.getElementById('upgrade-cost').innerText = `💰 ${userData.jumpLvl * 500}`;
        }

        window.gameTap = async (e) => {
            if (isMoving) return;
            isMoving = true;

            const jumpHeight = userData.jumpLvl * 5;
            currentAlt += jumpHeight;
            
            // Visual Jump
            const p = document.getElementById('player');
            const view = document.getElementById('game-viewport');
            
            p.style.bottom = "60%";
            document.getElementById('alt-display').innerText = `${currentAlt}m`;

            // Atmosphere Logic
            if(currentAlt > 5000) view.style.background = "#020617";
            else if(currentAlt > 2000) view.style.background = "#1e3a8a";
            else if(currentAlt > 500) view.style.background = "#2563eb";

            const reward = Math.floor(Math.random() * 3) + 1;

            setTimeout(async () => {
                p.style.bottom = "20%";
                isMoving = false;
                await updateDoc(doc(db, "users", userUid), { wallet: increment(reward) });
            }, 600);
        };

        document.getElementById('upgrade-btn').onclick = async () => {
            const cost = userData.jumpLvl * 500;
            if(userData.wallet >= cost) {
                await updateDoc(doc(db, "users", userUid), {
                    wallet: increment(-cost),
                    jumpLvl: increment(1)
                });
            } else {
                alert("Collect more coins!");
            }
        };
    </script>
</body>
</html>
