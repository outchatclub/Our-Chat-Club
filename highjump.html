<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Jump - OCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .btn-press:active { transform: scale(0.95); }
        
        /* Dynamic Background */
        #game-screen {
            height: 60vh;
            position: relative;
            background: linear-gradient(to top, #38bdf8, #0ea5e9);
            transition: background 1.5s ease;
            overflow: hidden;
            border-bottom: 4px solid #1e293b;
        }

        .character {
            width: 50px;
            height: 50px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 10;
        }

        .coin-popup {
            position: absolute;
            color: #fbbf24;
            font-weight: 900;
            animation: floatUp 1s forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .upgrade-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="p-4 flex justify-between items-center bg-slate-900 border-b border-slate-800">
        <button onclick="location.href='index.html'" class="btn-press bg-slate-800 p-2 rounded-xl">
            <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div class="text-center">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Current Height</p>
            <h2 id="height-display" class="text-xl font-black text-white">0m</h2>
        </div>
        <div class="bg-indigo-600/20 border border-indigo-500/30 px-4 py-1 rounded-full">
            <span id="wallet-display" class="font-black text-indigo-400">💰 ...</span>
        </div>
    </div>

    <div id="game-screen" onclick="jump()">
        <div id="player" class="character">
            <span class="text-4xl">🚀</span>
        </div>
        <div id="height-milestone" class="absolute right-4 bottom-2 text-[10px] font-bold text-white/40 uppercase">Ground Level</div>
    </div>

    <div class="p-6 max-w-md mx-auto">
        <div class="upgrade-card p-5 rounded-[2.5rem] shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h3 class="font-black text-lg">Engine Thrust</h3>
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Increases Max Height</p>
                </div>
                <div class="text-right">
                    <span id="current-power" class="block font-black text-indigo-400 text-sm">Level 1</span>
                </div>
            </div>

            <div class="flex gap-3">
                <button id="upgrade-btn" class="btn-press flex-1 bg-white text-black py-4 rounded-2xl font-black shadow-xl flex flex-col items-center">
                    <span class="text-xs uppercase tracking-tighter">Upgrade Jump</span>
                    <span id="upgrade-cost" class="text-lg">💰 500</span>
                </button>
            </div>
            
            <div class="mt-4 w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width: 1%"></div>
            </div>
            <p class="text-center text-[9px] mt-2 text-slate-500 font-bold uppercase tracking-widest">Goal: 10,000m (Orbit)</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAbVPpVAil1q8qiyPDaw9BMrHo9PrAdtlE", authDomain: "our-chat-club.firebaseapp.com", projectId: "our-chat-club" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userUid = null;
        let isJumping = false;
        let userData = { wallet: 0, jumpLvl: 1 };

        const player = document.getElementById('player');
        const gameScreen = document.getElementById('game-screen');
        const heightDisplay = document.getElementById('height-display');
        const walletDisplay = document.getElementById('wallet-display');
        const upgradeBtn = document.getElementById('upgrade-btn');
        const upgradeCostEl = document.getElementById('upgrade-cost');
        const powerEl = document.getElementById('current-power');
        const progressBar = document.getElementById('progress-bar');
        const milestoneEl = document.getElementById('height-milestone');

        onAuthStateChanged(auth, user => {
            if (!user) { location.href = 'index.html'; return; }
            userUid = user.uid;
            onSnapshot(doc(db, "users", user.uid), s => {
                if(s.exists()){
                    userData = s.data();
                    userData.jumpLvl = userData.jumpLvl || 1;
                    updateUI();
                }
            });
        });

        function updateUI() {
            walletDisplay.innerText = "💰 " + (userData.wallet || 0);
            const cost = userData.jumpLvl * 500;
            upgradeCostEl.innerText = `💰 ${cost}`;
            powerEl.innerText = `Level ${userData.jumpLvl}`;
            
            const maxHeight = userData.jumpLvl * 10; 
            const progress = (maxHeight / 10000) * 100;
            progressBar.style.width = `${Math.min(progress, 100)}%`;
        }

        window.jump = async () => {
            if (isJumping) return;
            isJumping = true;

            const jumpMeters = userData.jumpLvl * 5; // Scale: 5m per level
            heightDisplay.innerText = `${jumpMeters}m`;

            // Change background based on height
            if (jumpMeters < 500) {
                gameScreen.style.background = "linear-gradient(to top, #38bdf8, #0ea5e9)";
                milestoneEl.innerText = "Clear Skies";
            } else if (jumpMeters < 2000) {
                gameScreen.style.background = "linear-gradient(to top, #0ea5e9, #1e40af)";
                milestoneEl.innerText = "Troposphere";
            } else if (jumpMeters < 5000) {
                gameScreen.style.background = "linear-gradient(to top, #1e40af, #0f172a)";
                milestoneEl.innerText = "Stratosphere";
            } else {
                gameScreen.style.background = "linear-gradient(to top, #0f172a, #000000)";
                milestoneEl.innerText = "Edge of Space";
            }

            // Animate Jump
            player.style.bottom = "80%";
            
            // Random Coin Reward
            const earned = Math.floor(Math.random() * 5) + 1;
            createCoinPopup(earned);

            setTimeout(async () => {
                player.style.bottom = "0%";
                isJumping = false;
                
                await updateDoc(doc(db, "users", userUid), {
                    wallet: increment(earned)
                });
            }, 800);
        };

        function createCoinPopup(val) {
            const popup = document.createElement('div');
            popup.className = 'coin-popup';
            popup.innerText = `+${val} 💰`;
            popup.style.left = '50%';
            popup.style.top = '20%';
            gameScreen.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        upgradeBtn.onclick = async () => {
            const cost = userData.jumpLvl * 500;
            if (userData.wallet >= cost) {
                upgradeBtn.disabled = true;
                await updateDoc(doc(db, "users", userUid), {
                    wallet: increment(-cost),
                    jumpLvl: increment(1)
                });
                upgradeBtn.disabled = false;
            } else {
                alert("Not enough coins!");
            }
        };
    </script>
</body>
</html>
