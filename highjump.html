<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Jump - Simple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: white; 
            overflow: hidden; 
            touch-action: none; 
            user-select: none;
        }
        #game-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            background: linear-gradient(to top, #0f172a, #1e3a8a, #3b82f6); 
            overflow: hidden; 
        }
        .platform { 
            position: absolute; 
            height: 12px; 
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            width: 70px; 
        }
        #player { 
            position: absolute; 
            width: 40px; 
            height: 40px; 
            font-size: 2.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            will-change: transform;
        }
        .hud-glass { 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="absolute top-0 left-0 right-0 p-6 flex justify-between items-start z-[110]">
            <div>
                <p id="height-txt" class="text-5xl font-black italic tracking-tighter">0m</p>
                <p class="text-xs font-bold uppercase tracking-widest text-blue-300 opacity-70">Target: 10,000m</p>
            </div>
            
            <div class="flex gap-3">
                <button onclick="resetGame()" class="hud-glass p-3 rounded-full active:rotate-180 transition-transform duration-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                </button>
                
                <button onclick="location.href='index.html'" class="hud-glass p-3 rounded-2xl active:scale-90 transition-transform">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                </button>
            </div>
        </div>

        <div id="platforms-layer"></div>
        <div id="player">🧍‍♂️</div>
        
        <div class="absolute inset-0 flex">
            <div class="w-1/2 h-full" onpointerdown="moveLeft(true)" onpointerup="moveLeft(false)" onpointerleave="moveLeft(false)"></div>
            <div class="w-1/2 h-full" onpointerdown="moveRight(true)" onpointerup="moveRight(false)" onpointerleave="moveRight(false)"></div>
        </div>
    </div>

    <script>
        const playerEl = document.getElementById('player');
        const platLayer = document.getElementById('platforms-layer');
        const heightTxt = document.getElementById('height-txt');

        let posX, posY, velY, velX, score, platforms;
        const gravity = 0.28;
        const friction = 0.85;
        const jumpPower = 10;
        const maxLimit = 10000;

        function resetGame() {
            posX = window.innerWidth / 2 - 20;
            posY = 100;
            velY = 0;
            velX = 0;
            score = 0;
            platforms = [];
            platLayer.innerHTML = '';
            heightTxt.innerText = "0m";
            
            // Initial Start Platform
            spawnPlatform(80, window.innerWidth / 2 - 35);
            
            // Random Platforms
            for(let i=1; i<8; i++) {
                spawnPlatform(i * 120);
            }
        }

        function spawnPlatform(y, customX = null) {
            const x = customX !== null ? customX : Math.random() * (window.innerWidth - 75);
            const div = document.createElement('div');
            div.className = 'platform';
            div.style.left = x + 'px';
            div.style.bottom = y + 'px';
            platLayer.appendChild(div);
            platforms.push({ el: div, x, y });
        }

        function update() {
            velY -= gravity;
            posY += velY;
            posX += velX;
            velX *= friction;

            // Screen Wrap
            if(posX < -40) posX = window.innerWidth;
            if(posX > window.innerWidth) posX = -40;

            // Collision
            if(velY < 0) {
                platforms.forEach(p => {
                    if(posX + 30 > p.x && posX < p.x + 70 && posY > p.y && posY < p.y + 15) {
                        velY = jumpPower;
                        posY = p.y + 12;
                    }
                });
            }

            // Camera Move & Score
            if(posY > 300) {
                let diff = posY - 300;
                posY = 300;
                score += Math.round(diff);
                
                // Update Meter
                let currentMeters = Math.floor(score / 10);
                heightTxt.innerText = currentMeters + "m";

                // Max Limit Check
                if(currentMeters >= maxLimit) {
                    alert("Congratulations! You reached 10km!");
                    resetGame();
                }

                platforms.forEach(p => {
                    p.y -= diff;
                    if(p.y < -20) {
                        p.y = 750 + Math.random() * 20;
                        p.x = Math.random() * (window.innerWidth - 75);
                        p.el.style.left = p.x + 'px';
                    }
                    p.el.style.bottom = p.y + 'px';
                });
            }

            // Fall Off (Game Over)
            if(posY < -50) {
                resetGame();
            }

            playerEl.style.transform = `translate3d(${posX}px, ${-posY}px, 0)`;
            requestAnimationFrame(update);
        }

        window.moveLeft = (on) => { if(on) velX = -7; };
        window.moveRight = (on) => { if(on) velX = 7; };

        // Start
        resetGame();
        update();
    </script>
</body>
</html>
